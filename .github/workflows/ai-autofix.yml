name: Copilot Auto Fix + AI Release Notes + Explanations

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-autofix:
    name: Copilot Automatic Fixes
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================================
      # 1. COPILOT REVIEW (COMMENTS + WARNINGS + EXPLANATIONS)
      # ============================================================
      - name: Copilot Review
        uses: github/copilot-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          suggestions: "true"
          severity: "medium"
          max-comments: 30

          # Custom explanation style (YOUR REQUEST)
          explanation-style: |
            For every issue you detect, explain it in this format:
            "This {error}. {action}. This happens because {cause}, and it will {consequence}."
            Examples:
            - "This function is called too many times. Reduce the number of calls. This happens because it runs inside a loop, and it will slow down the page."
            - "This variable is never used. Remove it. This happens because it was declared but not referenced, and it will clutter the code."
            - "This HTML tag is not closed. Close the tag. This happens because the structure is incomplete, and it will break rendering."
            - "This async function is missing await. Add await. This happens because the promise is never resolved, and it will cause unpredictable behavior."

          # Optional enhancements
          label-issues: "true"
          group-by-file: "true"
          summary: "true"

      # ============================================================
      # 2. COPILOT AUTO-FIX (APPLY PATCHES + COMMIT)
      # ============================================================
      - name: Copilot Auto Fix
        uses: github/copilot-fix@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          apply-fixes: "true"
          commit-message: "🤖 Copilot Auto-Fix: Automated improvements applied"

      # ============================================================
      # 3. AI RELEASE NOTES (FROM COMMENTS + DIFF + COMMITS)
      # ============================================================
      - name: Generate AI Release Notes
        uses: github/copilot-release-notes@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summarize-commits: "true"
          summarize-diff: "true"
          include-authors: "false"
          output-file: "AI_RELEASE_NOTES.md"

      # ============================================================
      # 4. POST RELEASE NOTES TO PR (STICKY COMMENT)
      # ============================================================
      - name: Post Release Notes to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: AI_RELEASE_NOTES.md
