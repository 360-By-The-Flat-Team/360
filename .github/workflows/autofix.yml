name: AI Autofix

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install node-fetch@3

      - name: Run autofix
        env:
          SUPABASE_FUNCTION_URL: https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/autofix-thingy
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/autofix.js
