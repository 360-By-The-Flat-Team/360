<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 Docs</title>
  <link rel="icon" type="image/png" href="favicon-32x32.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
  <link rel="stylesheet" href="/assets/css/cursor.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --docs-bg: #f3f4f6;
      --docs-surface: #ffffff;
      --docs-border: rgba(15,23,42,.08);
      --docs-txt: #0f172a;
      --docs-muted: #6b7280;
      --docs-accent: #3b82f6;
      --docs-accent2: #0ea5e9;
      --docs-topbar-h: 56px;
      --docs-sidebar-w: 260px;
      --docs-page-bg: #f9fafb;
    }
    body.dark {
      --docs-bg: #020617;
      --docs-surface: #020617;
      --docs-border: rgba(148,163,184,.35);
      --docs-txt: #e5e7eb;
      --docs-muted: #9ca3af;
      --docs-page-bg: #020617;
    }

    body {
      background: var(--docs-bg);
      color: var(--docs-txt);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    .docs-root {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Topbar */
    .docs-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--docs-topbar-h);
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--docs-border);
      z-index: 50;
    }
    body.dark .docs-topbar {
      background: rgba(15,23,42,.9);
    }

    .docs-topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .docs-logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.03em;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .docs-logo-main {
      background: linear-gradient(120deg, var(--docs-accent), var(--docs-accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .docs-logo-sub {
      font-size: 13px;
      color: var(--docs-muted);
      font-weight: 500;
    }

    .docs-topbar-center {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 0 16px;
    }
    .docs-search {
      max-width: 420px;
      width: 100%;
      display: flex;
      align-items: center;
      background: var(--docs-bg);
      border-radius: 999px;
      border: 1px solid var(--docs-border);
      overflow: hidden;
    }
    .docs-search input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--docs-txt);
      outline: none;
    }
    .docs-search input::placeholder {
      color: var(--docs-muted);
    }
    .docs-search button {
      border: none;
      background: none;
      padding: 8px 12px;
      font-size: 15px;
      cursor: pointer;
      color: var(--docs-muted);
    }

    .docs-topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .docs-btn-primary {
      border: none;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(120deg, var(--docs-accent), var(--docs-accent2));
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .docs-btn-primary:hover {
      opacity: .9;
    }
    .docs-avatar {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 2px solid var(--docs-accent);
      background: linear-gradient(135deg, var(--docs-accent), var(--docs-accent2));
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Layout */
    .docs-body {
      display: flex;
      margin-top: var(--docs-topbar-h);
      min-height: calc(100vh - var(--docs-topbar-h));
    }

    .docs-sidebar {
      width: var(--docs-sidebar-w);
      border-right: 1px solid var(--docs-border);
      background: var(--docs-surface);
      padding: 16px 10px;
    }

    .docs-sidebar-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--docs-muted);
      padding: 4px 10px 6px;
    }

    .docs-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      color: var(--docs-txt);
      border: 1px solid transparent;
    }
    .docs-nav-item span.icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }
    .docs-nav-item:hover {
      background: rgba(148,163,184,.12);
    }
    .docs-nav-item.active {
      background: rgba(59,130,246,.08);
      border-color: rgba(59,130,246,.4);
      color: var(--docs-accent);
      font-weight: 600;
    }

    .docs-main {
      flex: 1;
      padding: 20px 24px;
      min-width: 0;
    }

    .docs-main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .docs-main-title {
      font-size: 18px;
      font-weight: 700;
    }
    .docs-main-sub {
      font-size: 12px;
      color: var(--docs-muted);
    }

    .docs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .docs-card {
      background: var(--docs-surface);
      border-radius: 12px;
      border: 1px solid var(--docs-border);
      padding: 12px 12px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: box-shadow .15s, transform .15s, border-color .15s;
    }
    .docs-card:hover {
      box-shadow: 0 10px 30px rgba(15,23,42,.12);
      transform: translateY(-1px);
      border-color: rgba(59,130,246,.5);
    }
    .docs-card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      max-height: 2.8em;
      overflow: hidden;
    }
    .docs-card-snippet {
      font-size: 12px;
      color: var(--docs-muted);
      max-height: 3.6em;
      overflow: hidden;
      white-space: pre-wrap;
    }
    .docs-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--docs-muted);
      margin-top: 4px;
    }

    .docs-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--docs-muted);
      font-size: 13px;
    }

    /* Editor modal */
    .docs-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.55);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 80;
    }
    .docs-modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .docs-modal {
      width: 100%;
      max-width: 1100px;
      max-height: 94vh;
      background: var(--docs-page-bg);
      border-radius: 18px;
      border: 1px solid var(--docs-border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .docs-modal-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--docs-surface);
      border-bottom: 1px solid var(--docs-border);
    }
    .docs-modal-toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .docs-modal-toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .docs-pill-btn {
      border-radius: 999px;
      border: 1px solid var(--docs-border);
      background: #fff;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--docs-muted);
    }
    .docs-pill-btn:hover {
      border-color: var(--docs-accent);
      color: var(--docs-accent);
    }
    .docs-pill-btn.primary {
      background: linear-gradient(120deg, var(--docs-accent), var(--docs-accent2));
      border-color: transparent;
      color: #fff;
    }

    .docs-presence {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--docs-muted);
    }
    .docs-presence-avatar {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }

    .docs-modal-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .docs-pages-wrap {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      justify-content: center;
    }

    .docs-page-stack {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .docs-page {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 0 0 1px rgba(15,23,42,.06), 0 18px 40px rgba(15,23,42,.12);
      padding: 32px 40px;
      min-height: 600px;
      position: relative;
    }
    body.dark .docs-page {
      background: #020617;
      box-shadow: 0 0 0 1px rgba(148,163,184,.35), 0 18px 40px rgba(15,23,42,.6);
    }

    .docs-page-number {
      position: absolute;
      bottom: 8px;
      right: 16px;
      font-size: 11px;
      color: rgba(148,163,184,.9);
    }

    .docs-title-input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      outline: none;
      color: var(--docs-txt);
    }
    .docs-meta-line {
      font-size: 12px;
      color: var(--docs-muted);
      margin-bottom: 16px;
    }

    .docs-editor-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .docs-editor-btn {
      border-radius: 6px;
      border: 1px solid var(--docs-border);
      background: #f9fafb;
      padding: 3px 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--docs-muted);
    }
    .docs-editor-btn:hover {
      border-color: var(--docs-accent);
      color: var(--docs-accent);
    }

    .docs-page-content[contenteditable="true"] {
      outline: none;
    }
    .docs-page-content {
      min-height: 400px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--docs-txt);
    }

    /* Right sidebar: comments, sharing, versions */
    .docs-rightbar {
      width: 260px;
      border-left: 1px solid var(--docs-border);
      background: var(--docs-surface);
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
    }

    .docs-right-section {
      border-radius: 10px;
      border: 1px solid var(--docs-border);
      padding: 8px 10px;
      font-size: 12px;
    }
    .docs-right-section h4 {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .docs-share-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .docs-share-row input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid var(--docs-border);
      padding: 4px 8px;
      font-size: 11px;
      background: transparent;
      color: var(--docs-txt);
      outline: none;
    }
    .docs-share-row button {
      border-radius: 999px;
      border: 1px solid var(--docs-border);
      background: #f9fafb;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
    }

    .docs-share-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      border: 1px solid var(--docs-border);
      padding: 2px 8px;
      font-size: 11px;
      margin-top: 4px;
      cursor: pointer;
    }
    .docs-share-pill.active {
      border-color: var(--docs-accent);
      color: var(--docs-accent);
    }

    .docs-comments-list {
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }
    .docs-comment {
      font-size: 11px;
      border-radius: 8px;
      background: rgba(148,163,184,.08);
      padding: 4px 6px;
    }
    .docs-comment-meta {
      font-size: 10px;
      color: var(--docs-muted);
      margin-bottom: 2px;
    }

    .docs-comment-form {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .docs-comment-form input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid var(--docs-border);
      padding: 4px 8px;
      font-size: 11px;
      background: transparent;
      color: var(--docs-txt);
      outline: none;
    }
    .docs-comment-form button {
      border-radius: 999px;
      border: 1px solid var(--docs-border);
      background: #f9fafb;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
    }

    .docs-versions-list {
      max-height: 120px;
      overflow-y: auto;
      margin-top: 4px;
      font-size: 11px;
    }
    .docs-version-item {
      padding: 3px 4px;
      border-radius: 6px;
      cursor: pointer;
    }
    .docs-version-item:hover {
      background: rgba(148,163,184,.12);
    }

    .docs-status {
      font-size: 11px;
      color: var(--docs-muted);
      margin-left: 8px;
    }

    .docs-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #111827;
      color: #e5e7eb;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all .25s;
      z-index: 100;
      white-space: nowrap;
    }
    .docs-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1000px) {
      .docs-sidebar {
        display: none;
      }
      .docs-main {
        padding: 16px;
      }
      .docs-rightbar {
        display: none;
      }
      .docs-modal-body {
        flex-direction: column;
      }
      .docs-pages-wrap {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>
  <div class="cursor-crosshair"></div>
  <div class="cursor-blob"></div>

  <div class="docs-root">
    <header class="docs-topbar">
      <div class="docs-topbar-left">
        <button class="docs-pill-btn" onclick="window.location.href='apps.html'">← Apps</button>
        <div class="docs-logo">
          <span class="docs-logo-main">360</span>
          <span>|</span>
          <span class="docs-logo-main">Docs</span>
          <span class="docs-logo-sub">collaborative documents</span>
        </div>
      </div>

      <div class="docs-topbar-center">
        <div class="docs-search">
          <input id="docsSearch" type="text" placeholder="Search your docs…" autocomplete="off" />
          <button id="docsSearchBtn">🔍</button>
        </div>
      </div>

      <div class="docs-topbar-right">
    <button id="signInBtn"  class="auth-btn">Sign In</button>
    <button id="signUpBtn"  class="auth-btn">Sign Up</button>
    <button id="signOutBtn" class="auth-btn" style="display:none;">Sign Out</button>

        <button class="docs-btn-primary" id="newDocBtn">
          <span>＋</span> New doc
        </button>
        <div class="docs-avatar" id="docsAvatar" title="Account">?</div>
      </div>
    </header>

    <div class="docs-body">
      <aside class="docs-sidebar">
        <div class="docs-sidebar-section-label">Documents</div>
        <div class="docs-nav-item active" data-view="all">
          <span class="icon">📄</span>
          <span>All docs</span>
        </div>
        <div class="docs-nav-item" data-view="shared">
          <span class="icon">🤝</span>
          <span>Shared with you</span>
        </div>
        <div class="docs-nav-item" data-view="owned">
          <span class="icon">👤</span>
          <span>Owned by you</span>
        </div>
        <div class="docs-nav-item" data-view="recent">
          <span class="icon">🕒</span>
          <span>Recently opened</span>
        </div>

        <div class="docs-sidebar-section-label" style="margin-top:10px;">Other</div>
        <div class="docs-nav-item" data-view="trash">
          <span class="icon">🗑️</span>
          <span>Trash (future)</span>
        </div>
      </aside>

      <main class="docs-main">
        <div class="docs-main-header">
          <div>
            <div class="docs-main-title">Your documents</div>
            <div class="docs-main-sub" id="docsCountLabel">Loading…</div>
          </div>
        </div>

        <div class="docs-grid" id="docsGrid">
          <!-- cards injected here -->
        </div>
      </main>
    </div>
  </div>

  <!-- Editor modal -->
  <div class="docs-modal-overlay" id="docsModalOverlay">
    <div class="docs-modal">
      <div class="docs-modal-toolbar">
        <div class="docs-modal-toolbar-left">
          <button class="docs-pill-btn" id="closeModalBtn">← Back</button>
          <input id="docTitleInput" class="docs-title-input" placeholder="Untitled document" maxlength="200" />
          <span class="docs-status" id="docsStatus">Not saved.</span>
        </div>
        <div class="docs-modal-toolbar-right">
          <div class="docs-presence" id="docsPresence">
            <!-- presence avatars -->
          </div>
          <button class="docs-pill-btn" id="commentModeBtn">💬 Comments</button>
          <button class="docs-pill-btn" id="shareBtn">🔗 Share</button>
          <button class="docs-pill-btn primary" id="saveDocBtn">💾 Save</button>
        </div>
      </div>

      <div class="docs-modal-body">
        <div class="docs-pages-wrap">
          <div class="docs-page-stack" id="docsPageStack">
            <!-- pages injected -->
          </div>
        </div>

        <aside class="docs-rightbar">
          <div class="docs-right-section">
            <h4>Sharing</h4>
            <div class="docs-share-row">
              <input id="shareEmailInput" type="email" placeholder="Add collaborator email" />
              <button id="shareAddBtn">Add</button>
            </div>
            <div style="margin-top:4px;font-size:11px;">Link access:</div>
            <div style="display:flex;gap:4px;margin-top:2px;flex-wrap:wrap;">
              <div class="docs-share-pill" data-access="private">Private</div>
              <div class="docs-share-pill" data-access="link-view">Anyone with link (view)</div>
              <div class="docs-share-pill" data-access="link-edit">Anyone with link (edit)</div>
            </div>
            <div class="docs-share-row" style="margin-top:6px;">
              <input id="shareLinkInput" type="text" readonly />
              <button id="shareCopyBtn">Copy</button>
            </div>
          </div>

          <div class="docs-right-section">
            <h4>Comments</h4>
            <div class="docs-comments-list" id="docsCommentsList"></div>
            <div class="docs-comment-form">
              <input id="docsCommentInput" type="text" placeholder="Add a comment…" maxlength="300" />
              <button id="docsCommentSubmit">Post</button>
            </div>
          </div>

          <div class="docs-right-section">
            <h4>Versions</h4>
            <div class="docs-versions-list" id="docsVersionsList">
              <!-- version items -->
            </div>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div class="docs-toast" id="docsToast"></div>

  <audio id="clickSound" src="click-sound.mp3" preload="auto"></audio>
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/cookie.js"></script>
  <script src="/assets/js/cursor.js"></script>

    const docsPageStack = document.getElementById('docsPageStack');
    const docsPresence = document.getElementById('docsPresence');
    const docsCommentsList = document.getElementById('docsCommentsList');
    const docsCommentInput = document.getElementById('docsCommentInput');
    const docsVersionsList = document.getElementById('docsVersionsList');
    const shareLinkInput = document.getElementById('shareLinkInput');

    function showToast(msg, dur = 2600) {
      docsToast.textContent = msg;
      docsToast.classList.add('show');
      setTimeout(() => docsToast.classList.remove('show'), dur);
    }

    async function initAuth() {
      const { data: { session } } = await sb.auth.getSession();
      currentUser = session?.user ?? null;
      updateAvatar();
    }

    function updateAvatar() {
      if (currentUser) {
        const initials = (currentUser.email || 'U')[0].toUpperCase();
        docsAvatar.textContent = initials;
        docsAvatar.title = currentUser.email;
      } else {
        docsAvatar.textContent = '?';
        docsAvatar.title = 'Not signed in';
      }
    }

    docsAvatar.addEventListener('click', () => {
      const popup = document.getElementById('auth-popup');
      if (popup) popup.classList.remove('hidden');
      else showToast('Sign in via 360 account popup.');
    });

    sb.auth.onAuthStateChange((_e, session) => {
      currentUser = session?.user ?? null;
      updateAvatar();
      fetchDocs();
    });

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function timeAgo(ts) {
      if (!ts) return '';
      const diff = Date.now() - new Date(ts).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      const d = Math.floor(h / 24);
      if (d < 30) return d + 'd ago';
      const mo = Math.floor(d / 30);
      if (mo < 12) return mo + 'mo ago';
      return Math.floor(mo / 12) + 'y ago';
    }

    function docCard(d) {
      const snippet = (d.plain_text || '').slice(0, 160);
      const shared = d.is_public || (d.shared_with && d.shared_with.length);
      return `
        <div class="docs-card" data-id="${d.id}">
          <div class="docs-card-title">${escHtml(d.title || 'Untitled')}</div>
          <div class="docs-card-snippet">
            ${escHtml(snippet)}${d.plain_text && d.plain_text.length > 160 ? '…' : ''}
          </div>
          <div class="docs-card-meta">
            <span>${timeAgo(d.updated_at)}</span>
            <span>${shared ? 'Shared' : 'Private'}</span>
          </div>
        </div>
      `;
    }

    function renderDocs() {
      let docs = [...allDocs];

      if (activeView === 'owned' && currentUser) {
        docs = docs.filter(d => d.owner_id === currentUser.id);
      } else if (activeView === 'shared' && currentUser) {
        docs = docs.filter(d =>
          (d.shared_with || []).includes(currentUser.email) ||
          d.is_public
        );
      } else if (activeView === 'recent') {
        docs = docs.sort((a,b) => new Date(b.last_opened_at || b.updated_at) - new Date(a.last_opened_at || a.updated_at));
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        docs = docs.filter(d =>
          (d.title || '').toLowerCase().includes(q) ||
          (d.plain_text || '').toLowerCase().includes(q)
        );
      }

      docsCountLabel.textContent = docs.length
        ? `${docs.length} document${docs.length === 1 ? '' : 's'}`
        : 'No documents yet';

      if (!docs.length) {
        docsGrid.innerHTML = `
          <div class="docs-empty">
            <div style="font-size:40px;margin-bottom:8px;">📄</div>
            <div>No documents yet.</div>
            <div style="margin-top:4px;">Click “New doc” to start writing.</div>
          </div>`;
        return;
      }

      docsGrid.innerHTML = docs.map(docCard).join('');
      docsGrid.querySelectorAll('.docs-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          const doc = allDocs.find(dd => dd.id === id);
          if (doc) openDoc(doc);
        });
      });
    }

    async function fetchDocs() {
      if (!currentUser) {
        allDocs = [];
        renderDocs();
        return;
      }

      const { data, error } = await sb
        .from('docs')
        .select('*')
        .order('updated_at', { ascending: false });

      if (error) {
        console.log(error);
        showToast('⚠️ Failed to load docs.');
        return;
      }

      allDocs = data || [];
      renderDocs();
    }

    function openModal() {
      docsModalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      docsModalOverlay.classList.remove('open');
      document.body.style.overflow = '';
      teardownRealtime();
      currentDoc = null;
      pages = [];
      docsPageStack.innerHTML = '';
      docsCommentsList.innerHTML = '';
      docsVersionsList.innerHTML = '';
      docTitleInput.value = '';
      docsStatus.textContent = 'Not saved.';
      isCommentMode = false;
    }

    function createPageElement(pageIndex, html) {
      const page = document.createElement('div');
      page.className = 'docs-page';
      page.dataset.index = pageIndex;

      const toolbar = document.createElement('div');
      toolbar.className = 'docs-editor-toolbar';
      toolbar.innerHTML = `
        <button class="docs-editor-btn" data-cmd="bold"><b>B</b></button>
        <button class="docs-editor-btn" data-cmd="italic"><i>I</i></button>
        <button class="docs-editor-btn" data-cmd="underline"><u>U</u></button>
        <button class="docs-editor-btn" data-cmd="insertUnorderedList">• List</button>
        <button class="docs-editor-btn" data-cmd="insertOrderedList">1. List</button>
        <button class="docs-editor-btn" data-cmd="formatBlock" data-value="h1">H1</button>
        <button class="docs-editor-btn" data-cmd="formatBlock" data-value="h2">H2</button>
        <button class="docs-editor-btn" data-cmd="formatBlock" data-value="p">Normal</button>
        <button class="docs-editor-btn" data-action="add-page">＋ Page</button>
      `;

      const content = document.createElement('div');
      content.className = 'docs-page-content';
      content.contentEditable = "true";
      content.innerHTML = html || '';
      content.addEventListener('input', () => {
        scheduleAutoSave();
        broadcastChange();
      });

      toolbar.addEventListener('click', e => {
        const btn = e.target.closest('.docs-editor-btn');
        if (!btn) return;
        const cmd = btn.dataset.cmd;
        const val = btn.dataset.value || null;
        const action = btn.dataset.action;
        if (action === 'add-page') {
          addPage();
          return;
        }
        if (!cmd) return;
        content.focus();
        document.execCommand(cmd, false, val);
        scheduleAutoSave();
        broadcastChange();
      });

      const pageNumber = document.createElement('div');
      pageNumber.className = 'docs-page-number';
      pageNumber.textContent = `Page ${pageIndex + 1}`;

      page.appendChild(toolbar);
      page.appendChild(content);
      page.appendChild(pageNumber);
      return page;
    }

    function renderPages() {
      docsPageStack.innerHTML = '';
      pages.forEach((p, idx) => {
        const el = createPageElement(idx, p.html);
        docsPageStack.appendChild(el);
      });
    }

    function addPage() {
      pages.push({ index: pages.length, html: '' });
      renderPages();
      scheduleAutoSave();
      broadcastChange();
    }

    function collectPagesFromDOM() {
      const pageEls = docsPageStack.querySelectorAll('.docs-page');
      pages = Array.from(pageEls).map((pageEl, idx) => {
        const content = pageEl.querySelector('.docs-page-content');
        return { index: idx, html: content.innerHTML };
      });
    }

    function plainTextFromPages() {
      const tmp = document.createElement('div');
      tmp.innerHTML = pages.map(p => p.html).join('\n\n');
      return tmp.textContent || tmp.innerText || '';
    }

    function openDoc(doc) {
      if (!currentUser) {
        showToast('Sign in to open docs.');
        return;
      }
      currentDoc = doc;
      docTitleInput.value = doc.title || '';
      docsStatus.textContent = 'Loaded.';
      pages = doc.pages || [{ index: 0, html: '' }];
      renderPages();
      openModal();
      setupRealtime();
      loadComments();
      loadVersions();
      updateShareUI();
      updateShareLink();
      markOpened(doc.id);
    }

    function newDoc() {
      if (!currentUser) {
        showToast('Sign in to create docs.');
        return;
      }
      currentDoc = null;
      docTitleInput.value = '';
      docsStatus.textContent = 'Not saved.';
      pages = [{ index: 0, html: '' }];
      renderPages();
      openModal();
      setupRealtime(); // join presence even for new doc (temp channel name later)
      updateShareUI();
      updateShareLink();
    }

    async function saveDoc(manual = false) {
      if (!currentUser) {
        showToast('Sign in to save docs.');
        return;
      }

      collectPagesFromDOM();
      const title = docTitleInput.value.trim() || 'Untitled';
      const pagesPayload = pages;
      const plain_text = plainTextFromPages();

      docsStatus.textContent = manual ? 'Saving…' : 'Auto-saving…';

      if (!currentDoc) {
        const { data, error } = await sb
          .from('docs')
          .insert({
            owner_id: currentUser.id,
            title,
            pages: pagesPayload,
            plain_text,
            is_public: false,
            shared_with: []
          })
          .select('*')
          .single();

        if (error) {
          console.log(error);
          docsStatus.textContent = '⚠️ Failed to save.';
          showToast('⚠️ Failed to save doc.');
          return;
        }

        currentDoc = data;
        allDocs.unshift(data);
        docsStatus.textContent = manual ? 'Saved.' : 'Auto-saved.';
        renderDocs();
        setupRealtime(true);
        updateShareLink();
        await createVersionSnapshot();
        return;
      }

      const { data, error } = await sb
        .from('docs')
        .update({
          title,
          pages: pagesPayload,
          plain_text,
          updated_at: new Date().toISOString()
        })
        .eq('id', currentDoc.id)
        .select('*')
        .single();

      if (error) {
        console.log(error);
        docsStatus.textContent = '⚠️ Failed to save.';
        showToast('⚠️ Failed to save doc.');
        return;
      }

      currentDoc = data;
      const idx = allDocs.findIndex(d => d.id === data.id);
      if (idx > -1) allDocs[idx] = data;
      docsStatus.textContent = manual ? 'Saved.' : 'Auto-saved.';
      renderDocs();
      await createVersionSnapshot();
    }

    async function createVersionSnapshot() {
      if (!currentDoc) return;
      collectPagesFromDOM();
      const title = docTitleInput.value.trim() || 'Untitled';
      const pagesPayload = pages;
      const plain_text = plainTextFromPages();

      await sb.from('doc_versions').insert({
        doc_id: currentDoc.id,
        title,
        pages: pagesPayload,
        plain_text
      });
      loadVersions();
    }

    async function loadVersions() {
      if (!currentDoc) return;
      const { data, error } = await sb
        .from('doc_versions')
        .select('*')
        .eq('doc_id', currentDoc.id)
        .order('created_at', { ascending: false })
        .limit(20);

      if (error) {
        console.log(error);
        return;
      }

      const versions = data || [];
      docsVersionsList.innerHTML = versions.map(v => `
        <div class="docs-version-item" data-version-id="${v.id}">
          ${timeAgo(v.created_at)} · ${escHtml(v.title || 'Untitled')}
        </div>
      `).join('');

      docsVersionsList.querySelectorAll('.docs-version-item').forEach(item => {
        item.addEventListener('click', async () => {
          const id = item.dataset.versionId;
          const ver = versions.find(v => v.id === id);
          if (!ver) return;
          if (!confirm('Restore this version?')) return;
          pages = ver.pages || [{ index: 0, html: '' }];
          renderPages();
          docTitleInput.value = ver.title || '';
          scheduleAutoSave();
        });
      });
    }

    async function loadComments() {
      if (!currentDoc) return;
      const { data, error } = await sb
        .from('doc_comments')
        .select('*')
        .eq('doc_id', currentDoc.id)
        .order('created_at', { ascending: true });

      if (error) {
        console.log(error);
        return;
      }

      const comments = data || [];
      if (!comments.length) {
        docsCommentsList.innerHTML = '<div style="font-size:11px;color:var(--docs-muted);">No comments yet.</div>';
        return;
      }

      docsCommentsList.innerHTML = comments.map(c => `
        <div class="docs-comment">
          <div class="docs-comment-meta">
            ${escHtml(c.author || 'User')} · ${timeAgo(c.created_at)}
          </div>
          <div>${escHtml(c.body)}</div>
        </div>
      `).join('');
    }

    async function postComment() {
      if (!currentUser || !currentDoc) return;
      const body = docsCommentInput.value.trim();
      if (!body) return;
      docsCommentInput.value = '';

      const author = currentUser.email?.split('@')[0] || 'User';
      const { error } = await sb.from('doc_comments').insert({
        doc_id: currentDoc.id,
        user_id: currentUser.id,
        author,
        body
      });

      if (error) {
        console.log(error);
        showToast('⚠️ Failed to post comment.');
        return;
      }

      loadComments();
      if (docChannel) {
        docChannel.send({
          type: 'broadcast',
          event: 'comment',
          payload: { author, body, created_at: new Date().toISOString() }
        });
      }
    }

    function updateShareUI() {
      const pills = document.querySelectorAll('.docs-share-pill');
      pills.forEach(p => p.classList.remove('active'));
      if (!currentDoc) {
        document.querySelector('.docs-share-pill[data-access="private"]').classList.add('active');
        return;
      }
      if (currentDoc.is_public && currentDoc.can_edit_public) {
        document.querySelector('.docs-share-pill[data-access="link-edit"]').classList.add('active');
      } else if (currentDoc.is_public) {
        document.querySelector('.docs-share-pill[data-access="link-view"]').classList.add('active');
      } else {
        document.querySelector('.docs-share-pill[data-access="private"]').classList.add('active');
      }
    }

    function updateShareLink() {
      if (!currentDoc) {
        shareLinkInput.value = '';
        return;
      }
      const url = `${location.origin}${location.pathname}?doc=${currentDoc.id}`;
      shareLinkInput.value = url;
    }

    async function setAccess(mode) {
      if (!currentDoc || !currentUser) return;
      let is_public = false;
      let can_edit_public = false;
      if (mode === 'link-view') {
        is_public = true;
        can_edit_public = false;
      } else if (mode === 'link-edit') {
        is_public = true;
        can_edit_public = true;
      }

      const { data, error } = await sb
        .from('docs')
        .update({ is_public, can_edit_public })
        .eq('id', currentDoc.id)
        .select('*')
        .single();

      if (error) {
        console.log(error);
        showToast('⚠️ Failed to update access.');
        return;
      }

      currentDoc = data;
      const idx = allDocs.findIndex(d => d.id === data.id);
      if (idx > -1) allDocs[idx] = data;
      updateShareUI();
      renderDocs();
    }

    async function addCollaborator(email) {
      if (!currentDoc || !currentUser) return;
      const list = new Set(currentDoc.shared_with || []);
      list.add(email.toLowerCase());
      const shared_with = Array.from(list);

      const { data, error } = await sb
        .from('docs')
        .update({ shared_with })
        .eq('id', currentDoc.id)
        .select('*')
        .single();

      if (error) {
        console.log(error);
        showToast('⚠️ Failed to add collaborator.');
        return;
      }

      currentDoc = data;
      const idx = allDocs.findIndex(d => d.id === data.id);
      if (idx > -1) allDocs[idx] = data;
      renderDocs();
      showToast('✅ Collaborator added.');
    }

    async function markOpened(docId) {
      await sb.from('docs').update({
        last_opened_at: new Date().toISOString()
      }).eq('id', docId);
    }

    function scheduleAutoSave() {
      if (!currentUser) return;
      docsStatus.textContent = 'Changes not saved.';
      if (autoSaveTimer) clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => saveDoc(false), 1200);
    }

    // --- Realtime: presence + doc updates ---
    function setupRealtime(forceNew = false) {
      teardownRealtime();
      if (!currentDoc) return;

      const channelName = `doc-${currentDoc.id}`;

      presenceChannel = sb.channel(channelName + '-presence', {
        config: { presence: { key: currentUser?.id || 'anon' } }
      });

      presenceChannel
        .on('presence', { event: 'sync' }, () => {
          const state = presenceChannel.presenceState();
          renderPresence(state);
        })
        .subscribe(async status => {
          if (status === 'SUBSCRIBED') {
            presenceChannel.track({
              user_id: currentUser?.id,
              email: currentUser?.email,
              at: new Date().toISOString()
            });
          }
        });

      docChannel = sb.channel(channelName);

      docChannel
        .on('broadcast', { event: 'doc-change' }, payload => {
          if (!currentDoc) return;
          if (payload?.payload?.source === currentUser?.id) return;
          if (payload?.payload?.pages) {
            pages = payload.payload.pages;
            renderPages();
          }
        })
        .on('broadcast', { event: 'comment' }, payload => {
          const c = payload?.payload;
          if (!c) return;
          const div = document.createElement('div');
          div.className = 'docs-comment';
          div.innerHTML = `
            <div class="docs-comment-meta">
              ${escHtml(c.author || 'User')} · just now
            </div>
            <div>${escHtml(c.body)}</div>
          `;
          docsCommentsList.appendChild(div);
        })
        .subscribe();
    }

    function teardownRealtime() {
      if (presenceChannel) {
        sb.removeChannel(presenceChannel);
        presenceChannel = null;
      }
      if (docChannel) {
        sb.removeChannel(docChannel);
        docChannel = null;
      }
      docsPresence.innerHTML = '';
    }

    function renderPresence(state) {
      const users = [];
      Object.values(state || {}).forEach(arr => {
        arr.forEach(entry => {
          users.push(entry);
        });
      });
      docsPresence.innerHTML = users.map(u => {
        const email = u.email || 'user';
        const initials = email[0].toUpperCase();
        return `<div class="docs-presence-avatar" title="${escHtml(email)}">${initials}</div>`;
      }).join('');
    }

    function broadcastChange() {
      if (!docChannel || !currentDoc) return;
      collectPagesFromDOM();
      docChannel.send({
        type: 'broadcast',
        event: 'doc-change',
        payload: {
          source: currentUser?.id,
          pages
        }
      });
    }

    // --- Events ---
    document.getElementById('newDocBtn').addEventListener('click', newDoc);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('saveDocBtn').addEventListener('click', () => saveDoc(true));

    docTitleInput.addEventListener('input', () => {
      scheduleAutoSave();
      broadcastChange();
    });

    document.getElementById('docsCommentSubmit').addEventListener('click', postComment);
    docsCommentInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        postComment();
      }
    });

    document.getElementById('shareCopyBtn').addEventListener('click', () => {
      if (!shareLinkInput.value) return;
      navigator.clipboard.writeText(shareLinkInput.value)
        .then(() => showToast('🔗 Link copied!'))
        .catch(() => showToast('Share: ' + shareLinkInput.value));
    });

    document.getElementById('shareAddBtn').addEventListener('click', () => {
      const email = document.getElementById('shareEmailInput').value.trim();
      if (!email) return;
      addCollaborator(email);
      document.getElementById('shareEmailInput').value = '';
    });

    document.querySelectorAll('.docs-share-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const mode = pill.dataset.access;
        setAccess(mode);
      });
    });

    document.getElementById('commentModeBtn').addEventListener('click', () => {
      isCommentMode = !isCommentMode;
      showToast(isCommentMode ? 'Comment mode (future: highlight text to comment).' : 'Editing mode.');
    });

    // Sidebar view switching
    document.querySelectorAll('.docs-nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.docs-nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        activeView = item.dataset.view;
        renderDocs();
      });
    });

    // Search
    let searchTimer;
    const searchInput = document.getElementById('docsSearch');
    const searchBtn = document.getElementById('docsSearchBtn');

    searchInput.addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchQuery = e.target.value.trim();
      searchTimer = setTimeout(renderDocs, 300);
    });
    searchBtn.addEventListener('click', () => {
      searchQuery = searchInput.value.trim();
      renderDocs();
    });
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        searchQuery = searchInput.value.trim();
        renderDocs();
      }
    });

    // Deep link ?doc=ID
    async function checkDeepLink() {
      const params = new URLSearchParams(location.search);
      const id = params.get('doc');
      if (!id || !currentUser) return;
      if (!allDocs.length) await fetchDocs();
      const doc = allDocs.find(d => d.id === id);
      if (doc) openDoc(doc);
    }

    // Init
    (async () => {
      await initAuth();
      await fetchDocs();
      await checkDeepLink();
    })();
  </script>
</body>
</html>
