<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 — AI</title>
  <link rel="icon" type="image/png" href="../favicon-32x32.png" />
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
  <link rel="stylesheet" href="../main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .ai-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 20px 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }
    .ai-page h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #ai-output {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.6);
      backdrop-filter: blur(10px);
      border: 1px solid var(--br);
      margin-bottom: 14px;
      font-size: 14px;
      line-height: 1.7;
    }
    body.dark #ai-output {
      background: rgba(15,23,42,.7);
    }
    .ai-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      max-width: 85%;
      line-height: 1.6;
      font-size: 14px;
    }
    .ai-bubble.user {
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .ai-bubble.assistant {
      background: rgba(148,163,184,.15);
      color: var(--txt);
      border-bottom-left-radius: 4px;
    }
    body.dark .ai-bubble.assistant { color: var(--txtd); }
    #ai-input-area {
      display: flex;
      gap: 10px;
    }
    #ai-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid var(--br);
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px);
      color: var(--txt);
      font-size: 14px;
      outline: none;
    }
    body.dark #ai-input { color: var(--txtd); }
    #ai-send-btn {
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }
    #ai-send-btn:hover { opacity: .85; }
    .back-btn {
      position: fixed;
      top: 12px;
      left: 90px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      border: 1px solid var(--br);
      cursor: pointer;
      font-size: 13px;
      z-index: 50;
    }
    body.dark .back-btn { background: rgba(15,23,42,.85); color: var(--txtd); }
  </style>
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>

  <button class="back-btn" onclick="window.location.href='/'">← Back</button>
  <button class="sidebar-toggle" id="sidebarToggle">☰ Menu</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark"></div>
      <button id="settingsBtn">⚙</button>
    </div>
    <nav class="nav-list">
      <div class="nav-item" data-href="../">Home</div>
      <div class="nav-item active" data-href="../ai.html">AI</div>
      <div class="nav-item" data-href="../weather.html">Weather</div>
      <div class="nav-item" data-href="../translator.html">Translator</div>
      <div class="nav-item" data-href="../stocks.html">Stocks</div>
      <div class="nav-item" data-href="../url-shortener.html">URL Shortener</div>
      <div class="nav-item" data-href="../chat.html">Chat</div>
      <div class="nav-item" data-href="../games.html">Games</div>
    </nav>
    <div class="sidebar-footer">© 2026 360 INC. · V2.0</div>
  </aside>

  <div class="overlay" id="overlay"></div>
  <div class="settings-panel" id="settingsPanel">
    <h3>Appearance</h3>
    <div class="settings-label">Theme</div>
    <div class="theme-swatches">
      <div class="theme-option"><div class="swatch" data-theme="ocean"></div><span>Ocean</span></div>
      <div class="theme-option"><div class="swatch" data-theme="midnight"></div><span>Midnight</span></div>
      <div class="theme-option"><div class="swatch" data-theme="sunset"></div><span>Sunset</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mint"></div><span>Mint</span></div>
      <div class="theme-option"><div class="swatch" data-theme="neon"></div><span>Neon</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mono"></div><span>Mono</span></div>
    </div>
    <div class="settings-label" style="margin-top:20px;">Mode</div>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <span style="font-size:14px;">Dark mode</span>
      <input type="checkbox" id="darkToggle" />
    </label>
  </div>

  <div class="ai-page">
    <h2>🤖 360 AI</h2>
    <div id="ai-output"></div>
    <div id="ai-input-area">
      <input type="text" id="ai-input" placeholder="Ask anything..." />
      <button id="ai-send-btn">Send</button>
    </div>
  </div>

  <audio id="clickSound" src="../click-sound.mp3" preload="auto"></audio>
  <script src="../main.js"></script>
  <script>
    const aiInput   = document.getElementById("ai-input");
    const aiSendBtn = document.getElementById("ai-send-btn");
    const aiOutput  = document.getElementById("ai-output");
    const GROQ_KEY  = "YOUR_GROQ_API_KEY"; // Replace with real key server-side

    function appendBubble(text, role) {
      const div = document.createElement("div");
      div.className = `ai-bubble ${role}`;
      div.innerHTML = role === "assistant" ? marked.parse(text) : text;
      aiOutput.appendChild(div);
      aiOutput.scrollTop = aiOutput.scrollHeight;
      return div;
    }

    async function sendAI() {
      const prompt = aiInput.value.trim();
      if (!prompt) return;
      aiInput.value = "";
      appendBubble(prompt, "user");

      const bubble = appendBubble("Thinking…", "assistant");

      try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${GROQ_KEY}`
          },
          body: JSON.stringify({
            model: "llama3-8b-8192",
            messages: [
              { role: "system", content: "You are 360 AI, a helpful assistant built into the 360 search engine." },
              { role: "user", content: prompt }
            ],
            stream: true
          })
        });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let full   = "";
        bubble.textContent = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data:")) continue;
            const json = line.replace("data:", "").trim();
            if (json === "[DONE]") continue;
            try {
              const delta = JSON.parse(json).choices?.[0]?.delta?.content;
              if (delta) { full += delta; bubble.innerHTML = marked.parse(full); aiOutput.scrollTop = aiOutput.scrollHeight; }
            } catch {}
          }
        }
      } catch (err) {
        bubble.textContent = "Error: " + err.message;
      }
    }

    aiSendBtn.onclick = sendAI;
    aiInput.addEventListener("keydown", e => { if (e.key === "Enter") sendAI(); });
  </script>
</body>
</html>
