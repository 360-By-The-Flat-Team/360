  <style>
    .ai-page {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 48px);
      max-width: 100%;
      padding: 0;
      gap: 0;
    }

    /* ── Collapsible conversations sidebar ── */
    #conv-sidebar {
      width: 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--br);
      background: rgba(148,163,184,.06);
      overflow: hidden;
      transition: width .25s cubic-bezier(.4,0,.2,1);
      position: relative;
      z-index: 5;
    }
    #conv-sidebar:hover,
    #conv-sidebar.open {
      width: 220px;
    }

    /* Collapsed tab indicator */
    #conv-sidebar::before {
      content: "❮";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(180deg);
      font-size: 10px;
      opacity: .3;
      pointer-events: none;
      transition: opacity .2s;
      white-space: nowrap;
    }
    #conv-sidebar:hover::before,
    #conv-sidebar.open::before {
      opacity: 0;
    }

    #conv-sidebar-inner {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    #conv-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 8px;
      border-bottom: 1px solid var(--br);
      flex-shrink: 0;
      gap: 50px;
    }
    #conv-sidebar-header span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .5;
      white-space: nowrap;
      gap: 50px;
    }
    #new-chat-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      color: inherit;
      opacity: .6;
      flex-shrink: 0;
    }
    #new-chat-btn:hover { opacity: 1; transform: none !important; box-shadow: none !important; }

    #conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-track { background: transparent; }
    #conv-list::-webkit-scrollbar-thumb { background: var(--br); border-radius: 999px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: .15s;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .conv-item:hover { background: rgba(148,163,184,.12); border-color: var(--br); }
    .conv-item.active {
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816 !important;
      font-weight: 600;
      border-color: transparent;
    }
    .conv-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .conv-del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      opacity: 0;
      padding: 0 2px;
      flex-shrink: 0;
      color: inherit;
      line-height: 1;
      border-radius: 4px;
    }
    .conv-item:hover .conv-del-btn { opacity: .5; }
    .conv-del-btn:hover { opacity: 1 !important; color: #ef4444; transform: none !important; box-shadow: none !important; }

    .conv-empty {
      font-size: 12px;
      opacity: .4;
      padding: 8px 6px;
      text-align: center;
      white-space: nowrap;
    }

    /* ── Chat area ── */
    #ai-chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }
    #ai-chat-area h2 {
      padding: 16px 24px 0;
      margin: 0 0 8px;
      font-size: 20px;
      flex-shrink: 0;
    }

    #ai-output {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 140px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #ai-output::-webkit-scrollbar { width: 5px; }
    #ai-output::-webkit-scrollbar-track { background: transparent; }
    #ai-output::-webkit-scrollbar-thumb { background: var(--br); border-radius: 999px; }

    /* ── Input area ── */
    #ai-input-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: transparent;
    }

    /* File preview */
    #file-preview {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid var(--br);
      background: rgba(148,163,184,.08);
      font-size: 12px;
    }
    #file-preview.show { display: flex; }
    #file-preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: .7; }
    #file-cancel {
      background: none; border: none; cursor: pointer;
      color: #ef4444; font-size: 15px; padding: 0 2px; line-height: 1;
      transform: none !important; box-shadow: none !important;
    }

    /* Upload progress */
    #upload-progress {
      height: 3px; background: rgba(148,163,184,.2);
      border-radius: 999px; display: none; overflow: hidden;
    }
    #upload-progress.show { display: block; }
    #upload-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--a), var(--a2));
      border-radius: 999px; width: 0%; transition: width .3s;
    }

    /* Input row */
    #ai-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #ai-attach-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid var(--br);
      background: transparent;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      color: var(--mut); flex-shrink: 0;
      transform: none !important; box-shadow: none !important;
    }
    body.dark #ai-attach-btn { color: var(--mutd); }
    #ai-attach-btn:hover { background: rgba(148,163,184,.12); color: var(--a); }

    #ai-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--br);
      background: rgba(255,255,255,.08);
      color: var(--txt);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      backdrop-filter: blur(8px);
      transition: border-color .2s;
    }
    body.dark #ai-input { color: var(--txtd); background: rgba(15,23,42,.4); }
    #ai-input:focus { border-color: var(--a); }

    #ai-send-btn {
      padding: 0 18px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      transform: none !important; box-shadow: none !important;
    }
    #ai-send-btn:hover { opacity: .85; }

    /* Attached image in bubble */
    .ai-bubble img.attached-img {
      max-width: 280px; max-height: 200px;
      border-radius: 10px; display: block;
      margin-bottom: 6px; border: 1px solid var(--br);
    }
    .ai-bubble a.attached-file {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 8px;
      background: rgba(148,163,184,.1); border: 1px solid var(--br);
      font-size: 13px; text-decoration: none; color: var(--a); margin-bottom: 6px;
    }

    /* ── Toast ── */
    .ai-toast {
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: rgba(15,23,42,.95);
      color: #fff; padding: 8px 20px;
      border-radius: 999px; font-size: 13px;
      font-weight: 600; z-index: 9999;
      pointer-events: none;
      animation: toastIn .2s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 600px) {
      #conv-sidebar { display: none; }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-mark"></div><button id="settingsBtn">⚙</button></div>

      <div class="theme-option"><div class="swatch" data-theme="ocean"></div><span>Ocean</span></div>
      <div class="theme-option"><div class="swatch" data-theme="midnight"></div><span>Midnight</span></div>
      <div class="theme-option"><div class="swatch" data-theme="sunset"></div><span>Sunset</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mint"></div><span>Mint</span></div>
      <div class="theme-option"><div class="swatch" data-theme="neon"></div><span>Neon</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mono"></div><span>Mono</span></div>

      <div class="cursor-option active" data-cursor="default"><div class="cursor-preview preview-default"></div>Default</div>
      <div class="cursor-option" data-cursor="dot"><div class="cursor-preview preview-dot"></div>Dot</div>
      <div class="cursor-option" data-cursor="ring"><div class="cursor-preview preview-ring"></div>Ring</div>
      <div class="cursor-option" data-cursor="crosshair"><div class="cursor-preview preview-crosshair"></div>Crosshair</div>
      <div class="cursor-option" data-cursor="blob"><div class="cursor-preview preview-blob"></div>Blob</div>
      <div class="cursor-option" data-cursor="system"><div class="cursor-preview preview-system"></div>System</div>
    </div>
    <div class="cursor-color-row">
      <label>Cursor color</label>
      <input type="color" id="cursorColorPicker" value="#3b82f6" />
      <button id="cursorColorReset">Reset</button>

      <p id="auth-error" class="auth-error"></p>
      <button id="auth-close-btn" class="close-btn">Close</button>
    </div>
  </div>

  <div class="auth-top-right">
    <button id="signInBtn" class="auth-btn">Sign In</button>
    <button id="signUpBtn" class="auth-btn">Sign Up</button>
    <button id="signOutBtn" class="auth-btn" style="display:none;">Sign Out</button>
  </div>

  <div class="ai-page">
    <div id="conv-sidebar">
      <div id="conv-sidebar-inner">
        <div id="conv-sidebar-header">
          <span>Saved Chats</span>
          <button id="new-chat-btn" title="New chat">＋</button>
        </div>
        <div id="conv-list"></div>
      </div>
    </div>
    <div id="ai-chat-area">
      <h2 style="text-align:center;">360 AI</h2>
      <div id="ai-output"></div>
      <div id="ai-input-area">
        <div id="file-preview">
          <span id="file-preview-thumb"></span>
          <span id="file-preview-name"></span>
          <button id="file-cancel">✕</button>
        </div>
        <div id="upload-progress"><div id="upload-progress-bar"></div></div>
        <div id="ai-input-row">
          <button id="ai-attach-btn" title="Attach file">📎</button>
          <input type="file" id="ai-file-input" style="display:none" />
          <input type="text" id="ai-input" placeholder="Ask anything..." />
          <button id="ai-send-btn">Send</button>
        </div>
      </div>
