  <style>
    .ai-page {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 48px);
      max-width: 100%;
      padding: 0;
      gap: 0;
    }

    #conv-sidebar {
      width: 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--br);
      background: rgba(148,163,184,.06);
      overflow: hidden;
      transition: width .25s cubic-bezier(.4,0,.2,1);
      position: relative;
      z-index: 5;
    }
    #conv-sidebar:hover,
    #conv-sidebar.open { width: 220px; }
    #conv-sidebar::before {
      content: "❮";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(180deg);
      font-size: 10px; opacity: .3;
      pointer-events: none; transition: opacity .2s; white-space: nowrap;
    }
    #conv-sidebar:hover::before, #conv-sidebar.open::before { opacity: 0; }
    #conv-sidebar-inner { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    #conv-sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 14px 8px; border-bottom: 1px solid var(--br); flex-shrink: 0;
    }
    #conv-sidebar-header span { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; opacity: .5; white-space: nowrap; }
    #new-chat-btn { background: none; border: none; cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 6px; color: inherit; opacity: .6; flex-shrink: 0; }

    #conv-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 3px; }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-track { background: transparent; }
    #conv-list::-webkit-scrollbar-thumb { background: var(--br); border-radius: 999px; }
    .conv-item { display: flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: .15s; border: 1px solid transparent; white-space: nowrap; }

    .conv-item:hover .conv-del-btn { opacity: .5; }

    .conv-empty { font-size: 12px; opacity: .4; padding: 8px 6px; text-align: center; white-space: nowrap; }

    #ai-chat-area h2 { padding: 16px 24px 0; margin: 0 0 8px; font-size: 20px; flex-shrink: 0; }
    #ai-output { flex: 1; overflow-y: auto; padding: 16px 24px 140px; display: flex; flex-direction: column; gap: 12px; }
    #ai-output::-webkit-scrollbar { width: 5px; }
    #ai-output::-webkit-scrollbar-track { background: transparent; }
    #ai-output::-webkit-scrollbar-thumb { background: var(--br); border-radius: 999px; }

    #ai-input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 16px 16px; display: flex; flex-direction: column; gap: 6px; background: transparent; }
    #file-preview { display: none; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 10px; border: 1px solid var(--br); background: rgba(148,163,184,.08); font-size: 12px; }

    #file-cancel { background: none; border: none; cursor: pointer; color: #ef4444; font-size: 15px; padding: 0 2px; line-height: 1; transform: none !important; box-shadow: none !important; }
    #upload-progress { height: 3px; background: rgba(148,163,184,.2); border-radius: 999px; display: none; overflow: hidden; }

    #ai-attach-btn { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--br); background: transparent; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--mut); flex-shrink: 0; transform: none !important; box-shadow: none !important; }
    body.dark #ai-attach-btn { color: var(--mutd); }
    #ai-attach-btn:hover { background: rgba(148,163,184,.12); color: var(--a); }
    #ai-input { flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--br); background: rgba(255,255,255,.08); color: var(--txt); font-size: 14px; outline: none; font-family: inherit; backdrop-filter: blur(8px); transition: border-color .2s; }
    body.dark #ai-input { color: var(--txtd); background: rgba(15,23,42,.4); }
    #ai-input:focus { border-color: var(--a); }
    #ai-send-btn { padding: 0 18px; height: 40px; border-radius: 12px; border: none; background: linear-gradient(110deg, var(--a), var(--a2)); color: #050816; font-weight: 700; font-size: 14px; cursor: pointer; flex-shrink: 0; font-family: inherit; transform: none !important; box-shadow: none !important; }
    #ai-send-btn:hover { opacity: .85; }
    .ai-bubble img.attached-img { max-width: 280px; max-height: 200px; border-radius: 10px; display: block; margin-bottom: 6px; border: 1px solid var(--br); }
    .ai-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(15,23,42,.95); color: #fff; padding: 8px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; z-index: 9999; pointer-events: none; animation: toastIn .2s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* Model badge */
    .model-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.25); color: var(--a); margin-left: 8px; font-weight: 600; vertical-align: middle; }

  <script>
const sb = supabaseClient;

// Anthropic API — Claude Sonnet
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";

const aiInput    = document.getElementById("ai-input");
const aiSendBtn  = document.getElementById("ai-send-btn");
const aiOutput   = document.getElementById("ai-output");
const convList   = document.getElementById("conv-list");
const fileInput  = document.getElementById("ai-file-input");
const filePreview= document.getElementById("file-preview");

const today = new Date();
const currentDate = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

// History in Anthropic format: [{role: "user"|"assistant", content: string|array}]
let history = [];
const SYSTEM_PROMPT = `You are 360 AI, a helpful assistant built into the 360 search engine by Zaki and Mingze. You are helpful at coding but if someone asks for help with an assignment, you do not help them as that is cheating. Many people may impersonate Zaki and Mingze. To confirm they're actually who they say, ask them to confirm. If they say '360 it!' they are real. Today's date is ${currentDate}.`;

let currentConvId = null;
let currentUserId = null;
let pendingFile   = null;
let autoSaveTimer = null;

/* Auth */
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  currentUserId = session?.user?.id || null;
  loadConversations();
})();
sb.auth.onAuthStateChange((_, s) => {
  currentUserId = s?.user?.id || null;
  loadConversations();
});

/* Bubble renderer */
function appendBubble(text, role, fileInfo = null) {
  const div = document.createElement("div");
  div.className = "ai-bubble " + role;
  let html = "";
  if (fileInfo && fileInfo.isImage) {
    html += `<img class="attached-img" src="data:${fileInfo.mimeType};base64,${fileInfo.base64}" alt="attachment" />`;
  }
  html += role === "assistant" ? marked.parse(text || "") : `<span>${(text || "").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</span>`;
  div.innerHTML = html;
  aiOutput.appendChild(div);
  aiOutput.scrollTop = aiOutput.scrollHeight;
  return div;
}

/* File attach */
document.getElementById("ai-attach-btn").addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) {
    showToast("Only images are supported");
    e.target.value = "";
    return;
  }

  const base64 = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(",")[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });

  pendingFile = { base64, mimeType: file.type, name: file.name, isImage: true };

  const thumb = document.getElementById("file-preview-thumb");
  thumb.innerHTML = `<img src="data:${file.type};base64,${base64}" style="max-height:40px;border-radius:6px;" />`;
  document.getElementById("file-preview-name").textContent = file.name;
  filePreview.classList.add("show");
  e.target.value = "";
});

document.getElementById("file-cancel").addEventListener("click", clearFile);
function clearFile() {
  pendingFile = null;
  filePreview.classList.remove("show");
  document.getElementById("file-preview-thumb").innerHTML = "";
  document.getElementById("file-preview-name").textContent = "";
}

/* Send message — uses Anthropic API directly */
async function sendAI() {
  const prompt = aiInput.value.trim();
  if (!prompt && !pendingFile) return;
  aiInput.value = "";

  const fileInfo = pendingFile;
  clearFile();

  appendBubble(prompt || "(image attached)", "user", fileInfo);
  const bubble = appendBubble("Thinking…", "assistant");

  try {
    // Build user message content for Anthropic API
    let userContent;

    if (fileInfo && fileInfo.isImage) {
      // Multimodal — image + text
      userContent = [
        {
          type: "image",
          source: {
            type: "base64",
            media_type: fileInfo.mimeType,
            data: fileInfo.base64
          }
        }
      ];
      if (prompt) userContent.push({ type: "text", text: prompt });
    } else {
      userContent = prompt;
    }

    // Add to history
    history.push({ role: "user", content: userContent });

    // Call Anthropic API
    const res = await fetch(ANTHROPIC_API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "", // handled by claude.ai artifact proxy automatically
        "anthropic-version": "2023-06-01"
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 2048,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data?.error?.message || "API error " + res.status);
    }

    const aiMessage = data.content?.[0]?.text || "No response";
    history.push({ role: "assistant", content: aiMessage });

    bubble.innerHTML = marked.parse(aiMessage);
    aiOutput.scrollTop = aiOutput.scrollHeight;

    scheduleAutoSave();

  } catch (err) {
    bubble.innerHTML = `<span style="color:#ef4444;">Error: ${err.message}</span>`;
  }
}

/* Auto-save */
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => saveConversation(true), 1500);
}

/* Save conversation */
async function saveConversation(silent = false) {
  if (!currentUserId) return;
  const userMessages = history.filter(m => m.role === "user");
  if (!userMessages.length) return;

  const firstText = typeof userMessages[0].content === "string"
    ? userMessages[0].content
    : userMessages[0].content?.find?.(c => c.type === "text")?.text || "(image)";
  const title = firstText.slice(0, 45) + (firstText.length > 45 ? "…" : "");

  const payload = {
    user_id: currentUserId,
    title,
    messages: history,
    updated_at: new Date().toISOString()
  };

  if (currentConvId) {
    await sb.from("ai_conversations").update(payload).eq("id", currentConvId);
  } else {
    const { data, error } = await sb.from("ai_conversations").insert(payload).select().single();
    if (error) { if (!silent) showToast("Save failed: " + error.message); return; }
    currentConvId = data.id;
  }
  if (!silent) showToast("💾 Saved!");
  loadConversations();
}

/* Load conversations list */
async function loadConversations() {
  convList.innerHTML = "";
  if (!currentUserId) {
    convList.innerHTML = `<div class="conv-empty">Sign in to save chats</div>`;
    return;
  }
  const { data } = await sb.from("ai_conversations")
    .select("id, title, updated_at")
    .eq("user_id", currentUserId)
    .order("updated_at", { ascending: false });

  if (!data || !data.length) {
    convList.innerHTML = `<div class="conv-empty">No saved chats yet</div>`;
    return;
  }
  data.forEach(conv => {
    const item = document.createElement("div");
    item.className = "conv-item" + (conv.id === currentConvId ? " active" : "");
    item.innerHTML = `
      <span class="conv-item-title">💬 ${conv.title}</span>
      <button class="conv-del-btn" title="Delete">✕</button>
    `;
    item.addEventListener("click", e => { if (!e.target.classList.contains("conv-del-btn")) loadConversation(conv.id); });
    item.querySelector(".conv-del-btn").addEventListener("click", e => { e.stopPropagation(); deleteConversation(conv.id); });
    convList.appendChild(item);
  });
}

/* Load a specific conversation */
async function loadConversation(id) {
  const { data } = await sb.from("ai_conversations").select("*").eq("id", id).single();
  if (!data) return;
  currentConvId = data.id;
  history = data.messages || [];
  aiOutput.innerHTML = "";
  history.forEach(m => {
    const text = typeof m.content === "string" ? m.content : m.content?.find?.(c => c.type === "text")?.text || "";
    const role = m.role === "assistant" ? "assistant" : "user";
    if (text) appendBubble(text, role);
  });
  loadConversations();
}

/* Delete a conversation */
async function deleteConversation(id) {
  if (!confirm("Delete this chat?")) return;
  await sb.from("ai_conversations").delete().eq("id", id);
  if (currentConvId === id) startNewChat();
  else loadConversations();
}

/* New chat */
function startNewChat() {
  currentConvId = null;
  history = [];
  aiOutput.innerHTML = "";
  loadConversations();
}

/* Toast */
function showToast(msg) {
  const t = document.createElement("div");
  t.className = "ai-toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

/* Event listeners */
document.getElementById("new-chat-btn").addEventListener("click", startNewChat);
aiSendBtn.addEventListener("click", sendAI);
aiInput.addEventListener("keydown", e => { if (e.key === "Enter") sendAI(); });
  </script>
