  <style>
    .ai-page {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 48px);
      max-width: 100%;
      padding: 0;
      gap: 0;
    }

    /* ── Conversations sidebar ── */
    #conv-sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--br);
      background: rgba(148,163,184,.06);
      overflow: hidden;
    }
    #conv-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 8px;
      border-bottom: 1px solid var(--br);
      flex-shrink: 0;
    }
    #conv-sidebar-header span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .5;
    }
    #new-chat-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      color: inherit;
      opacity: .6;
      transition: opacity .15s;
    }
    #new-chat-btn:hover { opacity: 1; transform: none; box-shadow: none; }

    #conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-track { background: transparent; }
    #conv-list::-webkit-scrollbar-thumb { background: var(--br); border-radius: 999px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: .15s;
      border: 1px solid transparent;
    }
    .conv-item:hover { background: rgba(148,163,184,.12); border-color: var(--br); }
    .conv-item.active {
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816 !important;
      font-weight: 600;
      border-color: transparent;
    }
    .conv-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .conv-del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      opacity: 0;
      padding: 0 2px;
      flex-shrink: 0;
      color: inherit;
      line-height: 1;
      border-radius: 4px;
      transition: opacity .15s;
    }
    .conv-item:hover .conv-del-btn { opacity: .5; }
    .conv-del-btn:hover { opacity: 1 !important; color: #ef4444; transform: none; box-shadow: none; }

    .conv-empty {
      font-size: 12px;
      opacity: .4;
      padding: 8px 6px;
      text-align: center;
    }

    /* ── Chat area ── */
    #ai-chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }
    #ai-chat-area h2 {
      padding: 16px 24px 0;
      margin: 0 0 8px;
      font-size: 20px;
      flex-shrink: 0;
    }

    #ai-output {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 130px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #ai-output::-webkit-scrollbar { width: 5px; }
    #ai-output::-webkit-scrollbar-track { background: transparent; }
    #ai-output::-webkit-scrollbar-thumb { background: var(--br); border-radius: 999px; }

    #ai-input-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: transparent;
    }

    #ai-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--br);
      background: rgba(255,255,255,.08);
      color: var(--txt);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      backdrop-filter: blur(8px);
      transition: border-color .2s;
    }
    body.dark #ai-input { color: var(--txtd); background: rgba(15,23,42,.4); }
    #ai-input:focus { border-color: var(--a); }

    #ai-send-btn {
      padding: 0 18px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
    }
    #ai-send-btn:hover { opacity: .85; transform: none; box-shadow: none; }

    #save-chat-btn {
      padding: 0 14px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--br);
      background: transparent;
      color: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      opacity: .7;
      transition: opacity .15s;
    }
    #save-chat-btn:hover { opacity: 1; transform: none; box-shadow: none; }

    /* ── Toast ── */
    .ai-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,23,42,.95);
      color: #fff;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      pointer-events: none;
      animation: toastIn .2s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 600px) {
      #conv-sidebar { display: none; }
    }
  </style>
</head>

    <div id="conv-sidebar">
      <div id="conv-sidebar-header">
        <span>Saved Chats</span>

      </div>

    <div id="ai-chat-area">
      <h2>🤖 360 AI</h2>
      <div id="ai-output"></div>
      <div id="ai-input-area">

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL     = "https://yfnwexvsibzqyuqfkepa.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmbndleHZzaWJ6cXl1cWZrZXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDM1MzMsImV4cCI6MjA4MzMxOTUzM30.t_AAtIDD0o7IDN8sUdwdtKxoqFyKdw5n6_-l3e0I-kM";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const aiInput   = document.getElementById("ai-input");
    const aiSendBtn = document.getElementById("ai-send-btn");
    const aiOutput  = document.getElementById("ai-output");
    const convList  = document.getElementById("conv-list");

    const today = new Date();
    const currentDate = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

    let history = [
      { role: "system", content: `You are 360 AI, a helpful assistant built into the 360 search engine by Zaki and Mingze. Today's date is ${currentDate}.` }
    ];
    let currentConvId = null;
    let currentUserId = null;

    /* ── Auth ── */
    const { data: { session } } = await supabase.auth.getSession();
    if (session) currentUserId = session.user.id;
    supabase.auth.onAuthStateChange((_, s) => {
      currentUserId = s?.user?.id || null;
      loadConversations();
    });

    /* ── Bubble renderer ── */
    function appendBubble(text, role) {
      const div = document.createElement("div");
      div.className = "ai-bubble " + role;
      div.innerHTML = role === "assistant" ? marked.parse(text) : text;
      aiOutput.appendChild(div);
      aiOutput.scrollTop = aiOutput.scrollHeight;
      return div;
    }

    /* ── Send message ── */
    async function sendAI() {
      const prompt = aiInput.value.trim();
      if (!prompt) return;
      aiInput.value = "";

      appendBubble(prompt, "user");
      const bubble = appendBubble("Thinking…", "assistant");

      try {
        const { data, error } = await supabase.functions.invoke('hyper-task', {
          body: { message: prompt, memory: history }
        });
        if (error) throw error;

        const aiMessage = data?.reply || "No response";
        history.push({ role: "user", content: prompt });
        history.push({ role: "assistant", content: aiMessage });

        bubble.innerHTML = marked.parse(aiMessage);
        aiOutput.scrollTop = aiOutput.scrollHeight;

        /* Auto-save if already saved once */
        if (currentConvId) await saveConversation(true);

      } catch (err) {
        bubble.innerHTML = `<span style="color:#ef4444;">Error: ${err.message}</span>`;
      }
    }

    /* ── Save conversation ── */
    async function saveConversation(silent = false) {
      if (!currentUserId) { alert("Sign in to save chats!"); return; }
      const userMessages = history.filter(m => m.role === "user");
      if (!userMessages.length) { if (!silent) showToast("Nothing to save yet!"); return; }

      const title = userMessages[0].content.slice(0, 45) + (userMessages[0].content.length > 45 ? "…" : "");
      const payload = {
        user_id:    currentUserId,
        title,
        messages:   history,
        updated_at: new Date().toISOString()
      };

      if (currentConvId) {
        const { error } = await supabase.from("ai_conversations").update(payload).eq("id", currentConvId);
        if (error && !silent) { showToast("Save failed: " + error.message); return; }
      } else {
        const { data, error } = await supabase.from("ai_conversations").insert(payload).select().single();
        if (error) { if (!silent) showToast("Save failed: " + error.message); return; }
        currentConvId = data.id;
      }

      if (!silent) showToast("💾 Saved!");
      loadConversations();
    }

    /* ── Load conversations list ── */
    async function loadConversations() {
      convList.innerHTML = "";
      if (!currentUserId) {
        convList.innerHTML = `<div class="conv-empty">Sign in to save chats</div>`;
        return;
      }
      const { data, error } = await supabase
        .from("ai_conversations")
        .select("id, title, updated_at")
        .eq("user_id", currentUserId)
        .order("updated_at", { ascending: false });

      if (error || !data || !data.length) {
        convList.innerHTML = `<div class="conv-empty">No saved chats yet</div>`;
        return;
      }

      data.forEach(conv => {
        const item = document.createElement("div");
        item.className = "conv-item" + (conv.id === currentConvId ? " active" : "");
        item.dataset.id = conv.id;
        item.innerHTML = `
          <span class="conv-item-title">💬 ${conv.title}</span>
          <button class="conv-del-btn" data-id="${conv.id}" title="Delete">✕</button>
        `;
        item.addEventListener("click", e => {
          if (!e.target.classList.contains("conv-del-btn")) loadConversation(conv.id);
        });
        item.querySelector(".conv-del-btn").addEventListener("click", e => {
          e.stopPropagation();
          deleteConversation(conv.id);
        });
        convList.appendChild(item);
      });
    }

    /* ── Load a specific conversation ── */
    async function loadConversation(id) {
      const { data, error } = await supabase.from("ai_conversations").select("*").eq("id", id).single();
      if (error || !data) return;
      currentConvId = data.id;
      history = data.messages;
      aiOutput.innerHTML = "";
      data.messages.filter(m => m.role !== "system").forEach(m => appendBubble(m.content, m.role));
      loadConversations();
    }

    /* ── Delete a conversation ── */
    async function deleteConversation(id) {
      if (!confirm("Delete this chat?")) return;
      await supabase.from("ai_conversations").delete().eq("id", id);
      if (currentConvId === id) startNewChat();
      else loadConversations();
    }

    /* ── New chat ── */
    function startNewChat() {
      currentConvId = null;
      history = [{ role: "system", content: `You are 360 AI, a helpful assistant built into the 360 search engine by Zaki and Mingze. Today's date is ${currentDate}.` }];
      aiOutput.innerHTML = "";
      loadConversations();
    }

    /* ── Toast ── */
    function showToast(msg) {
      const t = document.createElement("div");
      t.className = "ai-toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2200);
    }

    /* ── Event listeners ── */
    document.getElementById("new-chat-btn").addEventListener("click", startNewChat);
    document.getElementById("save-chat-btn").addEventListener("click", () => saveConversation(false));
    aiSendBtn.addEventListener("click", sendAI);
    aiInput.addEventListener("keydown", e => { if (e.key === "Enter") sendAI(); });

    /* ── Init ── */
    loadConversations();
  </script>
</body>
