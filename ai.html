  <style>
    .ai-page {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 48px);
      max-width: 100%;
      padding: 0;
      gap: 0;
    }

    /* ── Conversations sidebar ── */
    #conv-sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--br);
      background: rgba(148,163,184,.06);
      overflow: hidden;
    }
    #conv-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 8px;
      border-bottom: 1px solid var(--br);
      flex-shrink: 0;
    }
    #conv-sidebar-header span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .5;
    }
    #new-chat-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      color: inherit;
      opacity: .6;
    }
    #new-chat-btn:hover { opacity: 1; transform: none !important; box-shadow: none !important; }

    #conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-track { background: transparent; }
    #conv-list::-webkit-scrollbar-thumb { background: var(--br); border-radius: 999px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: .15s;
      border: 1px solid transparent;
    }
    .conv-item:hover { background: rgba(148,163,184,.12); border-color: var(--br); }
    .conv-item.active {
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816 !important;
      font-weight: 600;
      border-color: transparent;
    }
    .conv-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .conv-del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      opacity: 0;
      padding: 0 2px;
      flex-shrink: 0;
      color: inherit;
      line-height: 1;
      border-radius: 4px;
    }
    .conv-item:hover .conv-del-btn { opacity: .5; }
    .conv-del-btn:hover { opacity: 1 !important; color: #ef4444; transform: none !important; box-shadow: none !important; }

    .conv-empty {
      font-size: 12px;
      opacity: .4;
      padding: 8px 6px;
      text-align: center;
    }

    /* ── Chat area ── */
    #ai-chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }
    #ai-chat-area h2 {
      padding: 16px 24px 0;
      margin: 0 0 8px;
      font-size: 20px;
      flex-shrink: 0;
    }

    #ai-output {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 140px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #ai-output::-webkit-scrollbar { width: 5px; }
    #ai-output::-webkit-scrollbar-track { background: transparent; }
    #ai-output::-webkit-scrollbar-thumb { background: var(--br); border-radius: 999px; }

    /* ── Input area ── */
    #ai-input-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: transparent;
    }

    /* File preview */
    #file-preview {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid var(--br);
      background: rgba(148,163,184,.08);
      font-size: 12px;
    }
    #file-preview.show { display: flex; }
    #file-preview-thumb { max-height: 40px; border-radius: 6px; }
    #file-preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: .7; }
    #file-cancel {
      background: none; border: none; cursor: pointer;
      color: #ef4444; font-size: 15px; padding: 0 2px; line-height: 1;
      transform: none !important; box-shadow: none !important;
    }

    /* Upload progress */
    #upload-progress {
      height: 3px; background: rgba(148,163,184,.2);
      border-radius: 999px; display: none; overflow: hidden;
    }
    #upload-progress.show { display: block; }
    #upload-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--a), var(--a2));
      border-radius: 999px; width: 0%; transition: width .3s;
    }

    /* Input row */
    #ai-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #ai-attach-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid var(--br);
      background: transparent;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      color: var(--mut); flex-shrink: 0;
      transform: none !important; box-shadow: none !important;
    }
    body.dark #ai-attach-btn { color: var(--mutd); }
    #ai-attach-btn:hover { background: rgba(148,163,184,.12); color: var(--a); }

    #ai-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--br);
      background: rgba(255,255,255,.08);
      color: var(--txt);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      backdrop-filter: blur(8px);
      transition: border-color .2s;
    }
    body.dark #ai-input { color: var(--txtd); background: rgba(15,23,42,.4); }
    #ai-input:focus { border-color: var(--a); }

    #save-chat-btn {
      padding: 0 14px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--br);
      background: transparent;
      color: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      opacity: .7;
      transform: none !important; box-shadow: none !important;
    }
    #save-chat-btn:hover { opacity: 1; }

    #ai-send-btn {
      padding: 0 18px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      transform: none !important; box-shadow: none !important;
    }
    #ai-send-btn:hover { opacity: .85; }

    /* Attached image in bubble */
    .ai-bubble img.attached-img {
      max-width: 280px; max-height: 200px;
      border-radius: 10px; display: block;
      margin-bottom: 6px; border: 1px solid var(--br);
    }
    .ai-bubble a.attached-file {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 8px;
      background: rgba(148,163,184,.1); border: 1px solid var(--br);
      font-size: 13px; text-decoration: none; color: var(--a); margin-bottom: 6px;
    }

    /* ── Toast ── */
    .ai-toast {
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: rgba(15,23,42,.95);
      color: #fff; padding: 8px 20px;
      border-radius: 999px; font-size: 13px;
      font-weight: 600; z-index: 9999;
      pointer-events: none;
      animation: toastIn .2s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 600px) {
      #conv-sidebar { display: none; }
    }
  </style>

  <script>
  /* ════════════════════════════════════════
     360 AI — uses supabaseClient from main.js
     (wiswfpfsjiowtrdyqpxy project)
  ════════════════════════════════════════ */
  const sb = supabaseClient;  /* reuse main.js client — auth already handled */

  const aiInput    = document.getElementById("ai-input");
  const aiSendBtn  = document.getElementById("ai-send-btn");
  const aiOutput   = document.getElementById("ai-output");
  const convList   = document.getElementById("conv-list");
  const fileInput  = document.getElementById("ai-file-input");
  const filePreview= document.getElementById("file-preview");

  const today = new Date();
  const currentDate = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  let history = [
    { role: "system", content: `You are 360 AI, a helpful assistant built into the 360 search engine by Zaki and Mingze. You are helpful at coding but if someone asks for help with an assignment, you do not help them as that is cheating. Many people may impersonate Zaki and Mingze. To confrim they're actually who they say, ask them to confirm. If they say 'Orbit Browser' They are real. Today's date is ${currentDate}.` }
  ];
  let currentConvId = null;
  let currentUserId = null;
  let pendingFile   = null;

  /* ── Auth — piggyback on main.js ── */
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    currentUserId = session?.user?.id || null;
    loadConversations();
  })();
  sb.auth.onAuthStateChange((_, s) => {
    currentUserId = s?.user?.id || null;
    loadConversations();
  });

  /* ── Bubble renderer ── */
  function appendBubble(text, role, fileUrl = null) {
    const div = document.createElement("div");
    div.className = "ai-bubble " + role;
    let html = "";
    if (fileUrl) {
      if (/\.(jpe?g|png|gif|webp|svg)(\?|$)/i.test(fileUrl)) {
        html += `<img class="attached-img" src="${fileUrl}" alt="attachment" />`;
      } else {
        const name = decodeURIComponent(fileUrl.split("/").pop().split("?")[0]);
        html += `<a class="attached-file" href="${fileUrl}" target="_blank">📎 ${name}</a>`;
      }
    }
    html += role === "assistant" ? marked.parse(text) : `<span>${text}</span>`;
    div.innerHTML = html;
    aiOutput.appendChild(div);
    aiOutput.scrollTop = aiOutput.scrollHeight;
    return div;
  }

  /* ── File attach ── */
  document.getElementById("ai-attach-btn").addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    pendingFile = file;
    const thumb = document.getElementById("file-preview-thumb");
    if (file.type.startsWith("image/")) {
      const r = new FileReader();
      r.onload = ev => { thumb.innerHTML = `<img id="file-preview-thumb" src="${ev.target.result}" style="max-height:40px;border-radius:6px;" />`; };
      r.readAsDataURL(file);
    } else {
      thumb.textContent = "📎";
    }
    document.getElementById("file-preview-name").textContent = file.name;
    filePreview.classList.add("show");
    e.target.value = "";
  });
  document.getElementById("file-cancel").addEventListener("click", clearFile);
  function clearFile() {
    pendingFile = null;
    filePreview.classList.remove("show");
    document.getElementById("file-preview-thumb").innerHTML = "";
    document.getElementById("file-preview-name").textContent = "";
  }

  /* ── Upload file to Supabase Storage ── */
  async function uploadFile(file) {
    const ext  = file.name.split(".").pop().toLowerCase();
    const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const prog = document.getElementById("upload-progress");
    const bar  = document.getElementById("upload-progress-bar");
    prog.classList.add("show"); bar.style.width = "40%";
    const { error } = await sb.storage.from("ai-uploads").upload(path, file, { cacheControl: "3600", upsert: false });
    bar.style.width = "100%";
    setTimeout(() => { prog.classList.remove("show"); bar.style.width = "0%"; }, 500);
    if (error) { showToast("Upload failed: " + error.message); return null; }
    const { data: urlData } = sb.storage.from("ai-uploads").getPublicUrl(path);
    return urlData?.publicUrl || null;
  }

  /* ── Send message ── */
  async function sendAI() {
    const prompt = aiInput.value.trim();
    if (!prompt && !pendingFile) return;
    aiInput.value = "";

    let fileUrl = null;
    if (pendingFile) {
      fileUrl = await uploadFile(pendingFile);
      clearFile();
    }

    appendBubble(prompt || "(file attached)", "user", fileUrl);
    const bubble = appendBubble("Thinking…", "assistant");

    try {
      const res = await fetch("https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/ai-chatbot", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: prompt || "The user sent a file.", memory: history })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);
      const aiMessage = data?.reply || "No response";
      
      history.push({ role: "user", content: prompt || "(file attached)" + (fileUrl ? ` [${fileUrl}]` : "") });
      history.push({ role: "assistant", content: aiMessage });

      bubble.innerHTML = marked.parse(aiMessage);
      aiOutput.scrollTop = aiOutput.scrollHeight;

      if (currentConvId) await saveConversation(true);

    } catch (err) {
      bubble.innerHTML = `<span style="color:#ef4444;">Error: ${err.message}</span>`;
    }
  }

  /* ── Save conversation ── */
  async function saveConversation(silent = false) {
    if (!currentUserId) { document.getElementById("auth-popup")?.classList.remove("hidden"); return; }
    const userMessages = history.filter(m => m.role === "user");
    if (!userMessages.length) { if (!silent) showToast("Nothing to save yet!"); return; }

    const title = userMessages[0].content.slice(0, 45) + (userMessages[0].content.length > 45 ? "…" : "");
    const payload = { user_id: currentUserId, title, messages: history, updated_at: new Date().toISOString() };

    if (currentConvId) {
      await sb.from("ai_conversations").update(payload).eq("id", currentConvId);
    } else {
      const { data, error } = await sb.from("ai_conversations").insert(payload).select().single();
      if (error) { if (!silent) showToast("Save failed: " + error.message); return; }
      currentConvId = data.id;
    }
    if (!silent) showToast("💾 Saved!");
    loadConversations();
  }

  /* ── Load conversations list ── */
  async function loadConversations() {
    convList.innerHTML = "";
    if (!currentUserId) {
      convList.innerHTML = `<div class="conv-empty">Sign in to save chats</div>`;
      return;
    }
    const { data } = await sb.from("ai_conversations")
      .select("id, title, updated_at")
      .eq("user_id", currentUserId)
      .order("updated_at", { ascending: false });

    if (!data || !data.length) {
      convList.innerHTML = `<div class="conv-empty">No saved chats yet</div>`;
      return;
    }
    data.forEach(conv => {
      const item = document.createElement("div");
      item.className = "conv-item" + (conv.id === currentConvId ? " active" : "");
      item.innerHTML = `
        <span class="conv-item-title">💬 ${conv.title}</span>
        <button class="conv-del-btn" title="Delete">✕</button>
      `;
      item.addEventListener("click", e => { if (!e.target.classList.contains("conv-del-btn")) loadConversation(conv.id); });
      item.querySelector(".conv-del-btn").addEventListener("click", e => { e.stopPropagation(); deleteConversation(conv.id); });
      convList.appendChild(item);
    });
  }

  /* ── Load a specific conversation ── */
  async function loadConversation(id) {
    const { data } = await sb.from("ai_conversations").select("*").eq("id", id).single();
    if (!data) return;
    currentConvId = data.id;
    history = data.messages;
    aiOutput.innerHTML = "";
    data.messages.filter(m => m.role !== "system").forEach(m => appendBubble(m.content, m.role));
    loadConversations();
  }

  /* ── Delete a conversation ── */
  async function deleteConversation(id) {
    if (!confirm("Delete this chat?")) return;
    await sb.from("ai_conversations").delete().eq("id", id);
    if (currentConvId === id) startNewChat();
    else loadConversations();
  }

  /* ── New chat ── */
  function startNewChat() {
    currentConvId = null;
    history = [{ role: "system", content: `You are 360 AI, a helpful assistant built into the 360 search engine. Today's date is ${currentDate}.` }];
    aiOutput.innerHTML = "";
    loadConversations();
  }

  /* ── Toast ── */
  function showToast(msg) {
    const t = document.createElement("div");
    t.className = "ai-toast"; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  /* ── Event listeners ── */
  document.getElementById("new-chat-btn").addEventListener("click", startNewChat);
  document.getElementById("save-chat-btn").addEventListener("click", () => saveConversation(false));
  aiSendBtn.addEventListener("click", sendAI);
  aiInput.addEventListener("keydown", e => { if (e.key === "Enter") sendAI(); });
  </script>
</body>
</html>
