<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 — Page Not Found</title>
  <link rel="icon" type="image/png" href="/favicon-32x32.png" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/cursor.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap {
      max-width: 480px;
      padding: 40px 24px;
      animation: fadeUp .5s cubic-bezier(.22,.68,0,1.1);
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .code {
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -.04em;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 12px;
    }
    .msg {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--txt);
    }
    body.dark .msg { color: var(--txtd); }
    .sub {
      font-size: 14px;
      color: var(--mut);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    body.dark .sub { color: var(--mutd); }
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      transition: opacity .2s, transform .2s;
    }
    .home-btn:hover { opacity: .87; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>

  <div class="wrap">
    <div class="code">404</div>
    <div class="msg">Page not found</div>
    <p class="sub">Looks like this page doesn't exist — or maybe it moved.<br>Head back to 360 and keep searching.</p>
    <a class="home-btn" href="/">← Back to 360</a>
  </div>

  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/cursor.js"></script>
</body>
</html>
