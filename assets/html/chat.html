<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>360 Chat</title>

  <link rel="icon" href="/favicon-32x32.png" />
  <link rel="stylesheet" href="/assets/css/chat.css" />

  <!-- Global app shell -->
  <script src="/assets/js/main.js" defer></script>

  <!-- Chat engine (modernized v2.0.4) -->
  <script src="/assets/js/chat.js" defer></script>

  <!-- Notifications bridge -->
  <script src="/assets/js/notifications.js" defer></script>
</head>

<body class="chat-body">

  <div id="chat-app" class="chat-app">

    <!-- SIDEBAR -->
    <aside id="chatLeft" class="chat-sidebar">

      <header class="chat-sidebar-header">
        <div class="chat-logo">360</div>
        <div class="chat-title">Chat</div>
      </header>

      <!-- PUBLIC -->
      <section class="chat-section">
        <div class="chat-section-label">Public</div>

        <button id="publicRoomItem" class="room-item active">
          <span class="room-icon">🌐</span>
          <span class="room-name">General</span>
          <div class="unread-badge"></div>
        </button>
      </section>

      <!-- COMMUNITIES -->
      <section class="chat-section">
        <div class="chat-section-label">
          Communities
          <button id="createCommunityBtn" class="section-action">＋</button>
          <button id="browseCommunityBtn" class="section-action">🔍</button>
        </div>
        <div id="communities-list" class="room-list"></div>
      </section>

      <!-- DIRECT MESSAGES -->
      <section class="chat-section">
        <div class="chat-section-label">
          Direct Messages
          <button id="startDmBtn" class="section-action">✉️</button>
        </div>
        <div id="dm-list" class="room-list"></div>
      </section>

      <!-- FOOTER -->
      <footer class="chat-sidebar-footer">
        <div class="online-indicator">
          <span class="dot"></span>
          <span><span id="online-count">0</span> online</span>
        </div>
        <button id="notif-btn" class="notif-btn">🔔 Enable</button>
      </footer>

    </aside>

    <!-- MAIN CHAT PANE -->
    <main class="chat-main">

      <!-- HEADER -->
      <header class="chat-main-header">
        <div class="room-header-left">
          <button id="roomsToggle" class="rooms-toggle">☰</button>
          <div id="hdr-icon" class="room-icon-main">🌐</div>
          <div class="room-meta">
            <div id="hdr-name" class="room-name-main">General</div>
            <div id="hdr-desc" class="room-subtitle">Public chat · everyone is here</div>
          </div>
        </div>

        <div class="room-header-right">
          <select id="translateLang" class="translate-select">
            <option value="">Translate: Off</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="hi">Hindi</option>
            <option value="ur">Urdu</option>
            <option value="zh-CN">Chinese (Simplified)</option>
            <option value="ar">Arabic</option>
          </select>
        </div>
      </header>

      <!-- CHAT WINDOW -->
      <section class="chat-window-wrap">
        <div id="chat-window" class="chat-window"></div>
        <div id="typing-indicator" class="typing-indicator"></div>
      </section>

      <!-- REPLY BAR -->
      <div id="reply-bar" class="reply-bar">
        <div class="reply-bar-left">
          <span class="reply-label">Replying to</span>
          <span id="rb-author" class="reply-author"></span>
          <span id="rb-text" class="reply-text"></span>
        </div>
        <button id="reply-cancel" class="reply-cancel">✕</button>
      </div>

      <!-- UPLOAD PREVIEW -->
      <div id="upload-preview" class="upload-preview">
        <div id="up-thumb" class="upload-thumb"></div>
        <div id="up-name" class="upload-name"></div>
        <button id="upload-cancel" class="upload-cancel">✕</button>
      </div>

      <!-- INPUT AREA -->
      <footer class="chat-input-wrap">
        <div class="input-row">
          <button id="emojiBtn" class="input-icon-btn">😊</button>

          <div class="input-area">
            <textarea id="message-input" class="message-input" rows="1" placeholder="Message..."></textarea>
            <div id="inputEmojiPicker" class="emoji-picker-input"></div>
          </div>

          <button id="attachBtn" class="input-icon-btn">📎</button>
          <button id="send-button" class="send-btn">➤</button>
        </div>

        <input id="fileInput" type="file" class="hidden-file-input" />

        <div id="upload-progress" class="upload-progress">
          <div id="upload-progress-bar" class="upload-progress-bar"></div>
        </div>
      </footer>

    </main>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox">
    <img id="lightbox-img" class="lightbox-img" alt="preview" />
  </div>

  <!-- POPUPS -->
  <div id="mention-popup" class="mention-popup"></div>
  <div id="slash-popup" class="slash-popup"></div>

  <!-- CREATE COMMUNITY MODAL -->
  <div id="createCommunityModal" class="modal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2>Create community</h2>
        <button id="cc-cancel" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label>Name</label>
        <input id="cc-name" type="text" />
        <label>Passcode (optional)</label>
        <input id="cc-passcode" type="text" />
        <div id="cc-error" class="modal-error"></div>
      </div>
      <div class="modal-footer">
        <button id="cc-create" class="btn-primary">Create</button>
      </div>
    </div>
  </div>

  <!-- JOIN COMMUNITY MODAL -->
  <div id="joinCommunityModal" class="modal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2>Join community</h2>
        <button id="jc-cancel" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <p id="jc-name"></p>
        <label>Passcode</label>
        <input id="jc-passcode" type="password" />
        <div id="jc-error" class="modal-error"></div>
      </div>
      <div class="modal-footer">
        <button id="jc-join" class="btn-primary">Join</button>
      </div>
    </div>
  </div>

  <!-- START DM MODAL -->
  <div id="startDmModal" class="modal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2>Start DM</h2>
        <button id="dm-cancel" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label>User email</label>
        <input id="dm-email" type="email" />
        <div id="dm-error" class="modal-error"></div>
      </div>
      <div class="modal-footer">
        <button id="dm-start" class="btn-primary">Start</button>
      </div>
    </div>
  </div>

</body>
</html>
