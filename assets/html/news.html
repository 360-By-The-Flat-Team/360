  <style>
    :root {
      --news-bg: #07080f;
      --news-surface: #0e1018;
      --news-border: rgba(255,255,255,0.07);
      --news-card: #12151f;
      --news-card-hover: #181c2a;
      --news-accent: #3b82f6;
      --news-accent2: #8b5cf6;
      --news-text: #f0f2ff;
      --news-muted: rgba(240,242,255,0.45);
      --news-pill-bg: rgba(255,255,255,0.05);
    }

    .news-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px 60px;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── HEADER ── */
    .news-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .news-header-left h2 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 4px;
      background: linear-gradient(110deg, #fff 30%, var(--news-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .news-header-left p {
      margin: 0;
      font-size: 13px;
      color: var(--news-muted);
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 999px;
      border: 1px solid var(--news-border);
      background: var(--news-pill-bg);
      color: var(--news-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .refresh-btn:hover {
      border-color: var(--news-accent);
      background: rgba(59,130,246,0.1);
      transform: none;
      box-shadow: none;
    }
    .refresh-btn.spinning .icon { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CATEGORY PILLS ── */
    .news-cats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .news-cat {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid var(--news-border);
      background: var(--news-pill-bg);
      color: var(--news-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      white-space: nowrap;
      position: relative;
    }
    .news-cat:hover {
      border-color: var(--news-accent);
      color: var(--news-text);
      transform: none;
      box-shadow: none;
    }
    .news-cat.active {
      background: linear-gradient(110deg, var(--news-accent), var(--news-accent2));
      color: #fff;
      border-color: transparent;
    }

    /* Preloaded indicator dot */
    .news-cat::after {
      content: "";
      position: absolute;
      top: 6px;
      right: 8px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22c55e;
      opacity: 0;
      transition: opacity .3s;
    }
    .news-cat.preloaded::after { opacity: 1; }
    .news-cat.active::after { opacity: 0; }

    /* ── SEARCH ── */
    .news-search {
      margin-bottom: 24px;
      position: relative;
    }
    .news-search .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: .5;
      pointer-events: none;
    }
    #news-search-input {
      width: 100%;
      box-sizing: border-box;
      padding: 11px 16px 11px 40px;
      border-radius: 12px;
      border: 1px solid var(--news-border);
      background: var(--news-surface);
      color: var(--news-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    #news-search-input:focus { border-color: var(--news-accent); }
    #news-search-input::placeholder { color: var(--news-muted); }

    /* ── HERO ── */
    .news-hero {
      display: none;
      text-decoration: none;
      color: inherit;
      margin-bottom: 24px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      height: 340px;
      border: 1px solid var(--news-border);
    }
    .news-hero.visible { display: block; }
    .news-hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .news-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7,8,15,.95) 0%, rgba(7,8,15,.3) 60%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px;
    }
    .news-hero-source {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--news-accent);
      margin-bottom: 8px;
    }
    .news-hero-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
      margin-bottom: 8px;
    }
    .news-hero-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── GRID ── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .news-card {
      background: var(--news-card);
      border: 1px solid var(--news-border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform .2s, border-color .2s, background .2s;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(59,130,246,0.4);
      background: var(--news-card-hover);
      box-shadow: 0 8px 32px rgba(59,130,246,0.1);
    }

    .news-card-img {
      width: 100%;
      height: 168px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--news-surface);
      display: block;
    }

    .news-card-placeholder {
      width: 100%;
      height: 168px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.1));
    }

    .news-card-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex: 1;
    }
    .news-card-source {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--news-accent);
    }
    .news-card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14.5px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--news-text);
    }
    .news-card-desc {
      font-size: 12.5px;
      color: var(--news-muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-card-date {
      font-size: 11px;
      color: var(--news-muted);
      margin-top: auto;
      padding-top: 4px;
    }

    /* ── STATUS ── */
    .news-status {
      text-align: center;
      padding: 70px 20px;
      color: var(--news-muted);
      font-size: 14px;
      grid-column: 1 / -1;
    }
    .news-status .spinner {
      width: 30px; height: 30px;
      border: 2.5px solid var(--news-border);
      border-top-color: var(--news-accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }

    /* ── API SOURCE BADGE ── */
    #api-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--news-border);
      color: var(--news-muted);
      margin-left: 10px;
      vertical-align: middle;
    }
    #api-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      transition: background .3s;
    }
    #api-badge.offline .dot { background: #ef4444; }
    #api-badge.cached .dot { background: #3b82f6; }

    /* ── Cache status bar ── */
    #cache-status-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      margin-bottom: 14px;
      border-radius: 10px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      font-size: 12px;
      color: rgba(240,242,255,0.7);
    }
    #cache-status-bar.show { display: flex; }
    #cache-status-bar .cache-dots {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    #cache-status-bar .cache-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background .3s;
    }
    #cache-status-bar .cache-dot.loaded {
      background: #22c55e;
    }
    #cache-status-bar .cache-dot.loading {
      background: #f59e0b;
      animation: pulse .8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 600px) {
      .news-grid { grid-template-columns: 1fr; }
      .news-header { flex-direction: column; align-items: flex-start; }
      .news-hero { height: 240px; }
      .news-hero-title { font-size: 17px; }
    }
  </style>
</head>

  <script>
  /* ════════════════════════════════════════════════════════
     360 NEWS PAGE — Cache-first, instant category switching
  ════════════════════════════════════════════════════════ */

  // Category definitions — must match news-preloader.js
  const CATEGORIES = [
    { id: "top",           label: "Top Stories",   emoji: "📰" },
    { id: "tech",          label: "Tech",           emoji: "💻" },
    { id: "science",       label: "Science",        emoji: "🔬" },
    { id: "business",      label: "Business",       emoji: "📈" },
    { id: "entertainment", label: "Entertainment",  emoji: "🎬" },
    { id: "sports",        label: "Sports",         emoji: "⚽" },
    { id: "world",         label: "World",          emoji: "🌍" }
  ];

  let activeCategory = CATEGORIES[0];
  let allArticles    = [];

  /* ── Build category tabs ── */
  function buildTabs() {
    const catsEl = document.getElementById("news-cats");
    catsEl.innerHTML = "";

    CATEGORIES.forEach((cat, i) => {
      const btn = document.createElement("button");
      btn.className = "news-cat" + (i === 0 ? " active" : "");
      btn.dataset.id = cat.id;
      btn.textContent = cat.emoji + " " + cat.label;

      // Check if already preloaded
      if (window.NewsCache && window.NewsCache.get(cat.id)) {
        btn.classList.add("preloaded");
      }

      // Hover: trigger preload for this category immediately
      btn.addEventListener("mouseenter", () => {
        if (window.NewsCache) window.NewsCache.preload(cat.id);
      });

      btn.addEventListener("click", () => switchCategory(cat, btn));
      catsEl.appendChild(btn);
    });
  }

  /* ── Build cache status dots ── */
  function buildCacheDots() {
    const dotsEl = document.getElementById("cache-dots");
    dotsEl.innerHTML = "";
    CATEGORIES.forEach(cat => {
      const dot = document.createElement("div");
      dot.className = "cache-dot";
      dot.id = "cdot-" + cat.id;
      dot.title = cat.label;
      if (window.NewsCache && window.NewsCache.get(cat.id)) {
        dot.classList.add("loaded");
      }
      dotsEl.appendChild(dot);
    });
  }

  function updateCacheDot(id, state) {
    // state: 'loading' | 'loaded'
    const dot = document.getElementById("cdot-" + id);
    if (!dot) return;
    dot.classList.remove("loading", "loaded");
    dot.classList.add(state);

    // Also mark tab as preloaded
    const btn = document.querySelector(`.news-cat[data-id="${id}"]`);
    if (btn && state === "loaded") btn.classList.add("preloaded");

    // Check if all done
    const allLoaded = CATEGORIES.every(cat =>
      window.NewsCache && window.NewsCache.get(cat.id)
    );
    if (allLoaded) {
      const bar = document.getElementById("cache-status-bar");
      const txt = document.getElementById("cache-status-text");
      if (txt) txt.textContent = "✅ All categories ready — switching is instant!";
      setTimeout(() => bar && bar.classList.remove("show"), 3000);
    }
  }

  /* ── Switch category ── */
  async function switchCategory(cat, btn) {
    activeCategory = cat;
    document.getElementById("news-search-input").value = "";

    // Update active tab
    document.querySelectorAll(".news-cat").forEach(b => b.classList.remove("active"));
    if (btn) btn.classList.add("active");

    await loadNews();
  }

  /* ── Main load function — cache-first ── */
  async function loadNews() {
    const grid  = document.getElementById("news-grid");
    const badge = document.getElementById("api-badge");
    const label = document.getElementById("api-label");
    const ts    = document.getElementById("news-timestamp");
    const btn   = document.getElementById("refreshBtn");

    // 1. Check cache first
    const cached = window.NewsCache ? window.NewsCache.get(activeCategory.id) : null;

    if (cached) {
      // Instant render from cache
      allArticles = cached;
      renderHero(allArticles[0], activeCategory.emoji);
      renderCards(allArticles.slice(1), activeCategory.emoji);
      badge.className = "cached";
      label.textContent = "Cached";
      ts.textContent = "Instant load from cache";
      return;
    }

    // 2. Not cached — show spinner and fetch
    grid.innerHTML = `<div class="news-status"><div class="spinner"></div>Loading ${activeCategory.label}…</div>`;
    document.getElementById("news-hero").classList.remove("visible");
    btn.classList.add("spinning");
    badge.className = "";
    label.textContent = "Loading";

    try {
      // Delegate fetch to preloader's refresh function
      let items = null;
      if (window.NewsCache) {
        items = await window.NewsCache.refresh(activeCategory.id);
      }

      btn.classList.remove("spinning");

      if (!items || !items.length) {
        grid.innerHTML = `<div class="news-status">❌ Failed to load news. Try refreshing.</div>`;
        badge.className = "offline";
        label.textContent = "Offline";
        return;
      }

      allArticles = items;
      badge.className = "";
      label.textContent = "Live";
      ts.textContent = `Updated ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;

      renderHero(allArticles[0], activeCategory.emoji);
      renderCards(allArticles.slice(1), activeCategory.emoji);

    } catch (err) {
      btn.classList.remove("spinning");
      grid.innerHTML = `<div class="news-status">❌ Error: ${err.message}</div>`;
      badge.className = "offline";
      label.textContent = "Error";
    }
  }

  /* ── Force refresh current category ── */
  async function refreshCurrent() {
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");

    // Bust cache for current category
    if (window.NewsCache) {
      await window.NewsCache.refresh(activeCategory.id);
    }

    btn.classList.remove("spinning");
    await loadNews();
  }

  /* ── Image extraction ── */
  function extractImage(item) {
    if (item.enclosure?.link) return item.enclosure.link;
    if (item.thumbnail && !item.thumbnail.includes("blank")) return item.thumbnail;
    const media = item["media:thumbnail"] || item["media:content"];
    if (media?.url) return media.url;
    const m = (item.description || item.content || "").match(/src="([^"]+\.(jpg|jpeg|png|webp))"/i);
    if (m) return m[1];
    return null;
  }

  /* ── Time ago ── */
  function timeAgo(dateStr) {
    if (!dateStr) return "";
    const diff = Date.now() - new Date(dateStr).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (m < 1)  return "Just now";
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    return `${d}d ago`;
  }

  /* ── Render hero ── */
  function renderHero(a, emoji) {
    const el = document.getElementById("news-hero");
    if (!a) { el.classList.remove("visible"); return; }
    const img = extractImage(a);
    el.href = a.link;
    el.classList.add("visible");
    el.innerHTML = img
      ? `<img class="news-hero-img" src="${img}" alt="" onerror="this.style.display='none'">`
      : `<div style="width:100%;height:100%;background:linear-gradient(135deg,rgba(59,130,246,.3),rgba(139,92,246,.2));display:flex;align-items:center;justify-content:center;font-size:64px">${emoji}</div>`;
    el.innerHTML += `
      <div class="news-hero-overlay">
        <div class="news-hero-source">${a.author || "Top Story"}</div>
        <div class="news-hero-title">${a.title}</div>
        <div class="news-hero-desc">${(a.description||"").replace(/<[^>]*>/g,"").slice(0,180)}</div>
      </div>`;
  }

  /* ── Render cards ── */
  function renderCards(list, emoji) {
    const grid = document.getElementById("news-grid");
    if (!list.length) {
      grid.innerHTML = `<div class="news-status">No articles found.</div>`;
      return;
    }
    grid.innerHTML = list.map((a, i) => {
      const img = extractImage(a);
      const imgEl = img
        ? `<img class="news-card-img" src="${img}" alt="" onerror="this.outerHTML='<div class=\\'news-card-placeholder\\'>${emoji}</div>'">`
        : `<div class="news-card-placeholder">${emoji}</div>`;
      const desc   = (a.description || a.content || "").replace(/<[^>]*>/g, "").trim();
      const source = a.author || "News";
      const date   = timeAgo(a.pubDate);
      return `
        <a class="news-card" href="${a.link}" target="_blank" rel="noopener noreferrer"
           style="animation-delay:${i * 0.04}s">
          ${imgEl}
          <div class="news-card-body">
            <div class="news-card-source">${source}</div>
            <div class="news-card-title">${a.title}</div>
            ${desc ? `<div class="news-card-desc">${desc}</div>` : ""}
            <div class="news-card-date">${date}</div>
          </div>
        </a>`;
    }).join("");
  }

  /* ── Filter by search ── */
  function filterNews() {
    const q = document.getElementById("news-search-input").value.toLowerCase().trim();
    if (!q) {
      renderHero(allArticles[0], activeCategory.emoji);
      renderCards(allArticles.slice(1), activeCategory.emoji);
      return;
    }
    document.getElementById("news-hero").classList.remove("visible");
    const filtered = allArticles.filter(a =>
      (a.title       || "").toLowerCase().includes(q) ||
      (a.description || "").toLowerCase().includes(q)
    );
    renderCards(filtered, activeCategory.emoji);
  }

  /* ── Listen for background cache events from preloader ── */
  window.addEventListener("360:newsCached", e => {
    updateCacheDot(e.detail.id, "loaded");

    // If this is the active category and we're still showing spinner, auto-render
    if (e.detail.id === activeCategory.id) {
      const grid = document.getElementById("news-grid");
      if (grid.querySelector(".spinner")) {
        loadNews();
      }
    }
  });

  /* ── Init ── */
  document.addEventListener("DOMContentLoaded", () => {
    buildTabs();
    buildCacheDots();

    // Show cache status bar
    const bar = document.getElementById("cache-status-bar");
    bar.classList.add("show");

    // Mark already-cached categories
    CATEGORIES.forEach(cat => {
      if (window.NewsCache && window.NewsCache.get(cat.id)) {
        updateCacheDot(cat.id, "loaded");
      }
    });

    // Load initial category
    loadNews();

    // Auto-refresh every 5 min
    setInterval(() => {
      if (window.NewsCache) {
        window.NewsCache.refresh(activeCategory.id).then(() => loadNews());
      }
    }, 5 * 60 * 1000);
  });
  </script>
</body>
