<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>360 — Chat</title>

<link rel="icon" href="../favicon-32x32.png" />
<link rel="stylesheet" href="../main.css" />
<link rel="stylesheet" href="../responsive.css" />
<link rel="stylesheet" href="../cursor.css" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* KEEP YOUR UI — only additions below */

#servers-ui, #channels-ui {
  margin-top:10px;
}

.server-pill, .channel-pill {
  padding:6px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.server-pill { background:rgba(148,163,184,.2); }
.channel-pill:hover { background:rgba(148,163,184,.2); }

.mention { color:#60a5fa; font-weight:700; }
</style>
</head>

<body>

<!-- YOUR ORIGINAL UI (UNCHANGED) -->
<button class="sidebar-toggle" id="sidebarToggle">☰ Menu</button>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-mark"></div>
    <button id="settingsBtn">⚙</button>
  </div>

  <nav class="nav-list">
    <div class="nav-item active">Chat</div>
  </nav>

  <!-- NEW -->
  <div id="servers-ui"></div>
  <div id="channels-ui"></div>
</aside>

<div class="chat-page">
  <h2>💬 360 Chat</h2>

  <div id="chat-window"></div>
  <div id="typing-indicator"></div>

  <div id="chat-input-row">
    <input id="message-input" placeholder="Type..." />
    <button id="send-button">Send</button>
  </div>
</div>

<audio id="clickSound" src="../click-sound.mp3"></audio>

<script>
const supabaseClient = window.supabase.createClient("YOUR_URL","YOUR_KEY");

let currentUserId=null;
let currentServer=null;
let currentChannel=null;
let replyingTo=null;

/* ---------- SERVERS ---------- */
async function loadServers(){
  const { data } = await supabaseClient.from("servers").select("*");
  const el=document.getElementById("servers-ui");
  el.innerHTML="";

  data?.forEach(s=>{
    let d=document.createElement("div");
    d.className="server-pill";
    d.textContent=s.name;
    d.onclick=()=>{ currentServer=s.id; loadChannels(); };
    el.appendChild(d);
  });
}

/* ---------- CHANNELS ---------- */
async function loadChannels(){
  const { data } = await supabaseClient
    .from("channels")
    .select("*")
    .eq("server_id",currentServer);

  const el=document.getElementById("channels-ui");
  el.innerHTML="";

  data?.forEach(c=>{
    let d=document.createElement("div");
    d.className="channel-pill";
    d.textContent="# "+c.name;

    d.onclick=async ()=>{
      if(!c.is_public){
        let pass=prompt("Password?");
        if(pass!==c.password) return alert("Wrong password");
      }
      currentChannel=c.id;
      loadMessages();
    };

    el.appendChild(d);
  });
}

/* ---------- LOAD MESSAGES ---------- */
async function loadMessages(){
  const { data } = await supabaseClient
    .from("messages")
    .select("*")
    .eq("channel_id",currentChannel)
    .is("deleted_at",null)
    .order("created_at");

  chatWindow.innerHTML="";
  data?.forEach(renderMessage);
}

/* ---------- RENDER ---------- */
function renderMessage(msg){
  if(document.querySelector(`[data-id="${msg.id}"]`)) return;

  let div=document.createElement("div");
  div.className="chat-message";
  div.dataset.id=msg.id;

  let text = msg.text.replace(/@(\w+)/g,'<span class="mention">@$1</span>');

  div.innerHTML = `<div class="chat-bubble">
    <strong>${msg.username}</strong>
    <p>${text}</p>
  </div>`;

  div.ondblclick=()=>{
    replyingTo=msg.id;
    messageInput.placeholder="Replying...";
  };

  chatWindow.appendChild(div);
  chatWindow.scrollTop=chatWindow.scrollHeight;
}

/* ---------- SEND ---------- */
async function sendMessage(){
  let text=messageInput.value.trim();
  if(!text) return;

  const { data:{ session } } = await supabaseClient.auth.getSession();
  if(!session) return alert("Login first");

  await supabaseClient.from("messages").insert({
    user_id:session.user.id,
    username:session.user.email,
    text,
    channel_id:currentChannel,
    reply_to:replyingTo
  });

  if(text.includes("@")) clickSound.play();

  replyingTo=null;
  messageInput.value="";
}

/* ---------- REALTIME ---------- */
supabaseClient.channel("live")
.on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},
  payload=>{
    if(payload.new.channel_id===currentChannel){
      renderMessage(payload.new);
    }
  })
.subscribe();

/* ---------- TYPING ---------- */
let typingTimeout;

messageInput.addEventListener("input",async ()=>{
  const { data:{ session } } = await supabaseClient.auth.getSession();
  if(!session) return;

  supabaseClient.channel("typing")
    .send({type:"broadcast",event:"typing",payload:{name:session.user.email}});

  clearTimeout(typingTimeout);
});

supabaseClient.channel("typing")
.on("broadcast",{event:"typing"},payload=>{
  typingIndicator.innerHTML = payload.payload.name + " is typing...";
  setTimeout(()=>typingIndicator.innerHTML="",1500);
}).subscribe();

/* ---------- EVENTS ---------- */
sendButton.onclick=sendMessage;
messageInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){ e.preventDefault(); sendMessage(); }
});

/* ---------- INIT ---------- */
(async ()=>{
  const { data:{ session } } = await supabaseClient.auth.getSession();
  currentUserId=session?.user?.id;
  loadServers();
})();
</script>

</body>
</html>
