<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>360 Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  display:flex;
  height:100vh;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* SERVERS */
#servers {
  width:70px;
  background:#020617;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px;
  gap:10px;
}
.server {
  width:50px;height:50px;
  background:#6366f1;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* CHANNELS */
#channels {
  width:180px;
  background:#020617;
  padding:10px;
}
.channel {
  padding:6px;
  cursor:pointer;
}

/* CHAT */
#chat {
  flex:1;
  display:flex;
  flex-direction:column;
}
#messages {
  flex:1;
  overflow:auto;
  padding:10px;
}
.msg {
  margin-bottom:10px;
}
.mention {
  color:#60a5fa;
  font-weight:bold;
}

/* INPUT */
#inputRow {
  display:flex;
}
#input {
  flex:1;
  padding:10px;
}
</style>
</head>

<body>

<div id="servers"></div>
<div id="channels"></div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputRow">
    <input id="input" placeholder="Message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "YOUR_URL",
  "YOUR_ANON_KEY"
);

let user = null;
let currentServer = null;
let currentChannel = null;

/* AUTH */
async function init() {
  const { data } = await supabase.auth.getUser();
  user = data.user;
  loadServers();
}

/* SERVERS */
async function loadServers() {
  const { data } = await supabase.from("servers").select("*");
  const el = document.getElementById("servers");
  el.innerHTML = "";

  data.forEach(s => {
    const d = document.createElement("div");
    d.className="server";
    d.textContent = s.name[0];
    d.onclick = () => {
      currentServer = s.id;
      loadChannels();
    };
    el.appendChild(d);
  });
}

/* CHANNELS */
async function loadChannels() {
  const { data } = await supabase
    .from("channels")
    .select("*")
    .eq("server_id", currentServer);

  const el = document.getElementById("channels");
  el.innerHTML="";

  data.forEach(c=>{
    const d = document.createElement("div");
    d.className="channel";
    d.textContent="# "+c.name;
    d.onclick=()=>{
      currentChannel = c.id;
      loadMessages();
    };
    el.appendChild(d);
  });
}

/* LOAD MESSAGES */
async function loadMessages() {
  const { data } = await supabase
    .from("messages")
    .select("*")
    .eq("channel_id", currentChannel)
    .is("deleted_at", null)
    .order("created_at");

  const el = document.getElementById("messages");
  el.innerHTML="";

  data.forEach(renderMsg);
}

/* RENDER */
function renderMsg(m) {
  const el = document.getElementById("messages");

  let text = m.text.replace(/@(\w+)/g,
    '<span class="mention">@$1</span>'
  );

  const div = document.createElement("div");
  div.className="msg";
  div.innerHTML = `<b>${m.username}</b>: ${text}`;
  el.appendChild(div);
}

/* SEND */
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  if (text.startsWith("/")) {
    runCommand(text);
    input.value="";
    return;
  }

  const { data } = await supabase.from("messages").insert({
    user_id:user.id,
    username:user.email,
    text,
    channel_id:currentChannel
  }).select().single();

  handleMentions(text, data.id);

  input.value="";
  loadMessages();
}

/* MENTIONS */
async function handleMentions(text, msgId) {
  const matches = text.match(/@(\w+)/g);
  if (!matches) return;

  for (let m of matches) {
    const name = m.substring(1);
    const { data } = await supabase
      .from("profiles")
      .select("id")
      .eq("username", name)
      .single();

    if (data) {
      await supabase.from("mentions").insert({
        message_id: msgId,
        mentioned_user: data.id
      });
    }
  }
}

/* NOTIFICATIONS */
async function checkMentions() {
  if (!user) return;

  const { data } = await supabase
    .from("mentions")
    .select("*")
    .eq("mentioned_user", user.id)
    .eq("seen", false);

  if (data.length) {
    document.title = "🔔 New Mention!";
    data.forEach(async m=>{
      await supabase.from("mentions")
        .update({ seen:true })
        .eq("id", m.id);
    });
  }
}
setInterval(checkMentions,3000);

/* COMMANDS */
async function runCommand(text) {
  const args = text.split(" ");
  const cmd = args[0];

  if (cmd === "/server") {
    await supabase.from("servers").insert({
      name: args.slice(1).join(" "),
      owner: user.id
    });
    loadServers();
  }

  else if (cmd === "/channel") {
    await supabase.from("channels").insert({
      name: args[1],
      server_id: currentServer
    });
    loadChannels();
  }

  else if (cmd === "/delete") {
    await supabase.from("messages")
      .update({ deleted_at: new Date() })
      .eq("id", args[1]);
    loadMessages();
  }

  else if (cmd === "/reply") {
    const id = args[1];
    const msg = args.slice(2).join(" ");

    await supabase.from("messages").insert({
      user_id:user.id,
      username:user.email,
      text:msg,
      reply_to:id,
      channel_id:currentChannel
    });

    loadMessages();
  }
}

init();
</script>

</body>
</html>
