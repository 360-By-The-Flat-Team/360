<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>360 Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  display:flex;
  height:100vh;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
}

/* SERVERS */
#servers {
  width:70px;
  background:#020617;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:10px;
}

/* CHANNELS */
#channels {
  width:200px;
  background:#020617;
  padding:10px;
}

.channel {
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}
.channel:hover { background:#1e293b; }

/* CHAT */
#chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

#messages {
  flex:1;
  overflow:auto;
  padding:10px;
}

/* MESSAGE */
.msg {
  margin-bottom:10px;
  animation:fadeIn .2s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1;}
}

.mention { color:#60a5fa; font-weight:bold; }

/* INPUT */
#inputRow {
  display:flex;
  padding:10px;
  background:#020617;
}
#input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

/* TYPING */
#typing {
  font-size:12px;
  color:#94a3b8;
  padding-left:10px;
}

.typingDots span {
  animation:blink 1.2s infinite;
}
.typingDots span:nth-child(2){ animation-delay:.2s }
.typingDots span:nth-child(3){ animation-delay:.4s }

@keyframes blink {
  0%,100%{opacity:0}
  50%{opacity:1}
}
</style>
</head>

<body>

<div id="servers"></div>
<div id="channels"></div>

<div id="chat">
  <div id="messages"></div>
  <div id="typing"></div>
  <div id="inputRow">
    <input id="input" placeholder="Message..." />
  </div>
</div>

<script>
const supabase = window.supabase.createClient("YOUR_URL","YOUR_KEY");

let user, currentServer=null, currentChannel=null, replyingTo=null;

/* INIT */
(async ()=>{
  const { data } = await supabase.auth.getUser();
  user = data.user;
  loadServers();
})();

/* SERVERS */
async function loadServers(){
  const { data } = await supabase.from("servers").select("*");
  const el = document.getElementById("servers");
  el.innerHTML="";
  data?.forEach(s=>{
    const d=document.createElement("div");
    d.textContent=s.name[0];
    d.className="server";
    d.onclick=()=>{ currentServer=s.id; loadChannels(); };
    el.appendChild(d);
  });
}

/* CHANNELS */
async function loadChannels(){
  const { data } = await supabase.from("channels")
    .select("*")
    .eq("server_id",currentServer);

  const el=document.getElementById("channels");
  el.innerHTML="";

  data?.forEach(c=>{
    const d=document.createElement("div");
    d.className="channel";
    d.textContent="# "+c.name;

    d.onclick=async ()=>{
      if(!c.is_public){
        const pass = prompt("Enter channel password:");
        if(pass !== c.password){
          alert("Wrong password");
          return;
        }
      }
      currentChannel=c.id;
      loadMessages();
    };

    el.appendChild(d);
  });
}

/* LOAD MESSAGES */
async function loadMessages(){
  const { data } = await supabase.from("messages")
    .select("*")
    .eq("channel_id",currentChannel)
    .is("deleted_at",null)
    .order("created_at");

  const el=document.getElementById("messages");
  el.innerHTML="";
  data?.forEach(renderMsg);
}

/* RENDER */
function renderMsg(m){
  const el=document.getElementById("messages");

  let text=m.text.replace(/@(\w+)/g,
    '<span class="mention">@$1</span>'
  );

  const div=document.createElement("div");
  div.className="msg";
  div.innerHTML=`<b>${m.username}</b>: ${text}`;

  div.ondblclick=()=>{
    replyingTo=m.id;
    document.getElementById("input").placeholder="Replying...";
  };

  el.appendChild(div);
}

/* SEND + TYPING */
const input = document.getElementById("input");

input.addEventListener("input", async ()=>{
  await supabase.from("typing").upsert({
    user_id:user.id,
    channel_id:currentChannel,
    typing:true
  });
});

input.addEventListener("keydown", async e=>{
  if(e.key==="Enter"){
    const text=input.value.trim();
    if(!text) return;

    if(text.startsWith("/")){
      runCommand(text);
      input.value="";
      return;
    }

    await supabase.from("messages").insert({
      user_id:user.id,
      username:user.email,
      text,
      channel_id:currentChannel,
      reply_to:replyingTo
    });

    input.value="";
    replyingTo=null;
    loadMessages();

    await supabase.from("typing").upsert({
      user_id:user.id,
      channel_id:currentChannel,
      typing:false
    });
  }
});

/* TYPING UI */
async function checkTyping(){
  const { data } = await supabase.from("typing")
    .select("*")
    .eq("channel_id",currentChannel)
    .eq("typing",true);

  const el=document.getElementById("typing");

  if(data?.length){
    el.innerHTML=`Someone is typing 
      <span class="typingDots">
        <span>.</span><span>.</span><span>.</span>
      </span>`;
  } else {
    el.innerHTML="";
  }
}
setInterval(checkTyping,1000);

/* COMMANDS */
async function runCommand(text){
  const args=text.split(" ");
  const cmd=args[0];

  if(cmd==="/server"){
    await supabase.from("servers").insert({ name:args.slice(1).join(" ") });
    loadServers();
  }

  else if(cmd==="/channel"){
    await supabase.from("channels").insert({
      name:args[1],
      server_id:currentServer,
      is_public:true
    });
    loadChannels();
  }

  else if(cmd==="/private"){
    await supabase.from("channels").insert({
      name:args[1],
      password:args[2],
      server_id:currentServer,
      is_public:false
    });
    loadChannels();
  }

  else if(cmd==="/reply"){
    replyingTo=args[1];
  }
}
</script>

</body>
</html>
