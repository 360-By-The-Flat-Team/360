<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>360 Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family:sans-serif; background:#0f172a; color:white; }

/* KEEP YOUR MENU */
#menuBtn {
  position:fixed;
  top:10px;
  left:10px;
  background:#6366f1;
  padding:8px;
  cursor:pointer;
  z-index:100;
}

/* SIDEBAR (your style extended) */
#sidebar {
  position:fixed;
  left:-260px;
  top:0;
  bottom:0;
  width:260px;
  background:#020617;
  transition:.3s;
  padding:10px;
}
#sidebar.open { left:0; }

/* SERVERS */
#servers { display:flex; gap:5px; margin-bottom:10px; }
.server {
  width:40px;height:40px;
  background:#6366f1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  cursor:pointer;
}

/* CHANNELS */
.channel {
  padding:5px;
  cursor:pointer;
  border-radius:6px;
}
.channel:hover { background:#1e293b; }

/* CHAT */
#chat {
  margin-left:0;
  padding-top:60px;
}
#messages {
  height:80vh;
  overflow:auto;
  padding:10px;
}
.msg {
  padding:5px;
  border-radius:6px;
}
.msg:hover { background:rgba(255,255,255,0.05); }

/* INPUT */
#inputRow {
  display:flex;
  padding:10px;
}
#input {
  flex:1;
  padding:10px;
}

/* TYPING */
#typing {
  font-size:12px;
  color:#94a3b8;
  padding-left:10px;
}
.typingDots span {
  animation:blink 1.2s infinite;
}
.typingDots span:nth-child(2){ animation-delay:.2s }
.typingDots span:nth-child(3){ animation-delay:.4s }

@keyframes blink {
  0%,100%{opacity:0}
  50%{opacity:1}
}

.mention { color:#60a5fa; font-weight:bold; }
</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="sidebar">
  <div id="servers"></div>
  <hr>
  <div id="channels"></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="typing"></div>

  <div id="inputRow">
    <input id="input" placeholder="Message..." />
    <input type="file" id="fileUpload">
  </div>
</div>

<audio id="ping" src="https://www.myinstants.com/media/sounds/discord-notification.mp3"></audio>

<script>
const supabase = window.supabase.createClient("YOUR_URL","YOUR_KEY");

let user, currentServer=null, currentChannel=null, replyingTo=null;

/* MENU TOGGLE (kept your nav style) */
menuBtn.onclick = () => {
  sidebar.classList.toggle("open");
};

/* INIT */
(async ()=>{
  const { data } = await supabase.auth.getUser();
  user = data.user;
  loadServers();
})();

/* REALTIME */
supabase.channel('messages-live')
.on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
  if(payload.new.channel_id===currentChannel){
    renderMsg(payload.new);
  }
}).subscribe();

/* SERVERS */
async function loadServers(){
  const { data } = await supabase.from("servers").select("*");
  servers.innerHTML="";
  data?.forEach(s=>{
    let d=document.createElement("div");
    d.className="server";
    d.textContent=s.name[0];
    d.onclick=()=>{currentServer=s.id;loadChannels();}
    servers.appendChild(d);
  });
}

/* CHANNELS */
async function loadChannels(){
  const { data } = await supabase.from("channels")
    .select("*")
    .eq("server_id",currentServer);

  channels.innerHTML="";
  data?.forEach(c=>{
    let d=document.createElement("div");
    d.className="channel";
    d.textContent="# "+c.name;

    d.onclick=async ()=>{
      if(!c.is_public){
        let p=prompt("Password?");
        if(p!==c.password) return alert("Wrong password");
      }
      currentChannel=c.id;
      loadMessages();
    };

    channels.appendChild(d);
  });
}

/* MESSAGES */
async function loadMessages(){
  const { data } = await supabase.from("messages")
    .select("*")
    .eq("channel_id",currentChannel)
    .is("deleted_at",null)
    .order("created_at");

  messages.innerHTML="";
  data?.forEach(renderMsg);
}

/* RENDER */
function renderMsg(m){
  let text=m.text.replace(/@(\w+)/g,'<span class="mention">@$1</span>');

  let div=document.createElement("div");
  div.className="msg";
  div.innerHTML=`<b>${m.username}</b>: ${text}`;

  div.ondblclick=()=>{
    replyingTo=m.id;
    input.placeholder="Replying...";
  };

  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

/* SEND */
input.addEventListener("keydown",async e=>{
  if(e.key==="Enter"){
    let text=input.value.trim();
    if(!text) return;

    if(text.startsWith("/")) return runCommand(text);

    await supabase.from("messages").insert({
      user_id:user.id,
      username:user.email,
      text,
      channel_id:currentChannel,
      reply_to:replyingTo
    });

    if(text.includes("@")) ping.play();

    replyingTo=null;
    input.value="";
  }
});

/* FILE UPLOAD */
fileUpload.onchange=async e=>{
  let file=e.target.files[0];
  let { data } = await supabase.storage.from('uploads').upload(Date.now()+file.name,file);
  let url = supabase.storage.from('uploads').getPublicUrl(data.path).data.publicUrl;

  await supabase.from("messages").insert({
    user_id:user.id,
    username:user.email,
    text:`<img src="${url}" style="max-width:200px">`,
    channel_id:currentChannel
  });
};

/* TYPING */
input.addEventListener("input",()=>{
  supabase.from("typing").upsert({
    user_id:user.id,
    channel_id:currentChannel,
    typing:true
  });
});

setInterval(async ()=>{
  let { data } = await supabase.from("typing")
    .select("*")
    .eq("channel_id",currentChannel)
    .eq("typing",true);

  typing.innerHTML = data?.length
    ? "Someone is typing <span class='typingDots'><span>.</span><span>.</span><span>.</span></span>"
    : "";
},1000);

/* ONLINE USERS */
setInterval(async ()=>{
  await supabase.from("online_users").upsert({
    user_id:user.id,
    last_seen:new Date()
  });
},5000);

/* COMMANDS */
async function runCommand(t){
  let a=t.split(" ");

  if(a[0]==="/server")
    await supabase.from("servers").insert({name:a.slice(1).join(" ")});

  if(a[0]==="/channel")
    await supabase.from("channels").insert({
      name:a[1],
      server_id:currentServer,
      is_public:true
    });

  if(a[0]==="/private")
    await supabase.from("channels").insert({
      name:a[1],
      password:a[2],
      server_id:currentServer,
      is_public:false
    });

  if(a[0]==="/reply")
    replyingTo=a[1];

  loadServers();
}
</script>

</body>
</html>
