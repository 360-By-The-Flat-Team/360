<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>360 — Chat</title>

<link rel="icon" href="../favicon-32x32.png" />
<link rel="stylesheet" href="../main.css" />
<link rel="stylesheet" href="../responsive.css" />
<link rel="stylesheet" href="../cursor.css" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* KEEP YOUR UI — only additions below */

#servers-ui, #channels-ui {
  margin-top:10px;
}

.server-pill, .channel-pill {
  padding:6px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.server-pill { background:rgba(148,163,184,.2); }
.channel-pill:hover { background:rgba(148,163,184,.2); }

.mention { color:#60a5fa; font-weight:700; }
</style>
</head>

<body>

<!-- YOUR ORIGINAL UI (UNCHANGED) -->
<button class="sidebar-toggle" id="sidebarToggle">☰ Menu</button>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-mark"></div>
    <button id="settingsBtn">⚙</button>
  </div>

  <nav class="nav-list">
    <div class="nav-item active">Chat</div>
  </nav>

  <!-- NEW -->
  <div id="servers-ui"></div>
  <div id="channels-ui"></div>
</aside>

<div class="chat-page">
  <h2>💬 360 Chat</h2>

  <div id="chat-window"></div>
  <div id="typing-indicator"></div>

  <div id="chat-input-row">
    <input id="message-input" placeholder="Type..." />
    <button id="send-button">Send</button>
  </div>
</div>

<audio id="clickSound" src="../click-sound.mp3"></audio>

<script>
/* USE YOUR EXISTING CLIENT */
const supabaseClient = window.supabaseClient || window.supabase.createClient("YOUR_URL","YOUR_KEY");

let currentUserId = null;
let currentServer = null;
let currentChannel = null;
let replyingTo = null;

const chatWindow   = document.getElementById("chat-window");
const messageInput = document.getElementById("message-input");
const sendButton   = document.getElementById("send-button");
const typingEl     = document.getElementById("typing-indicator");

/* ---------- SERVERS ---------- */
async function loadServers(){
  const { data } = await supabaseClient.from("servers").select("*");
  const el = document.getElementById("servers-ui");
  if (!el) return;

  el.innerHTML = "";
  data?.forEach(s=>{
    const d = document.createElement("div");
    d.className="server-pill";
    d.textContent=s.name;
    d.onclick=()=>{
      currentServer=s.id;
      loadChannels();
    };
    el.appendChild(d);
  });
}

/* ---------- CHANNELS ---------- */
async function loadChannels(){
  const { data } = await supabaseClient
    .from("channels")
    .select("*")
    .eq("server_id",currentServer);

  const el = document.getElementById("channels-ui");
  if (!el) return;

  el.innerHTML="";
  data?.forEach(c=>{
    const d=document.createElement("div");
    d.className="channel-pill";
    d.textContent="# "+c.name;

    d.onclick=async ()=>{
      if(!c.is_public){
        const pass=prompt("Password?");
        if(pass!==c.password) return alert("Wrong password");
      }
      currentChannel=c.id;
      loadMessages();
    };

    el.appendChild(d);
  });
}

/* ---------- LOAD MESSAGES ---------- */
async function loadMessages(){
  if (!currentChannel) return;

  const { data } = await supabaseClient.from("messages")
    .select("*")
    .eq("channel_id", currentChannel)
    .is("deleted_at", null)
    .order("created_at");

  chatWindow.innerHTML="";
  data?.forEach(renderMessage);
}

/* ---------- RENDER ---------- */
function renderMessage(msg){
  if(document.querySelector(`[data-msg-id="${msg.id}"]`)) return;

  const div=document.createElement("div");
  div.className="chat-message";
  div.dataset.msgId=msg.id;

  const text = (msg.text || "")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/@(\w+)/g,'<span class="mention">@$1</span>');

  div.innerHTML = `
    <div class="chat-bubble">
      <strong>${msg.username || "User"}</strong>
      <p>${text}</p>
    </div>
  `;

  div.ondblclick = ()=>{
    replyingTo = msg.id;
    messageInput.placeholder = "Replying...";
  };

  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

/* ---------- SEND ---------- */
async function sendMessage(){
  const text = messageInput.value.trim();
  if(!text || !currentChannel) return;

  const { data:{ session } } = await supabaseClient.auth.getSession();
  if(!session){
    alert("You must be logged in");
    return;
  }

  const { error } = await supabaseClient.from("messages").insert({
    user_id: session.user.id,
    username: session.user.email,
    text,
    channel_id: currentChannel,
    reply_to: replyingTo
  });

  if(error){
    console.error(error);
    return;
  }

  if(text.includes("@")){
    document.getElementById("clickSound")?.play();
  }

  replyingTo = null;
  messageInput.value = "";
}

/* ---------- REALTIME ---------- */
supabaseClient.channel("messages-live")
  .on("postgres_changes", {
    event:"INSERT",
    schema:"public",
    table:"messages"
  }, payload=>{
    if(payload.new.channel_id === currentChannel){
      renderMessage(payload.new);
    }
  })
  .subscribe();

/* ---------- TYPING ---------- */
const typingChannel = supabaseClient.channel("typing-room");

typingChannel.on("broadcast",{event:"typing"}, payload=>{
  typingEl.innerHTML = payload.payload.name + " is typing...";
  setTimeout(()=>typingEl.innerHTML="",1500);
}).subscribe();

messageInput.addEventListener("input", async ()=>{
  const { data:{ session } } = await supabaseClient.auth.getSession();
  if(!session) return;

  typingChannel.send({
    type:"broadcast",
    event:"typing",
    payload:{ name: session.user.email }
  });
});

/* ---------- EVENTS ---------- */
sendButton.onclick = sendMessage;

messageInput.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

/* ---------- INIT ---------- */
(async ()=>{
  const { data:{ session } } = await supabaseClient.auth.getSession();
  currentUserId = session?.user?.id || null;

  await loadServers();

  /* AUTO CREATE DEFAULT IF NONE */
  const { data: servers } = await supabaseClient.from("servers").select("*");
  if(!servers || servers.length === 0){
    const { data:newServer } = await supabaseClient
      .from("servers")
      .insert({ name:"Main" })
      .select()
      .single();

    await supabaseClient.from("channels").insert({
      name:"general",
      server_id:newServer.id,
      is_public:true
    });

    loadServers();
  }
})();
</script>

</body>
</html>
