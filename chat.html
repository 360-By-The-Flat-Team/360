<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>360 Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; display:flex; height:100vh; font-family:sans-serif; }
#servers { width:70px; background:#111; display:flex; flex-direction:column; align-items:center; gap:10px; padding:10px; }
.server { width:45px;height:45px;background:#5865f2;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer; }
#channels { width:180px;background:#1e1e1e;padding:10px;color:white; }
.channel { cursor:pointer; padding:5px; }
#chat { flex:1; display:flex; flex-direction:column; }
#messages { flex:1; overflow:auto; padding:10px; }
.msg { margin-bottom:10px; }
.mention { color:#60a5fa; font-weight:bold; }
</style>
</head>

<body>

<div id="servers"></div>
<div id="channels"></div>

<div id="chat">
  <div id="messages"></div>
  <input id="input" placeholder="Message..." />
</div>

<script>
const supabase = window.supabase.createClient("YOUR_URL","YOUR_KEY");

let user, currentServer=null, currentChannel=null, replyingTo=null;

/* INIT */
(async ()=>{
  const { data } = await supabase.auth.getUser();
  user = data.user;
  loadServers();
})();

/* SERVERS */
async function loadServers(){
  const { data } = await supabase.from("servers").select("*");
  const el = document.getElementById("servers");
  el.innerHTML="";
  data?.forEach(s=>{
    const d=document.createElement("div");
    d.className="server";
    d.textContent=s.name?.[0]||"?";
    d.onclick=()=>{ currentServer=s.id; loadChannels(); };
    el.appendChild(d);
  });
}

/* CHANNELS */
async function loadChannels(){
  const { data } = await supabase.from("channels").select("*").eq("server_id",currentServer);
  const el=document.getElementById("channels");
  el.innerHTML="";
  data?.forEach(c=>{
    const d=document.createElement("div");
    d.className="channel";
    d.textContent="# "+c.name;
    d.onclick=()=>{ currentChannel=c.id; loadMessages(); };
    el.appendChild(d);
  });
}

/* LOAD MESSAGES */
async function loadMessages(){
  const { data } = await supabase.from("messages")
    .select("*")
    .eq("channel_id",currentChannel)
    .is("deleted_at",null)
    .order("created_at");

  const el=document.getElementById("messages");
  el.innerHTML="";
  data?.forEach(renderMsg);
}

/* RENDER */
function renderMsg(m){
  const el=document.getElementById("messages");

  let text=m.text.replace(/@(\w+)/g,'<span class="mention">@$1</span>');

  const div=document.createElement("div");
  div.className="msg";
  div.innerHTML=`<b>${m.username}</b>: ${text}`;

  div.ondblclick=()=>{
    replyingTo=m.id;
    document.getElementById("input").placeholder="Replying...";
  };

  el.appendChild(div);
}

/* SEND */
document.getElementById("input").addEventListener("keydown",async e=>{
  if(e.key==="Enter"){
    const text=e.target.value.trim();
    if(!text) return;

    if(text.startsWith("/")){
      runCommand(text);
      e.target.value="";
      return;
    }

    const { data } = await supabase.from("messages").insert({
      user_id:user.id,
      username:user.email,
      text,
      channel_id:currentChannel,
      reply_to:replyingTo
    }).select().single();

    if(text.includes("@")){
      document.title="🔔 Mention!";
    }

    replyingTo=null;
    e.target.value="";
    loadMessages();
  }
});

/* COMMANDS */
async function runCommand(text){
  const args=text.split(" ");
  const cmd=args[0];

  if(cmd==="/server"){
    await supabase.from("servers").insert({ name:args.slice(1).join(" ") });
    loadServers();
  }

  else if(cmd==="/channel"){
    await supabase.from("channels").insert({
      name:args[1],
      server_id:currentServer
    });
    loadChannels();
  }

  else if(cmd==="/reply"){
    replyingTo=args[1];
  }

  else if(cmd==="/delete"){
    await supabase.from("messages")
      .update({ deleted_at:new Date() })
      .eq("id",args[1]);
    loadMessages();
  }
}
</script>

</body>
</html>
