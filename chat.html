<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 — Chat</title>
  <link rel="icon" type="image/png" href="../favicon-32x32.png" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="../responsive.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .chat-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 20px 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }
    .chat-page h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.6);
      backdrop-filter: blur(10px);
      border: 1px solid var(--br);
      margin-bottom: 8px;
    }
    body.dark #chat-window { background: rgba(15,23,42,.7); }
    .chat-message {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }
    /* Avatar — supports img URL or Google photo URL */
    .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid var(--br);
    }
    .chat-avatar.initials {
      background: linear-gradient(120deg, var(--a), var(--a2));
      color: #050816;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }
    .chat-bubble {
      background: rgba(148,163,184,.12);
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 80%;
      font-size: 14px;
      line-height: 1.6;
    }
    .chat-bubble strong { font-size: 13px; display: block; margin-bottom: 2px; }
    .chat-bubble p { margin: 0; }
    .role-badge {
      display: inline-block;
      margin-left: 5px;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .role-admin { background: #dc2626; color: #fff; }
    .role-mod   { background: #7c3aed; color: #fff; }
    .role-user  { background: #6b7280; color: #fff; }
    .user-tag   { color: #facc15; font-weight: 700; margin-left: 4px; font-size: 12px; }
    #typing-indicator {
      font-size: 12px;
      color: var(--mut);
      min-height: 18px;
      margin-bottom: 6px;
      padding-left: 4px;
    }
    body.dark #typing-indicator { color: var(--mutd); }
    #chat-input-row { display: flex; gap: 10px; }
    #message-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid var(--br);
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px);
      color: var(--txt);
      font-size: 14px;
      outline: none;
    }
    body.dark #message-input { color: var(--txtd); }
    #send-button {
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      cursor: pointer;
    }
    .back-btn {
      position: fixed;
      top: 12px;
      left: 90px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      border: 1px solid var(--br);
      cursor: pointer;
      font-size: 13px;
      z-index: 50;
    }
    body.dark .back-btn { background: rgba(15,23,42,.85); color: var(--txtd); }
  </style>
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>
  <button class="back-btn" onclick="window.location.href='../'">← Back</button>
  <button class="sidebar-toggle" id="sidebarToggle">☰ Menu</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-mark"></div><button id="settingsBtn">⚙</button></div>
    <nav class="nav-list">
      <div class="nav-item" data-href="../">Home</div>
      <div class="nav-item" data-href="../ai.html">AI</div>
      <div class="nav-item" data-href="../weather.html">Weather</div>
      <div class="nav-item" data-href="../translator.html">Translator</div>
      <div class="nav-item" data-href="../stocks.html">Stocks</div>
      <div class="nav-item" data-href="../url-shortener.html">URL Shortener</div>
      <div class="nav-item active" data-href="../chat.html">Chat</div>
      <div class="nav-item" data-href="../games.html">Games</div>
    </nav>
    <div class="sidebar-footer">© 2026 360 INC. · V2.1</div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <div class="settings-panel" id="settingsPanel">
    <h3>Appearance</h3>
    <div class="settings-label">Theme</div>
    <div class="theme-swatches">
      <div class="theme-option"><div class="swatch" data-theme="ocean"></div><span>Ocean</span></div>
      <div class="theme-option"><div class="swatch" data-theme="midnight"></div><span>Midnight</span></div>
      <div class="theme-option"><div class="swatch" data-theme="sunset"></div><span>Sunset</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mint"></div><span>Mint</span></div>
      <div class="theme-option"><div class="swatch" data-theme="neon"></div><span>Neon</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mono"></div><span>Mono</span></div>
    </div>
    <div class="settings-label" style="margin-top:20px;">Mode</div>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <span style="font-size:14px;">Dark mode</span>
      <input type="checkbox" id="darkToggle" />
    </label>
  </div>

  <div class="chat-page">
    <h2>💬 360 Chat</h2>
    <div id="chat-window"></div>
    <div id="typing-indicator"></div>
    <div id="chat-input-row">
      <input type="text" id="message-input" placeholder="Type a message..." />
      <button id="send-button">Send</button>
    </div>
  </div>

  <audio id="clickSound" src="../click-sound.mp3" preload="auto"></audio>
  <script src="../main.js"></script>
  <script src="../cookie.js"></script>
  <script>
    const chatWindow   = document.getElementById("chat-window");
    const messageInput = document.getElementById("message-input");
    const sendButton   = document.getElementById("send-button");
    const typingEl     = document.getElementById("typing-indicator");
    let typingTimeouts = {};

    /* ── Avatar helpers ── */
    function getInitials(name) {
      if (!name) return "?";
      const p = name.trim().split(" ");
      return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0] + p[1][0]).toUpperCase();
    }

    function renderAvatar(avatarUrl, username) {
      if (avatarUrl) {
        return `<img class="chat-avatar" src="${avatarUrl}" alt="${username}"
                     onerror="this.outerHTML='<div class=\\'chat-avatar initials\\'>${getInitials(username)}</div>'">`; 
      }
      return `<div class="chat-avatar initials">${getInitials(username)}</div>`;
    }

    /* ── Render message ── */
    function renderMessage(msg) {
      const div     = document.createElement("div");
      div.className = "chat-message";
      const roleBadge = msg.role ? `<span class="role-badge role-${msg.role}">${msg.role}</span>` : "";
      const tagBadge  = msg.tag  ? `<span class="user-tag">[${msg.tag}]</span>` : "";
      div.innerHTML = `
        ${renderAvatar(msg.avatar_url, msg.username)}
        <div class="chat-bubble">
          <strong>${msg.username || "Unknown"}${tagBadge}${roleBadge}</strong>
          <p>${msg.text}</p>
        </div>`;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    /* ── Get user profile + Google PFP ── */
    async function getUserProfile(userId) {
      /* First check profiles table */
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("username, avatar_url, role, tag")
        .eq("id", userId)
        .single();

      if (error || !data) return { username: "Unknown", avatar_url: null, role: "user", tag: null };

      /* If no avatar stored, try pulling Google profile picture from auth metadata */
      if (!data.avatar_url) {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const googleAvatar = user?.user_metadata?.avatar_url
                          || user?.user_metadata?.picture
                          || null;
        if (googleAvatar) {
          /* Save it to profiles so we don't have to fetch it every time */
          await supabaseClient.from("profiles")
            .update({ avatar_url: googleAvatar })
            .eq("id", userId);
          data.avatar_url = googleAvatar;
        }
      }

      return data;
    }

    /* ── Load history ── */
    async function loadHistory() {
      const { data } = await supabaseClient
        .from("messages")
        .select("*")
        .order("created_at", { ascending: true });
      if (data) { chatWindow.innerHTML = ""; data.forEach(renderMessage); }
    }

    /* ── Realtime listener ── */
    supabaseClient
      .channel("realtime-messages")
      .on("postgres_changes",
        { event: "INSERT", schema: "public", table: "messages" },
        payload => renderMessage(payload.new))
      .subscribe();

    /* ── Typing indicator ── */
    supabaseClient.channel("typing")
      .on("broadcast", { event: "typing" }, payload => {
        typingEl.textContent = `${payload.payload.username} is typing…`;
        if (typingTimeouts[payload.payload.username])
          clearTimeout(typingTimeouts[payload.payload.username]);
        typingTimeouts[payload.payload.username] = setTimeout(() => {
          typingEl.textContent = "";
        }, 2000);
      }).subscribe();

    messageInput.addEventListener("input", async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return;
      const profile = await getUserProfile(session.user.id);
      supabaseClient.channel("typing").send({
        type: "broadcast", event: "typing",
        payload: { username: profile.username }
      });
    });

    /* ── Slash commands ── */
    async function runCommand(text) {
      const parts = text.trim().split(" ");
      const cmd   = parts[0].toLowerCase();
      const args  = parts.slice(1);
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return;
      const profile = await getUserProfile(session.user.id);
      if (profile.role !== "admin") { alert("Admins only."); return; }
      if (cmd === "/promote")
        await supabaseClient.from("profiles").update({ role: "mod" }).eq("username", args[0]);
      else if (cmd === "/demote")
        await supabaseClient.from("profiles").update({ role: "user" }).eq("username", args[0]);
      else if (cmd === "/tag") {
        const tag = args.slice(1).join(" ");
        await supabaseClient.from("profiles").update({ tag }).eq("username", args[0]);
      } else { alert("Unknown command."); return; }
      alert("Done!");
    }

    /* ── Send message ── */
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (text.startsWith("/")) { await runCommand(text); messageInput.value = ""; return; }
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { openAuth(); return; }
      const profile = await getUserProfile(session.user.id);
      await supabaseClient.from("messages").insert({
        user_id:    session.user.id,
        username:   profile.username,
        avatar_url: profile.avatar_url,
        tag:        profile.tag,
        text,
        role:       profile.role
      });
      messageInput.value = "";
    }

    sendButton.onclick = sendMessage;
    messageInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
    loadHistory();
  </script>
</body>
</html>
