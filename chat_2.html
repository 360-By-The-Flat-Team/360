<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 — Chat</title>
  <link rel="icon" type="image/png" href="../favicon-32x32.png" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="../responsive.css" />
  <link rel="stylesheet" href="../cursor.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .chat-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 20px 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }
    .chat-page h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.6);
      backdrop-filter: blur(10px);
      border: 1px solid var(--br);
      margin-bottom: 8px;
    }
    body.dark #chat-window { background: rgba(15,23,42,.7); }

    .chat-message {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
      position: relative;
    }
    .chat-message:hover .reaction-trigger { opacity: 1; }

    .chat-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid var(--br);
    }
    .chat-avatar.initials {
      background: linear-gradient(120deg, var(--a), var(--a2));
      color: #050816;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }

    .chat-bubble {
      background: rgba(148,163,184,.12);
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 75%;
      font-size: 14px;
      line-height: 1.6;
    }
    .chat-bubble strong { font-size: 13px; display: block; margin-bottom: 2px; }
    .chat-bubble p { margin: 0; word-break: break-word; }

    .role-badge {
      display: inline-block;
      margin-left: 5px;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .role-admin { background: #dc2626; color: #fff; }
    .role-mod   { background: #7c3aed; color: #fff; }
    .role-user  { background: #6b7280; color: #fff; }
    .user-tag   { color: #facc15; font-weight: 700; margin-left: 4px; font-size: 12px; }

    /* ── Reactions ── */
    .reactions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .reaction-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(148,163,184,.15);
      border: 1px solid rgba(148,163,184,.25);
      font-size: 13px;
      cursor: pointer;
      transition: .15s;
      user-select: none;
    }
    .reaction-pill:hover { background: rgba(148,163,184,.3); }
    .reaction-pill.mine {
      background: rgba(59,130,246,.15);
      border-color: rgba(59,130,246,.4);
    }
    .reaction-pill .count {
      font-size: 11px;
      color: var(--mut);
      font-weight: 600;
    }
    body.dark .reaction-pill .count { color: var(--mutd); }

    /* ── Reaction trigger button ── */
    .reaction-trigger {
      opacity: 0;
      transition: opacity .15s;
      background: rgba(148,163,184,.15);
      border: 1px solid var(--br);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 14px;
      cursor: pointer;
      align-self: center;
      flex-shrink: 0;
      position: relative;
    }
    .reaction-trigger:hover { background: rgba(148,163,184,.3); transform: none; box-shadow: none; }

    /* ── Emoji picker ── */
    .emoji-picker {
      position: absolute;
      left: 0;
      bottom: 110%;
      background: white;
      border: 1px solid var(--br);
      border-radius: 12px;
      padding: 8px;
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      width: 220px;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
    }
    body.dark .emoji-picker { background: #0f172a; }
    .emoji-picker.open { display: flex; }
    .emoji-opt {
      font-size: 20px;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: .1s;
      border: none;
      background: none;
      line-height: 1;
    }
    .emoji-opt:hover { background: rgba(148,163,184,.2); transform: scale(1.2); box-shadow: none; }

    /* ── Typing + input ── */
    #typing-indicator {
      font-size: 12px;
      color: var(--mut);
      min-height: 18px;
      margin-bottom: 6px;
      padding-left: 4px;
    }
    body.dark #typing-indicator { color: var(--mutd); }

    #chat-input-row { display: flex; gap: 10px; }
    #message-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid var(--br);
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px);
      color: var(--txt);
      font-size: 14px;
      outline: none;
    }
    body.dark #message-input { color: var(--txtd); }
    #send-button {
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      cursor: pointer;
    }

    .back-btn {
      position: fixed;
      top: 12px; left: 90px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      border: 1px solid var(--br);
      cursor: pointer;
      font-size: 13px;
      z-index: 50;
    }
    body.dark .back-btn { background: rgba(15,23,42,.85); color: var(--txtd); }
  </style>
</head>

  <script src="../main.js"></script>

  <script>

    /* ── Emoji shortcodes ── */
    const SHORTCODES = {
      ':skull:': '💀', ':fire:': '🔥', ':heart:': '❤️',
      ':thumbsup:': '👍', ':thumbsdown:': '👎', ':laugh:': '😂',
      ':cry:': '😢', ':wow:': '😮', ':clap:': '👏',
      ':rose:': '🥀', ':sparkles:': '✨', ':100:': '💯',
      ':rocket:': '🚀', ':eyes:': '👀', ':ok:': '👌',
      ':wave:': '👋', ':pray:': '🙏', ':muscle:': '💪',
      ':star:': '⭐', ':check:': '✅', ':x:': '❌',
      ':warning:': '⚠️', ':clock:': '🕐', ':globe:': '🌍',
      ':search:': '🔍', ':lock:': '🔒', ':key:': '🔑',
      ':zap:': '⚡', ':rainbow:': '🌈', ':sun:': '☀️',
      ':moon:': '🌙', ':snowflake:': '❄️', ':trophy:': '🏆',
      ':crown:': '👑', ':diamond:': '💎', ':money:': '💰',
      ':computer:': '💻', ':phone:': '📱', ':email:': '📧',
      ':360:': '🔵', ':gg:': '🎮', ':bruh:': '😑',
      ':cap:': '🧢', ':nerd:': '🤓', ':robot:': '🤖',
    };

    function applyShortcodes(text) {
      return text.replace(/:[\w]+:/g, match => SHORTCODES[match] || match);
    }

    const EMOJIS = ['👍','❤️','😂','💀','🔥','😮','😢','👏','🥀','✨','💯','🚀'];

    const chatWindow   = document.getElementById("chat-window");
    const messageInput = document.getElementById("message-input");
    const sendButton   = document.getElementById("send-button");
    const typingEl     = document.getElementById("typing-indicator");
    let typingTimeouts = {};
    let currentUserId  = null;
    let openPicker     = null;

    /* ── Close picker on outside click ── */
    document.addEventListener("click", e => {
      if (openPicker && !openPicker.contains(e.target) && !e.target.classList.contains("reaction-trigger")) {
        openPicker.classList.remove("open");
        openPicker = null;
      }
    });

    /* ── Helpers ── */
    function getInitials(name) {
      if (!name) return "?";
      const p = (name||"").trim().split(" ");
      return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0]+p[1][0]).toUpperCase();
    }

    /* ── Render message ── */
    function renderMessage(msg) {
      const existing = document.querySelector(`[data-msg-id="${msg.id}"]`);
      if (existing) return;

      const div = document.createElement("div");
      div.className = "chat-message";
      div.dataset.msgId = msg.id;

      const roleBadge = msg.role && msg.role !== "user"
        ? `<span class="role-badge role-${msg.role}">${msg.role}</span>` : "";
      const tagBadge = msg.tag
        ? `<span class="user-tag">[${msg.tag}]</span>` : "";
      const safeText = (msg.text||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");

      const avatarHTML = msg.avatar_url
        ? `<img class="chat-avatar" src="${msg.avatar_url}" alt="${msg.username}" onerror="this.outerHTML='<div class=&quot;chat-avatar initials&quot;>${getInitials(msg.username)}</div>'">`
        : `<div class="chat-avatar initials">${getInitials(msg.username)}</div>`;

      div.innerHTML = `
        ${avatarHTML}
        <div style="flex:1;min-width:0;">
          <div class="chat-bubble">
            <strong>${msg.username||"Unknown"}${tagBadge}${roleBadge}</strong>
            <p>${safeText}</p>
          </div>
          <div class="reactions-row" id="reactions-${msg.id}"></div>
        </div>
        <button class="reaction-trigger" data-msg="${msg.id}">😊</button>`;

      /* Emoji picker */
      const picker = document.createElement("div");
      picker.className = "emoji-picker";
      picker.dataset.msgId = msg.id;
      EMOJIS.forEach(em => {
        const btn = document.createElement("button");
        btn.className = "emoji-opt";
        btn.textContent = em;
        btn.addEventListener("click", e => {
          e.stopPropagation();
          toggleReaction(msg.id, em);
          picker.classList.remove("open");
          openPicker = null;
        });
        picker.appendChild(btn);
      });

      const trigger = div.querySelector(".reaction-trigger");
      trigger.style.position = "relative";
      trigger.appendChild(picker);

      trigger.addEventListener("click", e => {
        e.stopPropagation();
        if (openPicker && openPicker !== picker) {
          openPicker.classList.remove("open");
        }
        picker.classList.toggle("open");
        openPicker = picker.classList.contains("open") ? picker : null;
      });

      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      /* Load reactions for this message */
      loadReactions(msg.id);
    }

    /* ── Load reactions ── */
    async function loadReactions(msgId) {
      const { data } = await supabaseClient
        .from("reactions")
        .select("emoji, user_id")
        .eq("message_id", msgId);
      if (data) renderReactions(msgId, data);
    }

    function renderReactions(msgId, reactions) {
      const row = document.getElementById(`reactions-${msgId}`);
      if (!row) return;

      /* Group by emoji */
      const grouped = {};
      reactions.forEach(r => {
        if (!grouped[r.emoji]) grouped[r.emoji] = [];
        grouped[r.emoji].push(r.user_id);
      });

      row.innerHTML = "";
      Object.entries(grouped).forEach(([emoji, users]) => {
        const pill = document.createElement("div");
        pill.className = "reaction-pill" + (users.includes(currentUserId) ? " mine" : "");
        pill.innerHTML = `${emoji}<span class="count">${users.length}</span>`;
        pill.addEventListener("click", () => toggleReaction(msgId, emoji));
        row.appendChild(pill);
      });
    }

    /* ── Toggle reaction ── */
    async function toggleReaction(msgId, emoji) {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { openAuth(); return; }

      /* Check if already reacted */
      const { data: existing } = await supabaseClient
        .from("reactions")
        .select("id")
        .eq("message_id", msgId)
        .eq("user_id", session.user.id)
        .eq("emoji", emoji)
        .single();

      if (existing) {
        await supabaseClient.from("reactions").delete()
          .eq("message_id", msgId)
          .eq("user_id", session.user.id)
          .eq("emoji", emoji);
      } else {
        await supabaseClient.from("reactions").insert({
          message_id: msgId,
          user_id: session.user.id,
          emoji
        });
      }

      loadReactions(msgId);
    }

    /* ── Get profile ── */
    async function getProfile(userId) {
      try {
        const { data } = await supabaseClient.from("profiles")
          .select("username,avatar_url,role,tag").eq("id",userId).single();
        if (!data) return { username:"Unknown", avatar_url:null, role:"user", tag:null };
        if (!data.avatar_url) {
          const { data:{ user } } = await supabaseClient.auth.getUser();
          const av = user?.user_metadata?.avatar_url || user?.user_metadata?.picture || null;
          if (av) { data.avatar_url=av; await supabaseClient.from("profiles").update({avatar_url:av}).eq("id",userId); }
        }
        return data;
      } catch { return { username:"Unknown", avatar_url:null, role:"user", tag:null }; }
    }

    /* ── Load history ── */
    async function loadHistory() {
      chatWindow.innerHTML = "";
      const { data } = await supabaseClient.from("messages")
        .select("*").is("deleted_at", null)
        .order("created_at", { ascending:false }).limit(100);
      if (data) data.reverse().forEach(renderMessage);
    }

    /* ── Realtime messages ── */
    supabaseClient.channel("realtime-messages")
      .on("postgres_changes", { event:"INSERT", schema:"public", table:"messages" },
        payload => renderMessage(payload.new))
      .subscribe();

    /* ── Realtime reactions ── */
    supabaseClient.channel("realtime-reactions")
      .on("postgres_changes", { event:"*", schema:"public", table:"reactions" },
        async payload => {
          const msgId = payload.new?.message_id || payload.old?.message_id;
          if (msgId) loadReactions(msgId);
        })
      .subscribe();

    /* ── Typing ── */
    supabaseClient.channel("typing-360")
      .on("broadcast", { event:"typing" }, payload => {
        const name = payload.payload?.username; if(!name) return;
        typingEl.textContent = name+" is typing…";
        clearTimeout(typingTimeouts[name]);
        typingTimeouts[name] = setTimeout(() => { typingEl.textContent=""; }, 2000);
      }).subscribe();

    messageInput.addEventListener("input", async () => {
      const { data:{ session } } = await supabaseClient.auth.getSession();
      if (!session) return;
      const p = await getProfile(session.user.id);
      supabaseClient.channel("typing-360").send({ type:"broadcast", event:"typing", payload:{ username:p.username } });
    });

    /* ── Slash commands ── */
    async function runCommand(text, profile) {
      if (profile.role !== "admin" && profile.role !== "mod") { alert("Admins and mods only."); return; }
      const parts = text.trim().split(" ");
      const cmd   = parts[0].toLowerCase();
      const args  = parts.slice(1);

      if (cmd === "/promote") {
        await supabaseClient.from("profiles").update({ role:"mod" }).eq("username", args[0]);
        alert(`Promoted ${args[0]} to mod`);
      } else if (cmd === "/demote") {
        await supabaseClient.from("profiles").update({ role:"user" }).eq("username", args[0]);
        alert(`Demoted ${args[0]}`);
      } else if (cmd === "/tag") {
        const tag = args.slice(1).join(" ");
        await supabaseClient.from("profiles").update({ tag }).eq("username", args[0]);
        alert(`Tagged ${args[0]}: ${tag}`);
      } else if (cmd === "/ban") {
        if (profile.role !== "admin") { alert("Admins only."); return; }
        await supabaseClient.from("profiles").update({ banned:true }).eq("username", args[0]);
        alert(`Banned ${args[0]}`);
      } else if (cmd === "/unban") {
        await supabaseClient.from("profiles").update({ banned:false }).eq("username", args[0]);
        alert(`Unbanned ${args[0]}`);
      } else if (cmd === "/delete") {
        /* /delete <message_id> */
        const msgId = parseInt(args[0]);
        if (!msgId) { alert("Usage: /delete <message_id>"); return; }
        await supabaseClient.from("messages")
          .update({ deleted_at: new Date().toISOString() })
          .eq("id", msgId);
        const el = document.querySelector(`[data-msg-id="${msgId}"]`);
        if (el) el.remove();
        alert(`Message ${msgId} deleted`);
      } else {
        alert("Unknown command. Available: /promote /demote /tag /ban /unban /delete");
      }
    }

    /* ── Send message ── */
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      const { data:{ session } } = await supabaseClient.auth.getSession();
      if (!session) { openAuth(); return; }
      const p = await getProfile(session.user.id);
      if (text.startsWith("/")) { await runCommand(text, p); messageInput.value=""; return; }
      const { error } = await supabaseClient.from("messages").insert({
        user_id:    session.user.id,
        username:   p.username || session.user.email,
        avatar_url: p.avatar_url,
        tag:        p.tag,
        text:       applyShortcodes(text),
        role:       p.role || "user"
      });
      if (error) { console.error("Send error:", error.message); return; }
      messageInput.value = "";
    }

    sendButton.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    /* ── Init ── */
    (async () => {
      const { data:{ session } } = await supabaseClient.auth.getSession();
      currentUserId = session?.user?.id || null;
      loadHistory();
    })();
  </script>
</body>
</html>
