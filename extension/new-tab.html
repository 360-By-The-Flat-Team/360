<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360</title>

<style>
*{box-sizing:border-box} body{
margin:0;font-family:system-ui;color:#fff;height:100vh;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background-size:cover;background-position:center;transition:.5s}

/* GLASS */
.glass{backdrop-filter:blur(20px);background:rgba(20,20,30,.6);
border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.5);}

/* SEARCH */
.search{width:600px;display:flex;padding:10px}
.search input{flex:1;background:transparent;border:none;color:white;font-size:18px;outline:none}
.search button{background:#4f8cff;border:none;padding:10px 15px;border-radius:10px;color:white}

/* GRID */
.grid{margin-top:30px;display:grid;grid-template-columns:repeat(4,180px);gap:20px}

/* CARD */
.card{padding:15px;height:180px;overflow:hidden;cursor:grab}

/* SETTINGS PANEL */
.settings{
position:fixed;top:20px;right:20px;padding:15px;width:250px;display:none}
.settings input{width:100%}

/* CHAT PANEL */
.chat{
position:fixed;bottom:0;right:0;width:300px;height:400px;
display:none;flex-direction:column}
.chat textarea{flex:1;background:#111;color:white;border:none}
.chat button{background:#4f8cff;border:none;color:white}
</style>
</head>

<body>

<h1>360</h1>

<form id="search" class="search glass">
<input id="q" placeholder="Search 360...">
<button>Go</button>
</form>

<div class="grid" id="grid">

<div class="card glass" draggable="true" id="clock"></div>

<div class="card glass" draggable="true">
<b>Todo</b>
<div id="todos"></div>
<input id="todoInput">
</div>

<div class="card glass" draggable="true">
<b>Calc</b>
<input id="calcDisplay" readonly>
<div id="calcBtns"></div>
</div>

<div class="card glass" draggable="true">
<b>Spotify</b>
<iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M" width="100%" height="80"></iframe>
</div>

</div>

<!-- SETTINGS -->
<div class="settings glass" id="settings">
<b>Settings</b>
<br>Background URL:
<input id="bgInput">
<button onclick="saveSettings()">Save</button>
</div>

<!-- CHAT -->
<div class="chat glass" id="chat">
<textarea id="chatBox" placeholder="Ask AI..."></textarea>
<button onclick="sendChat()">Send</button>
</div>

<script>
/* SEARCH */
search.onsubmit=e=>{
e.preventDefault();
location.href="https://360-search.com/?q="+encodeURIComponent(q.value);
};

/* CLOCK */
setInterval(()=>clock.textContent=new Date().toLocaleTimeString(),1000);

/* BACKGROUND */
const defaultBG=[
"https://source.unsplash.com/random/1920x1080?nature",
"https://source.unsplash.com/random/1920x1080?space"
];

function loadBG(){
let s=JSON.parse(localStorage.getItem("settings")||"{}");
document.body.style.backgroundImage="url("+(s.bg||defaultBG[Math.floor(Math.random()*2)])+")";
}
loadBG();

/* SETTINGS */
function saveSettings(){
let s={bg:bgInput.value};
localStorage.setItem("settings",JSON.stringify(s));
loadBG();
}

/* TODO */
function loadTodos(){
let t=JSON.parse(localStorage.getItem("todos")||"[]");
todos.innerHTML="";
t.forEach((x,i)=>{
let d=document.createElement("div");
d.innerHTML=x+" <button onclick='del("+i+")'>x</button>";
todos.appendChild(d);
});
}
function del(i){
let t=JSON.parse(localStorage.getItem("todos"));
t.splice(i,1);
localStorage.setItem("todos",JSON.stringify(t));
loadTodos();
}
todoInput.onkeypress=e=>{
if(e.key==="Enter"){
let t=JSON.parse(localStorage.getItem("todos")||"[]");
t.push(todoInput.value);
localStorage.setItem("todos",JSON.stringify(t));
todoInput.value="";
loadTodos();
}};
loadTodos();

/* SAFE CALC */
const btns=["7","8","9","/","4","5","6","*","1","2","3","-","0",".","=","+"];
btns.forEach(b=>{
let btn=document.createElement("button");
btn.textContent=b;
btn.onclick=()=>{
if(b==="="){
try{calcDisplay.value=Function("return "+calcDisplay.value)();}
catch{calcDisplay.value="err";}
}else calcDisplay.value+=b;
};
calcBtns.appendChild(btn);
});

/* DRAGGABLE GRID */
let drag;
document.querySelectorAll(".card").forEach(c=>{
c.ondragstart=()=>drag=c;
c.ondragover=e=>e.preventDefault();
c.ondrop=e=>{
e.preventDefault();
grid.insertBefore(drag,c);
};
});

/* SHORTCUTS */
document.onkeydown=e=>{
if(e.key==="s") settings.style.display="block";
if(e.key==="c") chat.style.display="flex";
};

/* CHAT (HOOK YOUR API HERE) */
function sendChat(){
let msg=chatBox.value;
chatBox.value="Thinking...";
setTimeout(()=>{
chatBox.value="(Hook your AI API here)";
},1000);
}
</script>

</body>
</html>
