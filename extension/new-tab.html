<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 — New Tab</title>

  <!-- Styles -->
  <link rel="stylesheet" href="../chat.css">
  <link rel="stylesheet" href="../cursor.css">

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 700px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .search-box {
      display: flex;
      background: #1a1d25;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 18px;
      outline: none;
      padding: 10px;
    }

    .search-box button {
      background: #4f8cff;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .tools {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tool {
      background: #1a1d25;
      padding: 20px;
      border-radius: 12px;
      width: 150px;
      cursor: pointer;
      transition: 0.2s;
    }

    .tool:hover {
      background: #232734;
    }

    .tool h3 {
      margin: 0 0 10px;
    }

    .todo-list {
      margin-top: 10px;
      text-align: left;
      font-size: 14px;
    }

    .todo-list div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .todo-input {
      width: 100%;
      margin-top: 10px;
      padding: 5px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .quote {
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>360</h1>

    <!-- SEARCH -->
    <form id="search-form" class="search-box">
      <input id="search-input" type="text" placeholder="Search 360..." />
      <button type="submit">Search</button>
    </form>

    <!-- TOOLS -->
    <div class="tools">
      
      <!-- TODO -->
      <div class="tool">
        <h3>Todo</h3>
        <div id="todo-list" class="todo-list"></div>
        <input id="todo-input" class="todo-input" placeholder="Add task..." />
      </div>

      <!-- CLOCK -->
      <div class="tool">
        <h3>Time</h3>
        <div id="clock"></div>
      </div>

      <!-- QUOTE -->
      <div class="tool">
        <h3>Quote</h3>
        <div id="quote" class="quote"></div>
      </div>

    </div>
  </div>

  <script>
    // =========================
    // SEARCH ENGINE
    // =========================
    document.getElementById("search-form").addEventListener("submit", e => {
      e.preventDefault();
      const q = document.getElementById("search-input").value.trim();
      if (!q) return;
      window.location.href = `https://360-search.com/?q=${encodeURIComponent(q)}`;
    });

    // =========================
    // CLOCK
    // =========================
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // =========================
    // QUOTES
    // =========================
    const quotes = [
      "Stay focused.",
      "Build. Break. Repeat.",
      "Small steps every day.",
      "You got this.",
      "Consistency wins."
    ];

    document.getElementById("quote").textContent =
      quotes[Math.floor(Math.random() * quotes.length)];

    // =========================
    // TODO LIST (WORKING)
    // =========================
    const todoInput = document.getElementById("todo-input");
    const todoList = document.getElementById("todo-list");

    function loadTodos() {
      const todos = JSON.parse(localStorage.getItem("todos") || "[]");
      todoList.innerHTML = "";
      todos.forEach((t, i) => {
        const div = document.createElement("div");
        div.innerHTML = `
          <span>${t}</span>
          <button data-i="${i}">x</button>
        `;
        todoList.appendChild(div);
      });
    }

    function saveTodos(todos) {
      localStorage.setItem("todos", JSON.stringify(todos));
    }

    todoInput.addEventListener("keypress", e => {
      if (e.key === "Enter") {
        const val = todoInput.value.trim();
        if (!val) return;

        const todos = JSON.parse(localStorage.getItem("todos") || "[]");
        todos.push(val);
        saveTodos(todos);
        todoInput.value = "";
        loadTodos();
      }
    });

    todoList.addEventListener("click", e => {
      if (e.target.tagName === "BUTTON") {
        const i = e.target.getAttribute("data-i");
        const todos = JSON.parse(localStorage.getItem("todos") || "[]");
        todos.splice(i, 1);
        saveTodos(todos);
        loadTodos();
      }
    });

    loadTodos();
  </script>
</body>
</html>
