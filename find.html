  <style>
    /* ── Search results page layout ── */
    .search-results-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: 48px; /* clear the sidebar toggle */
    }

    /* ── Top search bar strip ── */
    .search-bar-strip {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--br);
      padding: 10px 16px 10px 100px; /* left pad clears sidebar toggle + back btn */
      display: flex;
      align-items: center;
      gap: 12px;
    }
    body.dark .search-bar-strip {
      background: rgba(5,8,22,0.92);
    }

    /* 360 logo mark in strip */
    .strip-logo {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .06em;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
      text-decoration: none;
    }

    /* Search form inside strip */
    #strip-search-form {
      display: flex;
      align-items: center;
      flex: 1;
      max-width: 620px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid var(--br);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #strip-search-form:focus-within {
      border-color: var(--a);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    body.dark #strip-search-form {
      background: rgba(15,23,42,0.6);
      border-color: rgba(255,255,255,0.15);
    }

    #strip-search-input {
      flex: 1;
      padding: 10px 18px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--txt);
      font-family: inherit;
      caret-color: var(--a);
    }
    body.dark #strip-search-input { color: var(--txtd); }
    #strip-search-input::placeholder { color: var(--mut); }
    body.dark #strip-search-input::placeholder { color: var(--mutd); }

    #strip-search-btn {
      flex-shrink: 0;
      margin: 5px 6px 5px 0;
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(120deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
      transform: none !important;
      box-shadow: none !important;
    }
    #strip-search-btn:hover { opacity: 0.85; }

    /* ── Results iframe ── */
    #results-frame-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #results-iframe {
      flex: 1;
      width: 100%;
      border: none;
      /* Height fills the rest of the viewport below the strip */
      height: calc(100vh - 96px);
    }

    /* ── Loading overlay ── */
    #frame-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 60px 20px;
      color: var(--mut);
      font-size: 14px;
    }
    body.dark #frame-loader { color: var(--mutd); }
    .loader-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--br);
      border-top-color: var(--a);
      border-radius: 50%;
      animation: spin360 0.8s linear infinite;
    }
    @keyframes spin360 { to { transform: rotate(360deg); } }

    /* ── No-query state ── */
    #no-query {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 60px 20px;
      text-align: center;
      color: var(--mut);
      font-size: 15px;
    }
    body.dark #no-query { color: var(--mutd); }
    #no-query .big-emoji { font-size: 48px; }

    /* ── Mobile responsive ── */
    @media (max-width: 600px) {
      .search-bar-strip {
        padding: 8px 12px 8px 12px;
        gap: 8px;
      }
      .strip-logo { display: none; }
      #results-iframe { height: calc(100vh - 82px); }
    }
  </style>

  <!-- ══ SEARCH RESULTS PAGE ══ -->

    <!-- Sticky top search strip -->

      <a class="strip-logo" href="./">360</a>
      <form id="strip-search-form" role="search">
        <input
          id="strip-search-input"
          type="text"
          name="q"
          placeholder="Search with 360..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button id="strip-search-btn" type="submit">Search</button>

    </div>

    <!-- Results area -->
    <div id="results-frame-wrap">
      <!-- Loading state shown while iframe loads -->

        <div class="loader-spinner"></div>
        <span>Searching...</span>
      </div>

      <!-- No query state -->
      <div id="no-query">
        <div class="big-emoji">🔍</div>
        <div>Enter a search term above to get started.</div>
      </div>

      <!--
        The iframe points to your SearXNG instance.
        IMPORTANT: Update SEARXNG_BASE_URL below to match wherever
        your SearXNG instance is hosted (same domain or subdomain).
        e.g. "https://search.360-search.com" or "/searx"
        The ?q= param is appended automatically from the URL.
      -->
      <iframe
        id="results-iframe"
        title="Search Results"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"
        style="display:none;"
      ></iframe>

  <script>
  /* ════════════════════════════════════════════════
     360 SEARCH — SEARXNG RESULTS WRAPPER
     ════════════════════════════════════════════════

     HOW IT WORKS:
     1. index.html submits search form → searxng.html?q=your+query
     2. This page picks up ?q= and builds a SearXNG URL
     3. Results render in the iframe below the 360 chrome

     CONFIGURATION:
     Set SEARXNG_BASE_URL to your SearXNG instance.
     - Same domain:  "/searx"  or  "/search"
     - Subdomain:    "https://search.360-search.com"
     - External:     "https://your-searxng-host.com"

     If SearXNG is on a different origin, browsers will block
     the iframe due to X-Frame-Options. In that case either:
       a) Configure SearXNG to allow framing (sxng__server__allowframing=true)
       b) Use the FALLBACK option (see below)
  ════════════════════════════════════════════════ */

  const SEARXNG_BASE_URL = "https://searx.be";

  /* ── Grab query from URL ── */
  const params   = new URLSearchParams(window.location.search);
  const query    = params.get("q") || "";
  const iframe   = document.getElementById("results-iframe");
  const loader   = document.getElementById("frame-loader");
  const noQuery  = document.getElementById("no-query");
  const stripInp = document.getElementById("strip-search-input");

  /* ── Populate strip search box ── */
  if (stripInp) stripInp.value = query;

  /* ── Update page title ── */
  if (query) document.title = query + " — 360 Search";

  /* ── Strip form submit ── */
  document.getElementById("strip-search-form").addEventListener("submit", e => {
    e.preventDefault();
    const q = stripInp.value.trim();
    if (q) window.location.href = "find.html?q=" + encodeURIComponent(q);
  });

  /* ── Load results ── */
  function loadResults(q) {
    if (!q) {
      loader.style.display  = "none";
      noQuery.style.display = "flex";
      iframe.style.display  = "none";
      return;
    }

    /* Build the SearXNG search URL */
    const searchURL = SEARXNG_BASE_URL + "/search?q=" + encodeURIComponent(q) + "&format=html";

    loader.style.display  = "flex";
    noQuery.style.display = "none";
    iframe.style.display  = "none";

    iframe.onload = () => {
      loader.style.display = "none";
      iframe.style.display = "block";
    };

    iframe.onerror = () => {
      /* Fallback: open SearXNG directly in new tab if iframe blocked */
      loader.style.display = "none";
      iframe.style.display = "none";
      showFallback(q, searchURL);
    };

    iframe.src = searchURL;

    /* Safety: if onload never fires (X-Frame-Options block), show fallback after 4s */
    setTimeout(() => {
      if (loader.style.display !== "none") {
        loader.style.display = "none";
        iframe.style.display = "none";
        showFallback(q, searchURL);
      }
    }, 4000);
  }

  /* ── Fallback renderer (if iframe is blocked by X-Frame-Options) ─────────
     Shows 360-styled results by fetching from SearXNG's JSON API.
     This requires SearXNG to have ?format=json enabled.
  ── */
  async function showFallback(q, searchURL) {
    const wrap = document.getElementById("results-frame-wrap");

    /* Try JSON API */
    const jsonURL = SEARXNG_BASE_URL + "/search?q=" + encodeURIComponent(q) + "&format=json";
    let results = null;
    try {
      const res  = await fetch(jsonURL);
      const data = await res.json();
      results    = data.results || [];
    } catch(e) {
      /* JSON API also blocked — just show a link */
    }

    if (results && results.length > 0) {
      renderJSONResults(wrap, q, results, searchURL);
    } else {
      renderOpenLink(wrap, q, searchURL);
    }
  }

  function renderJSONResults(wrap, q, results, searchURL) {
    const isDark = document.body.classList.contains("dark");
    let html = `
      <div style="max-width:720px;margin:0 auto;padding:24px 20px 60px;">
        <div style="font-size:13px;color:var(--mut);margin-bottom:20px;">
          About ${results.length} results for <strong style="color:var(--txt)">${escHTML(q)}</strong>
          &nbsp;·&nbsp;
          <a href="${searchURL}" target="_blank" style="color:var(--a);text-decoration:none;">
            Open in SearXNG ↗
          </a>
        </div>`;

    results.forEach(r => {
      const title   = escHTML(r.title || "");
      const url     = escHTML(r.url || "#");
      const content = escHTML((r.content || "").slice(0, 240));
      let domain = "";
      try { domain = new URL(r.url).hostname.replace("www.",""); } catch {}
      const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=16`;

      html += `
        <div style="
          padding:16px;
          margin-bottom:14px;
          border-radius:14px;
          background:rgba(255,255,255,0.6);
          border:1px solid var(--br);
          backdrop-filter:blur(10px);
          transition:.18s;
        " onmouseover="this.style.borderColor='var(--a)';this.style.transform='translateY(-1px)'"
           onmouseout="this.style.borderColor='var(--br)';this.style.transform=''">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;">
            <img src="${favicon}" width="14" height="14" style="border-radius:2px;flex-shrink:0;"
                 onerror="this.style.display='none'" />
            <span style="font-size:12px;color:var(--mut);">${domain}</span>
          </div>
          <a href="${url}" target="_blank" style="
            display:block;
            font-size:18px;
            font-weight:600;
            color:var(--a);
            text-decoration:none;
            margin-bottom:5px;
            line-height:1.35;
          ">${title}</a>
          ${content ? `<div style="font-size:13px;color:var(--mut);line-height:1.6;">${content}</div>` : ""}
        </div>`;
    });

    html += `</div>`;
    wrap.innerHTML = html;
  }

  function renderOpenLink(wrap, q, searchURL) {
    wrap.innerHTML = `
      <div style="
        display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:16px;padding:60px 20px;text-align:center;
        color:var(--mut);font-size:14px;
      ">
        <div style="font-size:40px;">🔍</div>
        <div>Results can't be shown inline. Open SearXNG directly:</div>
        <a href="${searchURL}" target="_blank" style="
          padding:10px 24px;border-radius:999px;border:none;
          background:linear-gradient(120deg,var(--a),var(--a2));
          color:#050816;font-weight:700;font-size:14px;text-decoration:none;
        ">View results in SearXNG ↗</a>
        <div style="font-size:12px;opacity:.6;">
          (To embed results inline, enable <code>allow_url2_exception</code> or set
          <code>sxng__server__allowframing=true</code> in your SearXNG config.)
        </div>
      </div>`;
  }

  function escHTML(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ── Init ── */
  loadResults(query);
  </script>
</body>
