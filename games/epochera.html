<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EpochEra Ultimate+</title>
<style>
body { margin:0; background:#000; overflow:hidden; }
canvas { display:block; margin:auto; background:#000; }
</style>
</head>
<body>
<canvas id="c" width="900" height="550"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

const W=900,H=550;

// ─── STATE ───
let player, enemies, boss, particles;
let level=1, worldIndex=0;
let worlds=['ruins','city','future','lava','ice','void'];
let gameState='menu';

let keys={};
let attackCooldown=0, blastCooldown=0;

window.onkeydown=e=>keys[e.code]=true;
window.onkeyup=e=>keys[e.code]=false;

// ─── RESET ───
function reset(){
  player={x:50,y:400,w:40,h:40,hp:3};
  enemies=[];
  boss=null;
  particles=[];
  spawnEnemies();
}

// ─── ENEMIES ───
function spawnEnemies(){
  enemies=[];
  let count=1+Math.floor(level*0.8);

  for(let i=0;i<count;i++){
    enemies.push({
      x:Math.random()*800,
      y:Math.random()*500,
      w:40,h:40,
      type:Math.random()>0.5?'chaser':'predictor',
      speed:1.5+level*0.3
    });
  }

  if(level%3===0){
    boss={
      x:600,y:200,w:90,h:90,
      hp:10+level*3,
      projectiles:[]
    };
  }
}

// ─── PARTICLES ───
function spawnParticles(x,y,color,count=10){
  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*5,
      vy:(Math.random()-0.5)*5,
      life:40,
      color
    });
  }
}

// ─── BACKGROUND ───
function drawBG(){
  let w=worlds[worldIndex];

  if(w==='ruins'){ ctx.fillStyle='#d6cebc'; }
  else if(w==='city'){ ctx.fillStyle='#b4daff'; }
  else if(w==='future'){ ctx.fillStyle='#050510'; }
  else if(w==='lava'){ ctx.fillStyle='#330000'; }
  else if(w==='ice'){ ctx.fillStyle='#ccf2ff'; }
  else { ctx.fillStyle='#000'; }

  ctx.fillRect(0,0,W,H);
}

// ─── AI ───
function updateEnemies(){
  for(let e of enemies){
    if(e.type==='chaser'){
      let dx=player.x-e.x;
      let dy=player.y-e.y;
      let d=Math.hypot(dx,dy)||1;
      e.x+=dx/d*e.speed;
      e.y+=dy/d*e.speed;
    } else {
      let fx=player.x+(keys['ArrowRight']?40:keys['ArrowLeft']?-40:0);
      let fy=player.y+(keys['ArrowDown']?40:keys['ArrowUp']?-40:0);

      let dx=fx-e.x;
      let dy=fy-e.y;
      let d=Math.hypot(dx,dy)||1;
      e.x+=dx/d*(e.speed+0.5);
      e.y+=dy/d*(e.speed+0.5);
    }

    if(collide(player,e)){
      player.hp--;
      spawnParticles(player.x,player.y,'red',10);
      if(player.hp<=0) gameState='over';
    }
  }
}

// ─── BOSS ───
function updateBoss(){
  if(!boss) return;

  if(Math.random()<0.03){
    boss.projectiles.push({
      x:boss.x+40,y:boss.y+40,
      vx:(player.x-boss.x)*0.02,
      vy:(player.y-boss.y)*0.02
    });
  }

  for(let p of boss.projectiles){
    p.x+=p.vx;
    p.y+=p.vy;

    ctx.fillStyle='magenta';
    ctx.fillRect(p.x,p.y,6,6);

    if(Math.hypot(p.x-player.x,p.y-player.y)<20){
      player.hp--;
    }
  }

  if(collide(player,boss)){
    player.hp--;
  }
}

// ─── PLAYER ───
function updatePlayer(){
  let s=5;
  if(keys['ArrowLeft']) player.x-=s;
  if(keys['ArrowRight']) player.x+=s;
  if(keys['ArrowUp']) player.y-=s;
  if(keys['ArrowDown']) player.y+=s;

  player.x=Math.max(0,Math.min(W-player.w,player.x));
  player.y=Math.max(0,Math.min(H-player.h,player.y));

  // attack
  if(keys['Space'] && attackCooldown===0){
    attackCooldown=20;

    for(let e of enemies){
      if(Math.hypot(e.x-player.x,e.y-player.y)<80){
        e.dead=true;
        spawnParticles(e.x,e.y,'yellow',10);
      }
    }

    if(boss && Math.hypot(boss.x-player.x,boss.y-player.y)<100){
      boss.hp--;
    }
  }

  // blast
  if(keys['KeyQ'] && blastCooldown===0){
    blastCooldown=100;

    for(let e of enemies){
      let dx=e.x-player.x;
      let dy=e.y-player.y;
      let d=Math.hypot(dx,dy)||1;

      if(d<200){
        e.x+=dx/d*100;
        e.y+=dy/d*100;
      }
    }

    spawnParticles(player.x,player.y,'cyan',20);
  }

  if(attackCooldown>0) attackCooldown--;
  if(blastCooldown>0) blastCooldown--;
}

// ─── COLLISION ───
function collide(a,b){
  return a.x<a.x+b.w && a.x+a.w>b.x &&
         a.y<a.y+b.h && a.y+a.h>b.y;
}

// ─── DRAW ───
function draw(){
  drawBG();

  // player
  ctx.fillStyle='blue';
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // enemies
  enemies=enemies.filter(e=>!e.dead);
  for(let e of enemies){
    ctx.fillStyle=e.type==='chaser'?'red':'orange';
    ctx.fillRect(e.x,e.y,e.w,e.h);
  }

  // boss
  if(boss){
    ctx.fillStyle='purple';
    ctx.fillRect(boss.x,boss.y,boss.w,boss.h);
  }

  // particles
  for(let p of particles){
    p.x+=p.vx; p.y+=p.vy; p.life--;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,4,4);
  }
  particles=particles.filter(p=>p.life>0);

  // UI
  ctx.fillStyle='white';
  ctx.fillText("HP: "+player.hp,10,20);
  ctx.fillText("Level: "+level,10,40);
}

// ─── GAME LOOP ───
function loop(){
  ctx.clearRect(0,0,W,H);

  if(gameState==='menu'){
    ctx.fillStyle='white';
    ctx.fillText("Press SPACE",400,250);
    if(keys['Space']){
      gameState='game';
      reset();
    }
    requestAnimationFrame(loop);
    return;
  }

  if(gameState==='over'){
    ctx.fillText("Game Over",400,250);
    if(keys['Space']){
      level=1;
      worldIndex=0;
      gameState='game';
      reset();
    }
    requestAnimationFrame(loop);
    return;
  }

  updatePlayer();
  updateEnemies();
  updateBoss();

  if(enemies.length===0 && (!boss || boss.hp<=0)){
    level++;
    worldIndex=(worldIndex+1)%worlds.length;

    if(level>10){
      gameState='menu';
    } else {
      reset();
    }
  }

  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
