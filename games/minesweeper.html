<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161820;
      --card: #1c1e28;
      --border: #2a2d3e;
      --accent: #7c6af7;
      --accent2: #f76a6a;
      --green: #4ade80;
      --yellow: #fbbf24;
      --text: #e8eaf0;
      --muted: #6b7280;
      --cell-hidden: #1e2132;
      --cell-hover: #252840;
      --cell-revealed: #12141c;
      --radius: 10px;
    }

    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 48px;
      gap: 0;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(22px, 5vw, 32px);
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
    }

    .top-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .icon-btn:hover {
      background: var(--cell-hover);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    /* ---- Controls ---- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
      margin-bottom: 16px;
      width: 100%;
      max-width: 700px;
    }

    /* ---- Custom Dropdown ---- */
    .custom-select-wrapper {
      position: relative;
      user-select: none;
    }

    .custom-select-trigger {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 36px 7px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      min-width: 140px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: border-color 0.15s;
      white-space: nowrap;
    }

    .custom-select-trigger::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
      transition: transform 0.2s;
    }

    .custom-select-wrapper.open .custom-select-trigger {
      border-color: var(--accent);
    }

    .custom-select-wrapper.open .custom-select-trigger::after {
      transform: translateY(-50%) rotate(180deg);
    }

    .custom-select-options {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      animation: dropIn 0.15s ease;
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .custom-select-wrapper.open .custom-select-options {
      display: block;
    }

    .custom-option {
      padding: 10px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s, color 0.1s;
      border-bottom: 1px solid var(--border);
    }

    .custom-option:last-child { border-bottom: none; }

    .custom-option:hover {
      background: var(--cell-hover);
      color: var(--accent);
    }

    .custom-option.selected {
      color: var(--accent);
      background: rgba(124,106,247,0.1);
    }

    .custom-option .opt-icon { font-size: 15px; }
    .custom-option .opt-desc { font-size: 10px; color: var(--muted); }

    /* ---- Custom inputs ---- */
    .custom-inputs {
      display: none;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .custom-inputs.visible { display: flex; }

    .custom-inputs input {
      width: 64px;
      padding: 7px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      text-align: center;
    }

    .custom-inputs input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .start-btn {
      padding: 7px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      background: rgba(124,106,247,0.15);
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .start-btn:hover {
      background: rgba(124,106,247,0.3);
      transform: scale(1.03);
    }

    /* ---- Info bar ---- */
    .info-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 700;
    }

    .info-pill {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 5px 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-pill .val { color: var(--accent); }

    /* ---- Board ---- */
    .board-wrap {
      width: 100%;
      max-width: 700px;
      overflow-x: auto;
      display: flex;
      justify-content: center;
    }

    .board {
      display: inline-grid;
      gap: 4px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .cell {
      width: 32px;
      height: 32px;
      background: var(--cell-hidden);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      user-select: none;
      transition: background 0.12s, transform 0.1s, box-shadow 0.12s;
      border: 1px solid var(--border);
    }

    .cell:hover:not(.revealed) {
      background: var(--cell-hover);
      border-color: var(--accent);
      transform: scale(1.06);
    }

    .cell.revealed {
      background: var(--cell-revealed);
      border-color: #222437;
      cursor: default;
    }

    .cell.mine {
      background: rgba(247,106,106,0.25);
      border-color: var(--accent2);
      animation: shake 0.3s ease;
    }

    .cell.flagged {
      background: rgba(251,191,36,0.15);
      border-color: var(--yellow);
    }

    /* Number colors */
    .cell[data-count="1"] { color: #60a5fa; }
    .cell[data-count="2"] { color: #4ade80; }
    .cell[data-count="3"] { color: #f87171; }
    .cell[data-count="4"] { color: #a78bfa; }
    .cell[data-count="5"] { color: #fb923c; }
    .cell[data-count="6"] { color: #22d3ee; }
    .cell[data-count="7"] { color: #e879f9; }
    .cell[data-count="8"] { color: #94a3b8; }

    @keyframes pop {
      0%   { transform: scale(0.7); opacity: 0.4; }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-3px); }
      60%      { transform: translateX(3px); }
    }

    .cell.pop { animation: pop 0.2s ease forwards; }

    /* Hint */
    .cell.safe-hint {
      outline: 2px solid var(--green);
      outline-offset: 1px;
      animation: pulse 1s ease infinite;
    }

    @keyframes pulse {
      0%,100% { outline-color: var(--green); box-shadow: 0 0 6px var(--green); }
      50%      { outline-color: #86efac;     box-shadow: 0 0 14px var(--green); }
    }

    /* Heatmap */
    .cell.heat-low  { background: rgba(74,222,128,0.35)  !important; }
    .cell.heat-mid  { background: rgba(251,191,36,0.4)   !important; }
    .cell.heat-high { background: rgba(239,68,68,0.55)   !important; }

    /* ---- Status ---- */
    .status {
      margin-top: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      min-height: 28px;
      letter-spacing: 0.5px;
    }

    .status.win  { color: var(--green); }
    .status.lose { color: var(--accent2); }
    .status.info { color: var(--accent); }

    /* ---- Leaderboard ---- */
    .leaderboard {
      margin-top: 24px;
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
    }

    .leaderboard h3 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .lb-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .lb-item:last-child { border-bottom: none; }

    .lb-rank { color: var(--muted); width: 20px; }
    .lb-time { color: var(--accent); font-weight: 700; }
    .lb-diff { color: var(--muted); font-size: 11px; }

    .lb-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 8px 0; }

    @media (max-width: 480px) {
      .cell { width: 26px; height: 26px; font-size: 11px; border-radius: 5px; }
      .board { gap: 3px; padding: 10px; }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <h1>Mine<span>sweeper</span></h1>
    <div class="top-actions">
      <button class="icon-btn" id="restartBtn" title="Restart">🔄</button>
      <button class="icon-btn" id="pauseBtn"   title="Pause">⏸</button>
      <button class="icon-btn" id="hintBtn"    title="Hint">💡</button>
      <button class="icon-btn" id="heatmapBtn" title="Heatmap">🌡️</button>
      <button class="icon-btn" id="replayBtn"  title="Replay">🎥</button>
    </div>
  </div>

  <!-- ===== CONTROLS ===== -->
  <div class="controls">

    <!-- Custom dropdown -->
    <div class="custom-select-wrapper" id="diffWrapper">
      <div class="custom-select-trigger" id="diffTrigger">
        <span id="diffLabel">🟢 Easy</span>
      </div>
      <div class="custom-select-options" id="diffOptions">
        <div class="custom-option selected" data-value="easy">
          <span class="opt-icon">🟢</span>
          <span>Easy</span>
          <span class="opt-desc">8×8 · 10 mines</span>
        </div>
        <div class="custom-option" data-value="medium">
          <span class="opt-icon">🟡</span>
          <span>Medium</span>
          <span class="opt-desc">12×12 · 25 mines</span>
        </div>
        <div class="custom-option" data-value="hard">
          <span class="opt-icon">🔴</span>
          <span>Hard</span>
          <span class="opt-desc">16×16 · 50 mines</span>
        </div>
        <div class="custom-option" data-value="daily">
          <span class="opt-icon">📅</span>
          <span>Daily</span>
          <span class="opt-desc">Same seed today</span>
        </div>
        <div class="custom-option" data-value="custom">
          <span class="opt-icon">⚙️</span>
          <span>Custom</span>
          <span class="opt-desc">Set your own</span>
        </div>
      </div>
    </div>

    <!-- Custom size inputs (shown only for custom) -->
    <div class="custom-inputs" id="customInputs">
      <input id="customRows"  type="number" placeholder="Rows"  min="4" max="30" value="10" />
      <input id="customCols"  type="number" placeholder="Cols"  min="4" max="50" value="10" />
      <input id="customMines" type="number" placeholder="Mines" min="1"          value="15" />
    </div>

    <button class="start-btn" id="startGame">▶ Start</button>
  </div>

  <!-- ===== INFO BAR ===== -->
  <div class="info-bar">
    <div class="info-pill">💣 <span class="val" id="mineCount">—</span></div>
    <div class="info-pill">🚩 <span class="val" id="flagCount">0</span></div>
    <div class="info-pill">⏱ <span class="val" id="timer">0</span>s</div>
  </div>

  <!-- ===== BOARD ===== -->
  <div class="board-wrap">
    <div id="board" class="board"></div>
  </div>

  <div id="status" class="status"></div>

  <!-- ===== LEADERBOARD ===== -->
  <div class="leaderboard">
    <h3>🏆 Top Times</h3>
    <div id="leaderboardList"><p class="lb-empty">Play a game to set a score!</p></div>
  </div>

  <script>
    /* ==================== CUSTOM DROPDOWN ==================== */
    const diffWrapper  = document.getElementById('diffWrapper');
    const diffTrigger  = document.getElementById('diffTrigger');
    const diffLabel    = document.getElementById('diffLabel');
    const diffOptions  = document.getElementById('diffOptions');
    const customInputs = document.getElementById('customInputs');
    let selectedDiff   = 'easy';

    diffTrigger.addEventListener('click', e => {
      e.stopPropagation();
      diffWrapper.classList.toggle('open');
    });

    document.addEventListener('click', () => diffWrapper.classList.remove('open'));

    diffOptions.querySelectorAll('.custom-option').forEach(opt => {
      opt.addEventListener('click', e => {
        e.stopPropagation();
        diffOptions.querySelectorAll('.custom-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedDiff = opt.dataset.value;
        const icon = opt.querySelector('.opt-icon').textContent;
        const name = opt.querySelectorAll('span')[1].textContent;
        diffLabel.textContent = icon + ' ' + name;
        diffWrapper.classList.remove('open');
        customInputs.classList.toggle('visible', selectedDiff === 'custom');
      });
    });

    /* ==================== GAME STATE ==================== */
    const boardEl   = document.getElementById('board');
    const statusEl  = document.getElementById('status');
    const timerEl   = document.getElementById('timer');
    const lbList    = document.getElementById('leaderboardList');

    let grid, rows, cols, mines;
    let flags = 0, gameOver = false, firstClick = true;
    let timerVal = 0, interval = null;
    let paused = false;
    let moves = [], replayMoves = [];
    let seedRandom = Math.random;
    let scores = [];

    const difficulties = {
      easy:   { r: 8,  c: 8,  m: 10 },
      medium: { r: 12, c: 12, m: 25 },
      hard:   { r: 16, c: 16, m: 50 },
    };

    /* ==================== SEED ==================== */
    function seededRandom(seed) {
      return function () {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      };
    }

    function getDailySeed() {
      return new Date().toISOString().slice(0, 10)
        .split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    }

    /* ==================== START ==================== */
    function startGame() {
      const diff = selectedDiff;

      if (diff === 'daily') {
        seedRandom = seededRandom(getDailySeed());
        ({ r: rows, c: cols, m: mines } = difficulties.medium);
      } else if (diff === 'custom') {
        rows  = Math.max(4,  Math.min(30, +document.getElementById('customRows').value  || 10));
        cols  = Math.max(4,  Math.min(50, +document.getElementById('customCols').value  || 10));
        mines = Math.max(1,  Math.min(rows * cols - 9, +document.getElementById('customMines').value || 15));
        seedRandom = Math.random;
      } else {
        seedRandom = Math.random;
        ({ r: rows, c: cols, m: mines } = difficulties[diff]);
      }

      /* Reset DOM */
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${cols}, 32px)`;

      /* Reset state */
      grid = []; flags = 0; gameOver = false; firstClick = true;
      moves = []; timerVal = 0; paused = false;

      setStatus('', '');
      document.getElementById('flagCount').textContent = 0;
      document.getElementById('mineCount').textContent = mines;
      timerEl.textContent = 0;

      clearInterval(interval);
      interval = setInterval(() => {
        if (!gameOver && !paused) {
          timerVal++;
          timerEl.textContent = timerVal;
        }
      }, 1000);

      /* Build grid */
      for (let r = 0; r < rows; r++) {
        grid[r] = [];
        for (let c = 0; c < cols; c++) {
          const el = document.createElement('div');
          el.className = 'cell';
          el.addEventListener('click',       () => clickCell(r, c));
          el.addEventListener('contextmenu', e  => { e.preventDefault(); flagCell(r, c); });
          boardEl.appendChild(el);
          grid[r][c] = { mine: false, revealed: false, flagged: false, count: 0, el };
        }
      }
    }

    /* ==================== MINE PLACEMENT ==================== */
    function placeMines(sr, sc) {
      let placed = 0;
      while (placed < mines) {
        const r = Math.floor(seedRandom() * rows);
        const c = Math.floor(seedRandom() * cols);
        if (!grid[r][c].mine && !(r === sr && c === sc)) {
          grid[r][c].mine = true;
          placed++;
        }
      }
    }

    function calcCounts() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c].mine) continue;
          let n = 0;
          for (let dr = -1; dr <= 1; dr++)
            for (let dc = -1; dc <= 1; dc++)
              if (grid[r + dr]?.[c + dc]?.mine) n++;
          grid[r][c].count = n;
        }
      }
    }

    /* ==================== CLICK / FLAG ==================== */
    function clickCell(r, c) {
      if (gameOver || paused) return;
      if (firstClick) {
        placeMines(r, c);
        calcCounts();
        firstClick = false;
      }
      moves.push({ t: 'reveal', r, c, time: timerVal });
      reveal(r, c);
    }

    function reveal(r, c) {
      const cell = grid[r]?.[c];
      if (!cell || cell.revealed || cell.flagged) return;

      cell.revealed = true;
      cell.el.classList.add('revealed', 'pop');

      if (cell.mine) {
        cell.el.textContent = '💣';
        cell.el.classList.add('mine');
        endGame(false);
        return;
      }

      if (cell.count) {
        cell.el.textContent = cell.count;
        cell.el.dataset.count = cell.count;
      } else {
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++)
            reveal(r + dr, c + dc);
      }
      checkWin();
    }

    function flagCell(r, c) {
      const cell = grid[r][c];
      if (cell.revealed || gameOver) return;
      cell.flagged = !cell.flagged;
      cell.el.textContent = cell.flagged ? '🚩' : '';
      cell.el.classList.toggle('flagged', cell.flagged);
      flags += cell.flagged ? 1 : -1;
      document.getElementById('flagCount').textContent = flags;
      moves.push({ t: 'flag', r, c, time: timerVal });
    }

    /* ==================== WIN / LOSE ==================== */
    function checkWin() {
      const safe = grid.flat().filter(c => !c.mine && c.revealed).length;
      if (safe === rows * cols - mines) endGame(true);
    }

    function endGame(win) {
      gameOver = true;
      clearInterval(interval);

      grid.flat().forEach(c => {
        if (c.mine) {
          c.el.textContent = '💣';
          c.el.classList.add('mine', 'revealed');
        }
      });

      replayMoves = [...moves];

      if (win) {
        setStatus('🎉 You win! ' + timerVal + 's', 'win');
        scores.push({ time: timerVal, diff: selectedDiff });
        scores.sort((a, b) => a.time - b.time);
        renderLeaderboard();
      } else {
        setStatus('💀 Game Over', 'lose');
      }
    }

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className   = 'status ' + (cls || '');
    }

    /* ==================== LEADERBOARD ==================== */
    function renderLeaderboard() {
      if (!scores.length) {
        lbList.innerHTML = '<p class="lb-empty">Play a game to set a score!</p>';
        return;
      }
      lbList.innerHTML = scores.slice(0, 7).map((s, i) =>
        `<div class="lb-item">
          <span class="lb-rank">#${i + 1}</span>
          <span class="lb-time">${s.time}s</span>
          <span class="lb-diff">${s.diff}</span>
        </div>`
      ).join('');
    }

    /* ==================== AI (hint / heatmap) ==================== */
    function exportState() {
      return grid.map(row => row.map(c => ({
        revealed: c.revealed,
        flagged:  c.flagged,
        count:    c.count,
        mine:     c.revealed ? c.mine : null
      })));
    }

    async function callAI(prompt) {
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 256,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const d = await res.json();
        return d.content?.[0]?.text || '';
      } catch (e) {
        return '';
      }
    }

    document.getElementById('hintBtn').addEventListener('click', async () => {
      if (!grid || firstClick) return;
      setStatus('🤖 Thinking…', 'info');
      const reply = await callAI(
        `You are a Minesweeper solver. Return ONLY valid JSON: {"row":number,"col":number,"reason":"short reason"}\n\nBoard:\n${JSON.stringify(exportState())}`
      );
      try {
        const m = JSON.parse(reply);
        grid[m.row]?.[m.col]?.el.classList.add('safe-hint');
        setStatus('💡 ' + m.reason, 'info');
      } catch {
        setStatus('⚠️ Hint unavailable', 'info');
      }
    });

    document.getElementById('heatmapBtn').addEventListener('click', async () => {
      if (!grid || firstClick) return;
      setStatus('🌡️ Calculating…', 'info');
      grid.flat().forEach(c => c.el.classList.remove('heat-low', 'heat-mid', 'heat-high'));
      const reply = await callAI(
        `Return ONLY a JSON array: [{"row":number,"col":number,"prob":number}]\nProb = 0..1 mine probability for each unrevealed cell.\nBoard:\n${JSON.stringify(exportState())}`
      );
      try {
        JSON.parse(reply).forEach(p => {
          const c = grid[p.row]?.[p.col];
          if (!c || c.revealed) return;
          c.el.classList.add(p.prob > 0.66 ? 'heat-high' : p.prob > 0.33 ? 'heat-mid' : 'heat-low');
        });
        setStatus('🌡️ Heatmap active', 'info');
      } catch {
        setStatus('⚠️ Heatmap unavailable', 'info');
      }
    });

    /* ==================== PAUSE ==================== */
    document.getElementById('pauseBtn').addEventListener('click', () => {
      if (gameOver) return;
      paused = !paused;
      setStatus(paused ? '⏸ Paused' : '', paused ? 'info' : '');
    });

    /* ==================== REPLAY ==================== */
    document.getElementById('replayBtn').addEventListener('click', async () => {
      if (!replayMoves.length) { setStatus('No replay yet', 'info'); return; }
      const saved = [...replayMoves];
      startGame();
      // Give the board one tick to render
      await new Promise(r => setTimeout(r, 50));
      for (const m of saved) {
        await new Promise(r => setTimeout(r, 180));
        if (m.t === 'reveal') {
          if (firstClick) { placeMines(m.r, m.c); calcCounts(); firstClick = false; }
          reveal(m.r, m.c);
        }
        if (m.t === 'flag') flagCell(m.r, m.c);
      }
    });

    /* ==================== RESTART ==================== */
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('startGame').addEventListener('click', startGame);

    /* ==================== INIT ==================== */
    startGame();
  </script>
</body>
</html>
