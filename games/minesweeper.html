  <style>
    /* ===============================
       MINESWEEPER FULL STYLES
    =============================== */
    
    .minesweeper-container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
      text-align: center;
    }
    
    /* Top bar */
    
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .top-actions button {
      margin-left: 6px;
    }
    
    /* Controls */
    
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 10px;
    }
    
    .controls input,
    .controls select,
    .controls button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: var(--card-bg, #1f2937);
      color: inherit;
    }
    
    /* Info bar */
    
    .info-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 10px 0;
      font-weight: 600;
      font-size: 14px;
    }
    
    /* Board */
    
    .board {
      display: grid;
      gap: 4px;
      justify-content: center;
      margin-top: 10px;
    }
    
    /* Cells */
    
    .cell {
      width: 32px;
      height: 32px;
      background: var(--card-bg, #1f2937);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      user-select: none;
      transition: all 0.15s ease;
    }
    
    .cell:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
    }
    
    .cell.revealed {
      background: #e5e7eb;
      color: #111;
      cursor: default;
    }
    
    .cell.mine {
      background: #ef4444;
      color: white;
    }
    
    .cell.flagged {
      background: #f59e0b;
      color: white;
    }
    
    /* Number colors */
    
    .cell.revealed[data-count="1"] { color: #2563eb; }
    .cell.revealed[data-count="2"] { color: #16a34a; }
    .cell.revealed[data-count="3"] { color: #dc2626; }
    .cell.revealed[data-count="4"] { color: #7c3aed; }
    .cell.revealed[data-count="5"] { color: #b45309; }
    .cell.revealed[data-count="6"] { color: #0891b2; }
    .cell.revealed[data-count="7"] { color: #374151; }
    .cell.revealed[data-count="8"] { color: #111827; }
    
    /* Animations */
    
    .cell.pop {
      animation: pop 0.2s ease;
    }
    
    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    /* Hint highlight */
    
    .cell.safe-hint {
      outline: 3px solid #22c55e;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0% { outline-color: #22c55e; }
      50% { outline-color: #4ade80; }
      100% { outline-color: #22c55e; }
    }
    
    /* Heatmap overlay */
    
    .cell.heat-low {
      background: rgba(34,197,94,0.5);
    }
    
    .cell.heat-mid {
      background: rgba(234,179,8,0.5);
    }
    
    .cell.heat-high {
      background: rgba(239,68,68,0.6);
    }
    
    /* Status */
    
    .status {
      margin-top: 12px;
      font-size: 18px;
      font-weight: bold;
    }
    
    /* Leaderboard */
    
    .leaderboard {
      margin-top: 20px;
      text-align: center;
    }
    
    .leaderboard h3 {
      margin-bottom: 6px;
    }
    
    .leaderboard ul {
      list-style: none;
      padding: 0;
    }
    
    .leaderboard li {
      padding: 4px;
      font-size: 14px;
      opacity: 0.9;
    }
    
    /* Responsive */
    
    @media (max-width: 600px) {
      .cell {
        width: 26px;
        height: 26px;
        font-size: 12px;
      }
    }
    
    /* Theme integrations */
    
    [data-theme="neon"] .cell.revealed {
      background: #00ffe0;
      color: #001;
    }
    
    [data-theme="sunset"] .cell.mine {
      background: #ff6b6b;
    }
    
    [data-theme="mint"] .cell.flagged {
      background: #34d399;
    }
  </style>
</head>

  <div class="games-page">
    <div class="minesweeper-container">
    
      <div class="top-bar">
        <h1>Minesweeper</h1>
        <div class="top-actions">
          <button id="restartBtn">🔄</button>
          <button id="pauseBtn">⏸</button>
          <button id="hintBtn">💡</button>
          <button id="heatmapBtn">🌡️</button>
          <button id="replayBtn">🎥</button>
        </div>
      </div>
    
      <div class="controls">
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
          <option value="daily">Daily</option>
          <option value="custom">Custom</option>
        </select>
    
        <input id="customRows" type="number" placeholder="Rows" />
        <input id="customCols" type="number" placeholder="Cols" />
        <input id="customMines" type="number" placeholder="Mines" />
    
        <button id="startGame">Start</button>
      </div>
    
      <div class="info-bar">
        <span>💣 <span id="mineCount"></span></span>
        <span>🚩 <span id="flagCount"></span></span>
        <span>⏱ <span id="timer">0</span></span>
        <span>🔥 <span id="streak">0</span></span>
      </div>
    
      <div id="board" class="board"></div>
    
      <div id="status" class="status"></div>
    
      <div class="leaderboard">
        <h3>🏆 Global</h3>
        <ul id="leaderboardList"></ul>
      </div>
    
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient("YOUR_URL","YOUR_KEY");
    
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const timerEl = document.getElementById("timer");
    const leaderboardList = document.getElementById("leaderboardList");
    
    let grid=[],rows,cols,mines;
    let flags=0,gameOver=false,firstClick=true;
    let timer=0,interval;
    let moves=[], replayMoves=[];
    let paused=false;
    let seedRandom=Math.random;
    
    const difficulties = {
      easy:{r:8,c:8,m:10},
      medium:{r:12,c:12,m:25},
      hard:{r:16,c:16,m:50}
    };
    
    /* ================= UTIL ================= */
    
    function seededRandom(seed){
      return function(){
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      };
    }
    
    function getDailySeed(){
      const d=new Date().toISOString().slice(0,10);
      return d.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    }
    
    /* ================= START ================= */
    
    document.getElementById("startGame").onclick=startGame;
    document.getElementById("restartBtn").onclick=startGame;
    
    document.getElementById("pauseBtn").onclick = () => {
      paused = !paused;
      statusEl.textContent = paused ? "⏸ Paused" : "";
    };
    
    async function startGame(){
      let diff=document.getElementById("difficulty").value;
    
      if(diff==="daily"){
        seedRandom = seededRandom(getDailySeed());
        ({r:rows,c:cols,m:mines}=difficulties.medium);
      } else if(diff==="custom"){
        rows=+customRows.value;
        cols=+customCols.value;
        mines=+customMines.value;
      } else {
        seedRandom=Math.random;
        ({r:rows,c:cols,m:mines}=difficulties[diff]);
      }
    
      boardEl.innerHTML="";
      boardEl.style.gridTemplateColumns=`repeat(${cols},32px)`;
    
      grid=[]; flags=0; gameOver=false; firstClick=true;
      moves=[]; timer=0; paused=false;
    
      document.getElementById("flagCount").textContent=0;
      document.getElementById("mineCount").textContent=mines;
      statusEl.textContent="";
    
      clearInterval(interval);
      interval=setInterval(()=>{
        if(!gameOver && !paused){
          timer++;
          timerEl.textContent=timer;
        }
      },1000);
    
      for(let r=0;r<rows;r++){
        grid[r]=[];
        for(let c=0;c<cols;c++){
          const el=document.createElement("div");
          el.className="cell";
    
          el.onclick=()=>clickCell(r,c);
          el.oncontextmenu=e=>{
            e.preventDefault();
            flagCell(r,c);
          };
    
          boardEl.appendChild(el);
    
          grid[r][c]={mine:false,revealed:false,flagged:false,count:0,el};
        }
      }
    
      loadGlobalScores();
    }
    
    /* ================= GAME LOGIC ================= */
    
    function placeMines(sr,sc){
      let placed=0;
      while(placed<mines){
        let r=Math.floor(seedRandom()*rows);
        let c=Math.floor(seedRandom()*cols);
        if(!grid[r][c].mine && !(r===sr&&c===sc)){
          grid[r][c].mine=true; placed++;
        }
      }
    }
    
    function calc(){
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          if(grid[r][c].mine) continue;
          let n=0;
          for(let dr=-1;dr<=1;dr++)
            for(let dc=-1;dc<=1;dc++)
              if(grid[r+dr]?.[c+dc]?.mine) n++;
          grid[r][c].count=n;
        }
      }
    }
    
    function clickCell(r,c){
      if(gameOver || paused) return;
    
      document.getElementById("clickSound")?.play().catch(()=>{});
    
      if(firstClick){
        placeMines(r,c);
        calc();
        firstClick=false;
      }
    
      moves.push({t:"reveal",r,c,time:timer});
      reveal(r,c);
    }
    
    function reveal(r,c){
      let cell=grid[r]?.[c];
      if(!cell||cell.revealed||cell.flagged) return;
    
      cell.revealed=true;
      cell.el.classList.add("revealed","pop");
    
      if(cell.mine){
        cell.el.textContent="💣";
        end(false);
        return;
      }
    
      if(cell.count){
        cell.el.textContent=cell.count;
        cell.el.dataset.count=cell.count;
      } else {
        for(let dr=-1;dr<=1;dr++)
          for(let dc=-1;dc<=1;dc++)
            reveal(r+dr,c+dc);
      }
    
      checkWin();
    }
    
    function flagCell(r,c){
      let cell=grid[r][c];
      if(cell.revealed || gameOver) return;
    
      cell.flagged=!cell.flagged;
      cell.el.textContent=cell.flagged?"🚩":"";
    
      flags += cell.flagged ? 1 : -1;
      document.getElementById("flagCount").textContent=flags;
    
      moves.push({t:"flag",r,c,time:timer});
    }
    
    function checkWin(){
      let safe=0;
      grid.flat().forEach(c=>{
        if(!c.mine && c.revealed) safe++;
      });
      if(safe===rows*cols-mines) end(true);
    }
    
    async function end(win){
      gameOver=true;
      clearInterval(interval);
    
      grid.flat().forEach(c=>{
        if(c.mine){
          c.el.textContent="💣";
          c.el.classList.add("revealed","pop");
        }
      });
    
      replayMoves=[...moves];
    
      if(win){
        statusEl.textContent="🎉 Win!";
        await supabaseClient.from("minesweeper_scores").insert({
          time:timer,
          difficulty:document.getElementById("difficulty").value
        });
      } else {
        statusEl.textContent="💀 Game Over";
      }
    
      loadGlobalScores();
    }
    
    /* ================= AI ================= */
    
    async function callAI(prompt){
      const res = await fetch("https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/MineSweeper_AI",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:prompt})
      });
      return (await res.json()).reply;
    }
    
    function exportState(){
      return grid.map(r=>r.map(c=>({
        revealed:c.revealed,
        flagged:c.flagged,
        count:c.count
      })));
    }
    
    document.getElementById("hintBtn").onclick=async()=>{
      statusEl.textContent="🤖 Thinking...";
    
      let reply=await callAI(
    `You are a Minesweeper solver.
    Return ONLY JSON:
    {"row": number, "col": number, "reason": "short"}
    
    Board:
    ${JSON.stringify(exportState())}`
      );
    
      try{
        let m=JSON.parse(reply);
        grid[m.row][m.col].el.classList.add("safe-hint");
        statusEl.textContent="💡 "+m.reason;
      }catch{
        statusEl.textContent="⚠️ AI failed";
      }
    };
    
    document.getElementById("heatmapBtn").onclick=async()=>{
      statusEl.textContent="🌡️ Calculating...";
    
      grid.flat().forEach(c=>c.el.style.background="");
    
      let reply=await callAI(
    `Return ONLY JSON array:
    [{row:number,col:number,prob:number}]
    
    Board:
    ${JSON.stringify(exportState())}`
      );
    
      try{
        let arr=JSON.parse(reply);
        arr.forEach(p=>{
          let c=grid[p.row]?.[p.col];
          if(!c||c.revealed) return;
    
          c.el.style.background=
            p.prob>0.66?"rgba(239,68,68,0.6)":
            p.prob>0.33?"rgba(234,179,8,0.5)":
            "rgba(34,197,94,0.5)";
        });
    
        statusEl.textContent="🌡️ Heatmap ready";
      }catch{
        statusEl.textContent="⚠️ Heatmap failed";
      }
    };
    
    /* ================= REPLAY ================= */
    
    document.getElementById("replayBtn").onclick=async()=>{
      if(!replayMoves.length) return;
    
      startGame();
    
      for(let m of replayMoves){
        await new Promise(r=>setTimeout(r,150));
    
        if(m.t==="reveal") reveal(m.r,m.c);
        if(m.t==="flag") flagCell(m.r,m.c);
      }
    };
    
    /* ================= LEADERBOARD ================= */
    
    async function loadGlobalScores(){
      let {data}=await supabaseClient
        .from("minesweeper_scores")
        .select("*")
        .order("time",{ascending:true})
        .limit(5);
    
      leaderboardList.innerHTML=(data||[])
        .map(s=>`<li>${s.time}s</li>`)
        .join("");
    }
    </script>
    
  <audio id="clickSound" src="../click-sound.mp3" preload="auto"></audio>
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/cookie.js"></script>
