  <style>
    .news-page { max-width: 900px; margin: 0 auto; padding: 80px 20px 60px; }

    /* ── Header ── */
    .news-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px; flex-wrap: wrap; gap: 10px;
    }
    .news-header h2 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .api-badge {
      font-size: 11px; color: var(--mut); margin-bottom: 16px;
      display: flex; align-items: center; gap: 6px;
    }
    body.dark .api-badge { color: var(--mutd); }
    .api-badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
      box-shadow: 0 0 6px #22c55e;
    }
    .api-badge strong { color: var(--a); }

    /* ── Category pills ── */
    .news-cats { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
    .news-cat {
      padding: 5px 15px; border-radius: 999px;
      border: 1px solid var(--br); background: transparent;
      color: var(--txt); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: .2s; white-space: nowrap;
    }
    body.dark .news-cat { color: var(--txtd); }
    .news-cat:hover { border-color: var(--a); color: var(--a); transform: none; box-shadow: none; }
    .news-cat.active {
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816; border-color: transparent;
    }

    /* ── Search ── */
    .news-search { margin-bottom: 20px; }
    #news-search-input {
      width: 100%; padding: 10px 18px; border-radius: 999px;
      border: 1px solid var(--br); background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px); color: var(--txt); font-size: 14px;
      outline: none; font-family: inherit; box-sizing: border-box;
    }
    body.dark #news-search-input { color: var(--txtd); }
    #news-search-input:focus { border-color: var(--a); }

    /* ── HERO ── */
    .news-hero {
      display: none; text-decoration: none; color: inherit;
      border-radius: 18px; overflow: hidden;
      background: rgba(255,255,255,.6); backdrop-filter: blur(12px);
      border: 1px solid var(--br); margin-bottom: 24px;
      transition: .25s; position: relative;
    }
    body.dark .news-hero { background: rgba(15,23,42,.75); }
    .news-hero:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(0,0,0,.14); border-color: var(--a); }

    .news-hero-img-wrap { width: 100%; height: 320px; overflow: hidden; position: relative; }
    .news-hero-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .4s ease;
    }
    .news-hero:hover .news-hero-img { transform: scale(1.03); }
    .news-hero-img-placeholder {
      width: 100%; height: 320px;
      background: linear-gradient(135deg, var(--a), var(--a2));
      display: flex; align-items: center; justify-content: center; font-size: 64px;
    }
    .news-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.1) 50%, transparent 100%);
    }
    .news-hero-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 24px 20px;
    }
    .news-hero-tag {
      display: inline-block; padding: 3px 12px; border-radius: 999px;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816; font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
    }
    .news-hero-title {
      font-size: 22px; font-weight: 800; color: #fff;
      line-height: 1.35; text-shadow: 0 1px 8px rgba(0,0,0,.4);
      margin-bottom: 6px;
    }
    .news-hero-meta { font-size: 12px; color: rgba(255,255,255,.7); }

    /* ── GRID ── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 700px) { .news-grid { grid-template-columns: 1fr; } }
    @media (min-width: 701px) and (max-width: 960px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ── CARD ── */
    .news-card {
      background: rgba(255,255,255,.6); backdrop-filter: blur(12px);
      border: 1px solid var(--br); border-radius: 14px; overflow: hidden;
      text-decoration: none; color: inherit; display: flex; flex-direction: column;
      transition: .22s; position: relative;
    }
    body.dark .news-card { background: rgba(15,23,42,.75); }
    .news-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,.13);
      border-color: var(--a);
    }

    .news-card-img-wrap { width: 100%; height: 160px; overflow: hidden; flex-shrink: 0; }
    .news-card-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .35s ease;
    }
    .news-card:hover .news-card-img { transform: scale(1.06); }
    .news-card-img-placeholder {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, var(--a), var(--a2));
      display: flex; align-items: center; justify-content: center; font-size: 40px;
    }

    .news-card-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }

    .news-card-meta {
      display: flex; align-items: center; justify-content: space-between;
      gap: 6px;
    }
    .news-card-source {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--a);
      display: flex; align-items: center; gap: 4px;
    }
    .news-card-source img { width: 12px; height: 12px; border-radius: 2px; }
    .news-card-date { font-size: 10px; color: var(--mut); }
    body.dark .news-card-date { color: var(--mutd); }

    .news-card-title {
      font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--txt);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    body.dark .news-card-title { color: var(--txtd); }

    .news-card-desc {
      font-size: 12px; color: var(--mut); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    body.dark .news-card-desc { color: var(--mutd); }

    .news-card-footer {
      display: flex; align-items: center; gap: 6px; margin-top: auto; padding-top: 8px;
    }
    .read-more {
      font-size: 11px; font-weight: 700; color: var(--a);
      margin-left: auto; display: flex; align-items: center; gap: 3px;
    }

    /* ── Status ── */
    .news-status {
      text-align: center; padding: 60px 20px;
      color: var(--mut); font-size: 15px; grid-column: 1 / -1;
    }
    body.dark .news-status { color: var(--mutd); }
    .news-status .spinner {
      width: 32px; height: 32px; border: 3px solid var(--br);
      border-top-color: var(--a); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Refresh btn ── */
    .refresh-btn {
      padding: 7px 16px; border-radius: 999px; border: 1px solid var(--br);
      background: transparent; color: var(--txt); font-size: 12px;
      font-weight: 600; cursor: pointer; transition: .2s;
    }
    body.dark .refresh-btn { color: var(--txtd); }
    .refresh-btn:hover { border-color: var(--a); color: var(--a); transform: none; box-shadow: none; }

    @media (max-width: 600px) {
      .news-header { flex-direction: column; align-items: flex-start; }
      .news-hero-img-wrap { height: 220px; }
      .news-hero-title { font-size: 18px; }
    }
  </style>
</head>

  <script>
  /* ══════════════════════════════════════════════
     360 NEWS V2 — MULTI-API WITH VYNTR FALLBACK
     Priority order per category:
       1. RSS2JSON (BBC, NYT, TechCrunch, etc.) — free, no limit
       2. Vyntr Search API — fallback when RSS fails
  ══════════════════════════════════════════════ */

  const RSS2JSON  = "https://api.rss2json.com/v1/api.json?count=24&rss_url=";
  const VYNTR_KEY = "vyntr_dVZQQztzpWQZiKpsuwpCdStcNiyTnSfooWrKPUyFFDqGvSkETpjtpyuuzBJzwQSf";
  const VYNTR_URL = "https://vyntr.com/api/v1/search";

  let allArticles = [];
  let currentCat  = "top";
  let activeSource = "";

  /* ── RSS feeds per category ── */
  const FEEDS = {
    top: [
      "https://feeds.bbci.co.uk/news/rss.xml",
      "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml",
      "https://feeds.npr.org/1001/rss.xml",
      "https://www.theguardian.com/world/rss",
    ],
    tech: [
      "https://techcrunch.com/feed/",
      "https://feeds.bbci.co.uk/news/technology/rss.xml",
      "https://www.theverge.com/rss/index.xml",
      "https://feeds.arstechnica.com/arstechnica/index",
      "https://www.wired.com/feed/rss",
    ],
    science: [
      "https://feeds.bbci.co.uk/news/science_and_environment/rss.xml",
      "https://www.sciencedaily.com/rss/top/science.xml",
      "https://www.newscientist.com/feed/home/",
    ],
    business: [
      "https://feeds.bbci.co.uk/news/business/rss.xml",
      "https://rss.nytimes.com/services/xml/rss/nyt/Business.xml",
      "https://feeds.npr.org/1006/rss.xml",
    ],
    entertainment: [
      "https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml",
      "https://variety.com/feed/",
      "https://deadline.com/feed/",
    ],
    sports: [
      "https://feeds.bbci.co.uk/sport/rss.xml",
      "https://rss.nytimes.com/services/xml/rss/nyt/Sports.xml",
      "https://www.espn.com/espn/rss/news",
    ],
    us: [
      "https://rss.nytimes.com/services/xml/rss/nyt/US.xml",
      "https://feeds.npr.org/1003/rss.xml",
      "https://feeds.bbci.co.uk/news/world/us_and_canada/rss.xml",
    ],
    world: [
      "https://www.theguardian.com/world/rss",
      "https://feeds.bbci.co.uk/news/world/rss.xml",
      "https://rss.nytimes.com/services/xml/rss/nyt/World.xml",
    ],
  };

  const SOURCE_MAP = {
    "bbci.co.uk": "BBC News", "nytimes.com": "NYT",
    "npr.org": "NPR", "theguardian.com": "The Guardian",
    "techcrunch.com": "TechCrunch", "wired.com": "Wired",
    "arstechnica.com": "Ars Technica", "theverge.com": "The Verge",
    "sciencedaily.com": "Science Daily", "newscientist.com": "New Scientist",
    "variety.com": "Variety", "deadline.com": "Deadline",
    "espn.com": "ESPN",
  };

  const CAT_EMOJIS = {
    top:"📰", tech:"💻", science:"🔬", business:"📈",
    entertainment:"🎬", sports:"⚽", us:"🇺🇸", world:"🌐"
  };

  function getFeedSource(url) {
    try {
      const host = new URL(url).hostname.replace(/^(www\.|feeds\.|rss\.)/,"");
      for (const [k, v] of Object.entries(SOURCE_MAP)) { if (host.includes(k)) return v; }
      return host;
    } catch { return "News"; }
  }

  function timeAgo(dateStr) {
    if (!dateStr) return "";
    const diff = Date.now() - new Date(dateStr).getTime();
    const m = Math.floor(diff / 60000), h = Math.floor(m/60), d = Math.floor(h/24);
    if (m < 1)  return "Just now";
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    return `${d}d ago`;
  }

  function getImg(a) {
    return a.enclosure?.link || a.thumbnail || a.image || a.media_content?.url || "";
  }

  /* ── Try all RSS feeds in parallel ── */
  async function tryRSS(cat) {
    const feeds = FEEDS[cat] || FEEDS.top;
    const seen  = new Set();
    const out   = [];
    const tried = new Set();

    const settled = await Promise.allSettled(feeds.map(async url => {
      const res  = await fetch(RSS2JSON + encodeURIComponent(url), { signal: AbortSignal.timeout(7000) });
      const data = await res.json();
      if (!data.items?.length) return [];
      tried.add(getFeedSource(url));
      return data.items.map(i => ({ ...i, _source: getFeedSource(url) }));
    }));

    settled.forEach(r => {
      if (r.status !== "fulfilled") return;
      r.value.forEach(item => {
        const key = (item.title || "").trim();
        if (key && !seen.has(key)) { seen.add(key); out.push(item); }
      });
    });

    if (!out.length) return null;
    activeSource = [...tried].join(" · ");
    out.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
    return out;
  }

  /* ── Vyntr fallback ── */
  async function tryVyntr(cat) {
    const queries = {
      top:"breaking news today", tech:"technology news today",
      science:"science news today", business:"business news today",
      entertainment:"entertainment news today", sports:"sports news today",
      us:"us news today", world:"world news today"
    };
    try {
      const res  = await fetch(`${VYNTR_URL}?q=${encodeURIComponent(queries[cat]||"news")}&type=news`, {
        headers: { "Authorization": `Bearer ${VYNTR_KEY}`, "Accept": "application/json" }
      });
      if (!res.ok) throw new Error("Vyntr " + res.status);
      const data = await res.json();
      const items = (data.results || data.news || data.items || []).map(r => ({
        title:       r.title || r.headline || "",
        link:        r.url   || r.link || "#",
        description: r.snippet || r.description || r.summary || "",
        thumbnail:   r.image  || r.thumbnail || r.imageUrl || "",
        pubDate:     r.date   || r.publishedAt || r.published || "",
        _source:     r.source || "Vyntr News",
      })).filter(r => r.title);
      if (!items.length) return null;
      activeSource = "Vyntr Search";
      return items;
    } catch (e) {
      console.warn("Vyntr failed:", e.message);
      return null;
    }
  }

  /* ── Render hero ── */
  function renderHero(a) {
    const hero = document.getElementById("news-hero");
    if (!a) { hero.style.display = "none"; return; }
    const img = getImg(a);
    hero.href = a.link || a.url || "#";
    document.getElementById("hero-source").textContent = a._source || "Top Story";
    document.getElementById("hero-title").textContent  = a.title || "";
    document.getElementById("hero-meta").textContent   = (a._source || "") + (a.pubDate ? " · " + timeAgo(a.pubDate) : "");
    const imgEl = document.getElementById("hero-img");
    if (img) {
      imgEl.src = img; imgEl.style.display = "block";
      imgEl.onerror = () => {
        imgEl.style.display = "none";
        imgEl.closest(".news-hero-img-wrap").innerHTML =
          `<div class="news-hero-img-placeholder">${CAT_EMOJIS[currentCat]||"📰"}</div>` +
          `<div class="news-hero-overlay"></div>` +
          `<div class="news-hero-content">` +
            `<div class="news-hero-tag">${a._source||"Top Story"}</div>` +
            `<div class="news-hero-title">${a.title||""}</div>` +
            `<div class="news-hero-meta">${a._source||""}</div>` +
          `</div>`;
      };
    } else {
      imgEl.style.display = "none";
      imgEl.closest(".news-hero-img-wrap").innerHTML =
        `<div class="news-hero-img-placeholder">${CAT_EMOJIS[currentCat]||"📰"}</div>` +
        `<div class="news-hero-overlay"></div>` +
        `<div class="news-hero-content">` +
          `<div class="news-hero-tag">${a._source||"Top Story"}</div>` +
          `<div class="news-hero-title">${a.title||""}</div>` +
          `<div class="news-hero-meta">${a._source||""}</div>` +
        `</div>`;
    }
    hero.style.display = "block";
  }

  /* ── Render cards ── */
  function renderCards(articles) {
    const grid = document.getElementById("news-grid");
    if (!articles.length) {
      grid.innerHTML = `<div class="news-status">No articles found.</div>`; return;
    }

    grid.innerHTML = articles.map(a => {
      const img  = getImg(a);
      const desc = (a.description || a.content || "").replace(/<[^>]*>/g,"").trim();
      const src  = a._source || a.author || "News";
      const date = timeAgo(a.pubDate);
      const link = a.link || a.url || "#";
      const favicon = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(link)}&sz=16`;

      const imgHTML = img
        ? `<div class="news-card-img-wrap"><img class="news-card-img" src="${img}" alt="" loading="lazy" onerror="this.closest('.news-card-img-wrap').innerHTML='<div class=\\'news-card-img-placeholder\\'>${CAT_EMOJIS[currentCat]||"📰"}</div>'"></div>`
        : `<div class="news-card-img-placeholder">${CAT_EMOJIS[currentCat]||"📰"}</div>`;

      return `
        <a class="news-card" href="${link}" target="_blank" rel="noopener noreferrer">
          ${imgHTML}
          <div class="news-card-body">
            <div class="news-card-meta">
              <div class="news-card-source">
                <img src="${favicon}" alt="" onerror="this.style.display='none'" />
                ${src}
              </div>
              <div class="news-card-date">${date}</div>
            </div>
            <div class="news-card-title">${a.title || ""}</div>
            ${desc ? `<div class="news-card-desc">${desc}</div>` : ""}
            <div class="news-card-footer">
              <span class="read-more">Read more →</span>
            </div>
          </div>
        </a>`;
    }).join("");
  }

  /* ── Main load ── */
  async function loadNews() {
    const grid = document.getElementById("news-grid");
    document.getElementById("api-name").textContent = "loading...";
    document.getElementById("news-search-input").value = "";
    document.getElementById("news-hero").style.display = "none";
    grid.innerHTML = `<div class="news-status"><div class="spinner"></div>Loading news...</div>`;

    /* Try RSS first */
    let articles = await tryRSS(currentCat);

    /* Fallback to Vyntr */
    if (!articles) {
      document.getElementById("api-name").textContent = "trying Vyntr...";
      articles = await tryVyntr(currentCat);
    }

    if (articles?.length) {
      allArticles = articles;
      renderHero(articles[0]);
      renderCards(articles.slice(1));
      document.getElementById("api-name").textContent = activeSource;
      return;
    }

    grid.innerHTML = `<div class="news-status">❌ All news sources unavailable right now. Try refreshing.</div>`;
    document.getElementById("api-name").textContent = "unavailable";
  }

  function switchCat(btn) {
    document.querySelectorAll(".news-cat").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCat = btn.dataset.cat;
    loadNews();
  }

  function filterNews() {
    const q = document.getElementById("news-search-input").value.toLowerCase().trim();
    if (!q) { renderHero(allArticles[0]); renderCards(allArticles.slice(1)); return; }
    document.getElementById("news-hero").style.display = "none";
    renderCards(allArticles.filter(a =>
      (a.title||"").toLowerCase().includes(q) ||
      (a.description||"").toLowerCase().includes(q)
    ));
  }

  loadNews();
  </script>
</body>
</html>
