<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 — News</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1115;
  color: white;
}

header {
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

#controls {
  display: flex;
  gap: 10px;
  padding: 0 20px 20px;
  flex-wrap: wrap;
}

.news-cat {
  padding: 8px 14px;
  background: #1c1f26;
  border-radius: 20px;
  cursor: pointer;
}

.news-cat.active {
  background: #3b82f6;
}

#search {
  margin-left: auto;
}

#search input {
  padding: 8px;
  border-radius: 8px;
  border: none;
  outline: none;
}

#news-hero {
  display: none;
  margin: 20px;
  text-decoration: none;
  color: white;
}

.news-hero-img {
  width: 100%;
  border-radius: 12px;
}

.news-hero-title {
  font-size: 22px;
  margin-top: 10px;
}

.news-hero-desc {
  opacity: 0.8;
}

#news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
}

.news-card {
  background: #1c1f26;
  border-radius: 12px;
  padding: 10px;
  text-decoration: none;
  color: white;
  transition: 0.2s;
}

.news-card:hover {
  transform: translateY(-4px);
}

.news-card-img {
  width: 100%;
  border-radius: 8px;
}

.news-card-title {
  font-size: 16px;
  margin-top: 8px;
}

.news-card-desc {
  font-size: 13px;
  opacity: 0.7;
}

.news-status {
  padding: 20px;
}
</style>
</head>

<body>

<header>📰 News <span id="api-name" style="opacity:.5;font-size:14px;"></span></header>

<div id="controls">
  <div class="news-cat active" data-cat="top" onclick="switchCat(this)">Top</div>
  <div class="news-cat" data-cat="tech" onclick="switchCat(this)">Tech</div>
  <div class="news-cat" data-cat="business" onclick="switchCat(this)">Business</div>
  <div class="news-cat" data-cat="sports" onclick="switchCat(this)">Sports</div>
  <div class="news-cat" data-cat="entertainment" onclick="switchCat(this)">Entertainment</div>
  <div class="news-cat" data-cat="science" onclick="switchCat(this)">Science</div>
  <div class="news-cat" data-cat="world" onclick="switchCat(this)">World</div>

  <div id="search">
    <input id="news-search-input" placeholder="Search..." oninput="filterNews()">
  </div>
</div>

<a id="news-hero" target="_blank"></a>

<div id="news-grid"></div>

<script>
const PROXY = "https://api.allorigins.win/raw?url=";

/* GOOGLE NEWS */
const GOOGLE_NEWS = {
  top: "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en",
  tech: "https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=en-US&gl=US&ceid=US:en",
  business: "https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=en-US&gl=US&ceid=US:en",
  sports: "https://news.google.com/rss/headlines/section/topic/SPORTS?hl=en-US&gl=US&ceid=US:en",
  entertainment: "https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=en-US&gl=US&ceid=US:en",
  science: "https://news.google.com/rss/headlines/section/topic/SCIENCE?hl=en-US&gl=US&ceid=US:en",
  world: "https://news.google.com/rss/headlines/section/topic/WORLD?hl=en-US&gl=US&ceid=US:en"
};

/* BACKUP SOURCES */
const BACKUP = {
  top: [
    "https://rss.cnn.com/rss/edition.rss",
    "https://feeds.bbci.co.uk/news/rss.xml"
  ],
  tech: [
    "https://techcrunch.com/feed/"
  ],
  business: [
    "https://www.forbes.com/business/feed/"
  ],
  sports: [
    "https://www.espn.com/espn/rss/news"
  ]
};

let allArticles = [];
let currentCat = "top";

/* FETCH */
async function fetchRSS(url) {
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const text = await res.text();

    const xml = new DOMParser().parseFromString(text, "text/xml");
    const items = [...xml.querySelectorAll("item")];

    return items.map(item => {
      const title = item.querySelector("title")?.textContent || "";
      const link = item.querySelector("link")?.textContent || "#";
      const raw = item.querySelector("description")?.textContent || "";

      const desc = raw.replace(/<[^>]*>/g, "").slice(0, 140);
      const img = (raw.match(/<img.*?src="(.*?)"/) || [])[1] || "";

      return { title, link, description: desc, image: img };
    });

  } catch {
    return [];
  }
}

/* TRENDING */
function score(a) {
  const keywords = ["breaking","ai","war","election","apple","google","tesla"];
  let s = 0;
  keywords.forEach(k => {
    if (a.title.toLowerCase().includes(k)) s += 5;
  });
  return s + (100 - a.title.length) / 20;
}

/* LOAD */
async function loadNews() {
  const grid = document.getElementById("news-grid");

  grid.innerHTML = `<div class="news-status">Loading...</div>`;
  document.getElementById("news-hero").style.display = "none";
  document.getElementById("api-name").textContent = "Hybrid";

  const sources = [
    GOOGLE_NEWS[currentCat],
    ...(BACKUP[currentCat] || [])
  ];

  let results = [];
  const responses = await Promise.all(sources.map(fetchRSS));
  responses.forEach(r => results.push(...r));

  if (!results.length) {
    grid.innerHTML = `<div class="news-status">❌ Failed to load news</div>`;
    return;
  }

  /* REMOVE DUPES */
  const seen = new Set();
  results = results.filter(a => {
    if (seen.has(a.title)) return false;
    seen.add(a.title);
    return true;
  });

  /* SORT */
  results.sort((a,b)=>score(b)-score(a));

  allArticles = results.slice(0, 30);

  renderHero(allArticles[0]);
  renderCards(allArticles.slice(1));
}

/* RENDER */
function renderHero(a) {
  const hero = document.getElementById("news-hero");
  if (!a) return;

  hero.style.display = "block";
  hero.href = a.link;

  hero.innerHTML = `
    <img src="${a.image || 'https://picsum.photos/800/400'}" class="news-hero-img">
    <div class="news-hero-title">${a.title}</div>
    <div class="news-hero-desc">${a.description}</div>
  `;
}

function renderCards(list) {
  const grid = document.getElementById("news-grid");

  grid.innerHTML = list.map(a => `
    <a class="news-card" href="${a.link}" target="_blank">
      <img src="${a.image || 'https://picsum.photos/300/200'}" class="news-card-img">
      <div class="news-card-title">${a.title}</div>
      <div class="news-card-desc">${a.description}</div>
    </a>
  `).join("");
}

/* SEARCH */
function filterNews() {
  const q = document.getElementById("news-search-input").value.toLowerCase();

  if (!q) {
    renderHero(allArticles[0]);
    renderCards(allArticles.slice(1));
    return;
  }

  const f = allArticles.filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.description.toLowerCase().includes(q)
  );

  document.getElementById("news-hero").style.display = "none";
  renderCards(f);
}

/* CATEGORY */
function switchCat(btn) {
  document.querySelectorAll(".news-cat").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  currentCat = btn.dataset.cat;
  loadNews();
}

/* AUTO REFRESH */
setInterval(loadNews, 300000);

/* INIT */
loadNews();
</script>

</body>
</html>
