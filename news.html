  <style>
    .news-page { max-width: 900px; margin: 0 auto; padding: 80px 20px 60px; }

    /* ── Header ── */
    .news-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px; flex-wrap: wrap; gap: 10px;
    }
    .news-header h2 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .api-badge {
      font-size: 11px; color: var(--mut); margin-bottom: 16px;
      display: flex; align-items: center; gap: 6px;
    }
    body.dark .api-badge { color: var(--mutd); }
    .api-badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
      box-shadow: 0 0 6px #22c55e;
    }
    .api-badge strong { color: var(--a); }

    /* ── Category pills ── */
    .news-cats { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
    .news-cat {
      padding: 5px 15px; border-radius: 999px;
      border: 1px solid var(--br); background: transparent;
      color: var(--txt); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: .2s; white-space: nowrap;
    }
    body.dark .news-cat { color: var(--txtd); }
    .news-cat:hover { border-color: var(--a); color: var(--a); transform: none; box-shadow: none; }
    .news-cat.active {
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816; border-color: transparent;
    }

    /* ── Search ── */
    .news-search { margin-bottom: 20px; }
    #news-search-input {
      width: 100%; padding: 10px 18px; border-radius: 999px;
      border: 1px solid var(--br); background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px); color: var(--txt); font-size: 14px;
      outline: none; font-family: inherit; box-sizing: border-box;
    }
    body.dark #news-search-input { color: var(--txtd); }
    #news-search-input:focus { border-color: var(--a); }

    /* ── HERO ── */
    .news-hero {
      display: none; text-decoration: none; color: inherit;
      border-radius: 18px; overflow: hidden;
      background: rgba(255,255,255,.6); backdrop-filter: blur(12px);
      border: 1px solid var(--br); margin-bottom: 24px;
      transition: .25s; position: relative;
    }
    body.dark .news-hero { background: rgba(15,23,42,.75); }
    .news-hero:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(0,0,0,.14); border-color: var(--a); }

    .news-hero-img-wrap { width: 100%; height: 320px; overflow: hidden; position: relative; }
    .news-hero-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .4s ease;
    }
    .news-hero:hover .news-hero-img { transform: scale(1.03); }
    .news-hero-img-placeholder {
      width: 100%; height: 320px;
      background: linear-gradient(135deg, var(--a), var(--a2));
      display: flex; align-items: center; justify-content: center; font-size: 64px;
    }
    .news-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.1) 50%, transparent 100%);
    }
    .news-hero-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 24px 20px;
    }
    .news-hero-tag {
      display: inline-block; padding: 3px 12px; border-radius: 999px;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816; font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
    }
    .news-hero-title {
      font-size: 22px; font-weight: 800; color: #fff;
      line-height: 1.35; text-shadow: 0 1px 8px rgba(0,0,0,.4);
      margin-bottom: 6px;
    }
    .news-hero-meta { font-size: 12px; color: rgba(255,255,255,.7); }

    /* ── GRID ── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 700px) { .news-grid { grid-template-columns: 1fr; } }
    @media (min-width: 701px) and (max-width: 960px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ── CARD ── */
    .news-card {
      background: rgba(255,255,255,.6); backdrop-filter: blur(12px);
      border: 1px solid var(--br); border-radius: 14px; overflow: hidden;
      text-decoration: none; color: inherit; display: flex; flex-direction: column;
      transition: .22s; position: relative;
    }
    body.dark .news-card { background: rgba(15,23,42,.75); }
    .news-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,.13);
      border-color: var(--a);
    }

    .news-card-img-wrap { width: 100%; height: 160px; overflow: hidden; flex-shrink: 0; }
    .news-card-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .35s ease;
    }
    .news-card:hover .news-card-img { transform: scale(1.06); }
    .news-card-img-placeholder {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, var(--a), var(--a2));
      display: flex; align-items: center; justify-content: center; font-size: 40px;
    }

    .news-card-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }

    .news-card-meta {
      display: flex; align-items: center; justify-content: space-between;
      gap: 6px;
    }
    .news-card-source {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--a);
      display: flex; align-items: center; gap: 4px;
    }
    .news-card-source img { width: 12px; height: 12px; border-radius: 2px; }
    .news-card-date { font-size: 10px; color: var(--mut); }
    body.dark .news-card-date { color: var(--mutd); }

    .news-card-title {
      font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--txt);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    body.dark .news-card-title { color: var(--txtd); }

    .news-card-desc {
      font-size: 12px; color: var(--mut); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    body.dark .news-card-desc { color: var(--mutd); }

    .news-card-footer {
      display: flex; align-items: center; gap: 6px; margin-top: auto; padding-top: 8px;
    }
    .read-more {
      font-size: 11px; font-weight: 700; color: var(--a);
      margin-left: auto; display: flex; align-items: center; gap: 3px;
    }

    /* ── Status ── */
    .news-status {
      text-align: center; padding: 60px 20px;
      color: var(--mut); font-size: 15px; grid-column: 1 / -1;
    }
    body.dark .news-status { color: var(--mutd); }
    .news-status .spinner {
      width: 32px; height: 32px; border: 3px solid var(--br);
      border-top-color: var(--a); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Refresh btn ── */
    .refresh-btn {
      padding: 7px 16px; border-radius: 999px; border: 1px solid var(--br);
      background: transparent; color: var(--txt); font-size: 12px;
      font-weight: 600; cursor: pointer; transition: .2s;
    }
    body.dark .refresh-btn { color: var(--txtd); }
    .refresh-btn:hover { border-color: var(--a); color: var(--a); transform: none; box-shadow: none; }

    @media (max-width: 600px) {
      .news-header { flex-direction: column; align-items: flex-start; }
      .news-hero-img-wrap { height: 220px; }
      .news-hero-title { font-size: 18px; }
    }

<script>
/* ══════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════ */

const PROXY = "https://api.allorigins.win/raw?url=";

const GOOGLE_NEWS = {
  top: "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en",
  tech: "https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=en-US&gl=US&ceid=US:en",
  business: "https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=en-US&gl=US&ceid=US:en",
  sports: "https://news.google.com/rss/headlines/section/topic/SPORTS?hl=en-US&gl=US&ceid=US:en",
  entertainment: "https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=en-US&gl=US&ceid=US:en",
  science: "https://news.google.com/rss/headlines/section/topic/SCIENCE?hl=en-US&gl=US&ceid=US:en",
  world: "https://news.google.com/rss/headlines/section/topic/WORLD?hl=en-US&gl=US&ceid=US:en"
};

let allArticles = [];
let currentCat = "top";

/* ══════════════════════════════════════════════
   FETCH + PARSE
══════════════════════════════════════════════ */

async function fetchNews(url) {
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const text = await res.text();

    const xml = new DOMParser().parseFromString(text, "text/xml");
    const items = [...xml.querySelectorAll("item")];

    return items.map(item => {
      const title = item.querySelector("title")?.textContent || "";
      const link = item.querySelector("link")?.textContent || "#";
      const descRaw = item.querySelector("description")?.textContent || "";

      // CLEAN DESCRIPTION (removes HTML junk)
      const desc = descRaw.replace(/<[^>]*>/g, "").slice(0, 140);

      // TRY EXTRACT IMAGE FROM DESCRIPTION
      const imgMatch = descRaw.match(/<img.*?src="(.*?)"/);
      const image = imgMatch ? imgMatch[1] : "";

      return {
        title,
        link,
        description: desc,
        image,
        time: Date.now()
      };
    });

  } catch (err) {
    console.error("News fetch failed:", err);
    return [];
  }
}

/* ══════════════════════════════════════════════
   TRENDING SCORE
══════════════════════════════════════════════ */

function getTrendingScore(article) {
  const keywords = [
    "breaking", "major", "alert", "crisis",
    "war", "election", "ai", "apple", "google",
    "microsoft", "tesla", "openai"
  ];

  let score = 0;

  keywords.forEach(k => {
    if (article.title.toLowerCase().includes(k)) {
      score += 5;
    }
  });

  // Slight boost for shorter titles (usually headlines)
  score += Math.max(0, 100 - article.title.length) / 20;

  return score;
}

/* ══════════════════════════════════════════════
   LOAD NEWS
══════════════════════════════════════════════ */

async function loadNews() {
  const grid = document.getElementById("news-grid");

  grid.innerHTML = `<div class="news-status">Loading news...</div>`;
  document.getElementById("news-hero").style.display = "none";
  document.getElementById("api-name").textContent = "Google News";

  const url = GOOGLE_NEWS[currentCat] || GOOGLE_NEWS.top;

  let articles = await fetchNews(url);

  if (!articles.length) {
    grid.innerHTML = `<div class="news-status">❌ Failed to load news.</div>`;
    return;
  }

  // SORT BY TRENDING
  articles.sort((a, b) => getTrendingScore(b) - getTrendingScore(a));

  allArticles = articles.slice(0, 25);

  renderHero(allArticles[0]);
  renderCards(allArticles.slice(1));
}

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */

function renderHero(a) {
  const hero = document.getElementById("news-hero");

  if (!a) return;

  hero.style.display = "block";
  hero.href = a.link;

  hero.innerHTML = `
    <img src="${a.image || 'https://picsum.photos/800/400'}" class="news-hero-img"/>
    <div class="news-hero-content">
      <div class="news-hero-title">${a.title}</div>
      <div class="news-hero-desc">${a.description}</div>
    </div>
  `;
}

function renderCards(list) {
  const grid = document.getElementById("news-grid");

  grid.innerHTML = list.map(a => `
    <a class="news-card" href="${a.link}" target="_blank">
      <img src="${a.image || 'https://picsum.photos/300/200'}" class="news-card-img"/>
      <div class="news-card-title">${a.title}</div>
      <div class="news-card-desc">${a.description}</div>
    </a>
  `).join("");
}

/* ══════════════════════════════════════════════
   SEARCH (UPGRADED)
══════════════════════════════════════════════ */

function filterNews() {
  const q = document.getElementById("news-search-input").value.toLowerCase();

  if (!q) {
    renderHero(allArticles[0]);
    renderCards(allArticles.slice(1));
    return;
  }

  const filtered = allArticles.filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.description.toLowerCase().includes(q)
  );

  document.getElementById("news-hero").style.display = "none";
  renderCards(filtered);
}

/* ══════════════════════════════════════════════
   CATEGORY SWITCH
══════════════════════════════════════════════ */

function switchCat(btn) {
  document.querySelectorAll(".news-cat").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  currentCat = btn.dataset.cat;
  loadNews();
}

/* ══════════════════════════════════════════════
   AUTO REFRESH (every 5 min)
══════════════════════════════════════════════ */

setInterval(loadNews, 300000);

/* INIT */
loadNews();
</script></body>
