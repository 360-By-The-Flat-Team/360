<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 — News</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    #trending {
      margin-bottom: 15px;
      font-weight: bold;
    }

    input {
      padding: 8px;
      width: 250px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 10px;
      margin: 5px;
      cursor: pointer;
    }

    .news-card {
      border: 1px solid #ccc;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .news-card h3 {
      margin: 0 0 10px 0;
    }

    .news-card p {
      margin: 0 0 10px 0;
    }
  </style>
</head>
<body>

  <h1>News</h1>

  <div id="trending"></div>

  <input type="text" placeholder="Search news..." oninput="searchNews(this.value)">

  <button onclick="showSaved()">Saved Articles</button>

  <div id="newsContainer"></div>

  <!-- Your JS -->
  <script src="js/news.js"></script>

</body>
</html>
