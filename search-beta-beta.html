<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-89NN1P6CEV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-89NN1P6CEV');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 Search</title>

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="360" />

  <link rel="icon" type="image/png" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- 360 OS CSS -->
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/wide.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
  <link rel="stylesheet" href="/assets/css/cursor.css" />
  <link rel="stylesheet" href="/assets/css/search.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-num" id="s3">3</div>
    <div class="splash-num" id="s6">6</div>
    <div class="splash-num" id="s0">0</div>
  </div>

  <script>
    (function(){
      const isPWA = window.matchMedia('(display-mode:standalone)').matches || window.navigator.standalone === true;
      if(!isPWA){ document.getElementById('splash')?.remove(); return; }

      const splash = document.getElementById("splash");
      setTimeout(()=>document.getElementById("s3").classList.add("slide-up"),80);
      setTimeout(()=>document.getElementById("s6").classList.add("slide-down"),210);
      setTimeout(()=>document.getElementById("s0").classList.add("slide-up"),340);
      setTimeout(()=>{
        splash.classList.add("fade");
        splash.addEventListener("transitionend",()=>splash.remove(),{once:true});
      },1250);
    })();
  </script>

  <!-- Cursor -->
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>
  <div class="cursor-crosshair"></div>
  <div class="cursor-blob"></div>

  <!-- Auth buttons -->
  <div class="auth-top-right">
    <button id="signInBtn" class="auth-btn">Sign In</button>
    <button id="signUpBtn" class="auth-btn">Sign Up</button>
    <button id="signOutBtn" class="auth-btn" style="display:none;">Sign Out</button>
  </div>

  <!-- Install + sidebar toggle -->
  <button id="installBtn" class="install-banner" style="display:none;">Install 360</button>
  <button class="sidebar-toggle" id="sidebarToggle">☰ Menu</button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark"></div>
      <button id="settingsBtn">⚙</button>
    </div>
    <nav class="nav-list">
      <div class="nav-item" data-href="/">Home</div>
      <div class="nav-item" data-href="/ai">AI</div>
      <div class="nav-item" data-href="/weather">Weather</div>
      <div class="nav-item" data-href="/translator">Translator</div>
      <div class="nav-item" data-href="/stocks">Stocks</div>
      <div class="nav-item" data-href="/url-shortener">URL Shortener</div>
      <div class="nav-item" data-href="/chat">Chat</div>
      <div class="nav-item" data-href="/news">News</div>
      <div class="nav-item" data-href="/apps">Apps</div>
      <div class="nav-item" data-href="/games">Games</div>
      <div class="nav-item active" data-href="/search">Search</div>
    </nav>
    <div class="sidebar-footer"><span id="sidebar-ver">Loading...</span></div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <div class="settings-panel" id="settingsPanel"></div>
  <div id="auth-popup" class="auth-popup hidden"></div>

  <!-- SEARCH PAGE -->
  <div class="search-results-page">

    <!-- TOP STRIP -->
    <header class="search-bar-strip">
      <a class="strip-logo" href="/">360</a>

      <form id="strip-search-form">
        <input id="strip-search-input" type="text" placeholder="Search with 360…" autocomplete="off" />

        <!-- Bob -->
        <div id="bob-canvas-wrap">
          <canvas id="bob-canvas" width="32" height="32"></canvas>
        </div>

        <!-- Autocomplete -->
        <div id="autocompleteList" class="autocomplete"></div>

        <!-- Recommended -->
        <div id="recommendedBox" class="recommended-box hidden">
          <div class="recommended-title">Popular searches</div>
          <div id="recommendedList" class="recommended-list"></div>
        </div>

        <button id="strip-search-btn" type="submit">Search</button>
      </form>

      <!-- TOP CONTROLS -->
      <div class="top-controls">
        <div class="top-tabs">
          <button id="tabAll" class="pill-btn active">All</button>
          <button id="tabImages" class="pill-btn">Images</button>
        </div>
        <div class="top-views">
          <button id="listViewBtn" class="pill-btn active">List</button>
          <button id="gridViewBtn" class="pill-btn">Grid</button>
        </div>
        <div class="top-safe">
          <select id="safeSelect" class="safe-select pill-select">
            <option value="moderate">Moderate</option>
            <option value="strict">Strict</option>
            <option value="off">Off</option>
          </select>
        </div>
      </div>
    </header>
    <!-- MAIN LAYOUT -->
    <div class="search-main-layout">

      <!-- LEFT -->
      <div class="search-left">

        <!-- SPEED TEST -->
        <article id="speedTestModule" class="result-card hidden speed-module">
          <h2 class="speed-title">Speed Test</h2>
          <div class="speed-layout">
            <canvas id="speedometer" width="260" height="140"></canvas>
            <div class="speed-stats">
              <div class="speed-row">
                <span>Ping</span>
                <span><span id="pingResult">0</span> ms</span>
              </div>
              <div class="speed-row">
                <span>Download</span>
                <span><span id="downloadResult">0.0</span> <span id="unitLabel">Mbps</span></span>
              </div>
              <div class="speed-row">
                <span>Upload</span>
                <span><span id="uploadResult">0.0</span> <span id="unitLabel2">Mbps</span></span>
              </div>
              <div class="speed-row">
                <span>Units</span>
                <select id="unitSelect">
                  <option value="mbps" selected>Mbps</option>
                  <option value="mbps2">MB/s</option>
                  <option value="kbps">Kbps</option>
                </select>
              </div>
              <button id="startSpeedTest" type="button" class="speed-btn">Start test</button>
              <div id="speedResults" class="speed-results">
                <p id="speedFeedback">Run a test to see your connection quality.</p>
              </div>
            </div>
          </div>
        </article>

        <!-- RESULTS (WEB) -->
        <div id="resultsContainer" class="results list-view"></div>

        <!-- IMAGE RESULTS -->
        <div id="imageResults" class="results images-view hidden"></div>

        <!-- PAA -->
        <section id="paaSection" class="paa-section hidden">
          <h2 class="paa-title">People also ask</h2>
          <div id="paaList"></div>
        </section>

      </div>

      <!-- KNOWLEDGE PANEL -->
      <aside id="knowledgePanel" class="knowledge-panel hidden"></aside>

    </div>
  </div>

  <!-- Loader -->
  <div id="frame-loader" class="loading">
    <div class="loader-spinner"></div>
    Loading…
  </div>

  <!-- No Results -->
  <div id="no-query" class="no-results">
    <div class="big-emoji">🔎</div>
    No results found
  </div>

  <!-- 360 OS Scripts -->
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/wide.js"></script>
  <script src="/assets/js/home.js"></script>
  <script src="/assets/js/cookie.js"></script>
  <script src="/assets/js/cursor.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    const firebaseConfig = {
      apiKey: "AIzaSyBkseE2U7bot9WnMLsCc89gYonhLSUHnPs",
      authDomain: "search360-dev.firebaseapp.com",
      projectId: "search360-dev",
      storageBucket: "search360-dev.firebasestorage.app",
      messagingSenderId: "936030276122",
      appId: "1:936030276122:web:5877f7152f8f2411e0dfa3",
      measurementId: "G-KYMVNB0F7M"
    };
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
  </script>
<script>
(() => {

  /* ============================================================
     STATE
  ============================================================ */
  const state = {
    q: "",
    tab: "all",
    page: 1,
    safe: "moderate",
    view: "list", // list | grid
    loading: false
  };

  /* ============================================================
     ELEMENTS
  ============================================================ */
  const input = document.getElementById("strip-search-input");
  const form = document.getElementById("strip-search-form");
  const resultsContainer = document.getElementById("resultsContainer");
  const imageResults = document.getElementById("imageResults");
  const kpBox = document.getElementById("knowledgePanel");
  const paaBox = document.getElementById("paaSection");
  const paaList = document.getElementById("paaList");
  const loader = document.getElementById("frame-loader");
  const noQuery = document.getElementById("no-query");

  const tabAll = document.getElementById("tabAll");
  const tabImages = document.getElementById("tabImages");

  const listViewBtn = document.getElementById("listViewBtn");
  const gridViewBtn = document.getElementById("gridViewBtn");

  const safeSelect = document.getElementById("safeSelect");

  const autocompleteList = document.getElementById("autocompleteList");
  const recommendedBox = document.getElementById("recommendedBox");
  const recommendedList = document.getElementById("recommendedList");

  /* ============================================================
     HELPERS
  ============================================================ */
  function showLoader() {
    loader.classList.add("visible");
    noQuery.classList.remove("visible");
    resultsContainer.innerHTML = "";
    imageResults.innerHTML = "";
    kpBox.classList.add("hidden");
    paaBox.classList.add("hidden");
  }

  function hideLoader() {
    loader.classList.remove("visible");
  }

  function showNoResults() {
    noQuery.classList.add("visible");
  }

  function clearResults() {
    resultsContainer.innerHTML = "";
    imageResults.innerHTML = "";
    kpBox.classList.add("hidden");
    paaBox.classList.add("hidden");
  }

  function esc(str) {
    return str ? str.replace(/[&<>"]/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;"
    }[c])) : "";
  }

  /* ============================================================
     EDGE FUNCTION CALL
  ============================================================ */
  async function runSearch(q, tab = "all", page = 1) {
    state.loading = true;
    showLoader();

    try {
      const res = await fetch("https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          q,
          tab,
          page,
          safe: state.safe
        })
      });

      const data = await res.json();
      hideLoader();

      if (!data || (!data.web?.length && !data.images?.length)) {
        showNoResults();
        return;
      }

      renderAll(data);

    } catch (err) {
      hideLoader();
      showNoResults();
    }

    state.loading = false;
  }

  /* ============================================================
     RENDER ALL
  ============================================================ */
  function renderAll(data) {
    clearResults();

    if (state.tab === "images") {
      renderImages(data.images || []);
    } else {
      renderWeb(data.web || []);
    }

    if (data.kp) renderKP(data.kp);
    if (data.paa?.length) renderPAA(data.paa);
  }

  /* ============================================================
     RENDER WEB RESULTS
  ============================================================ */
  function renderWeb(list) {
    resultsContainer.classList.remove("hidden");
    imageResults.classList.add("hidden");

    resultsContainer.classList.toggle("list-view", state.view === "list");
    resultsContainer.classList.toggle("grid-view", state.view === "grid");

    resultsContainer.innerHTML = list.map(r => `
      <article class="result-card">
        <div class="result-header">
          <img class="result-favicon" src="${esc(r.favicon)}" />
          <a class="result-title" href="${esc(r.url)}" target="_blank">${esc(r.title)}</a>
        </div>
        <div class="result-desc">${esc(r.desc)}</div>
        <div class="result-url">${esc(r.url)}</div>
      </article>
    `).join("");
  }

  /* ============================================================
     RENDER IMAGE RESULTS
  ============================================================ */
  function renderImages(list) {
    resultsContainer.classList.add("hidden");
    imageResults.classList.remove("hidden");

    imageResults.innerHTML = list.map(img => `
      <a class="image-card" href="${esc(img.url)}" target="_blank">
        <img src="${esc(img.src)}" alt="${esc(img.alt)}" />
        <div class="image-card-caption">${esc(img.alt)}</div>
      </a>
    `).join("");
  }

  /* ============================================================
     RENDER KNOWLEDGE PANEL
  ============================================================ */
  function renderKP(kp) {
    kpBox.classList.remove("hidden");

    kpBox.innerHTML = `
      ${kp.image ? `<img class="kp-thumb" src="${esc(kp.image)}">` : ""}
      <div class="kp-title">${esc(kp.title || "")}</div>
      <div class="kp-subtitle">${esc(kp.type || "")}</div>
      <div class="kp-extract">${esc(kp.description || "")}</div>
      ${kp.url ? `<a class="kp-link" href="${esc(kp.url)}" target="_blank">More info</a>` : ""}
    `;
  }

  /* ============================================================
     RENDER PAA
  ============================================================ */
  function renderPAA(list) {
    paaBox.classList.remove("hidden");

    paaList.innerHTML = list.map((q, i) => `
      <div class="paa-item" data-i="${i}">
        <div class="paa-question">
          <span>${esc(q.question)}</span>
          <span class="chevron">›</span>
        </div>
        <div class="paa-answer">${esc(q.answer || "")}</div>
      </div>
    `).join("");

    paaList.querySelectorAll(".paa-item").forEach(item => {
      item.addEventListener("click", () => {
        item.classList.toggle("open");
      });
    });
  }

  /* ============================================================
     AUTOCOMPLETE (Google Suggest)
  ============================================================ */
  let suggestTimer = null;

  input.addEventListener("input", () => {
    const q = input.value.trim();
    if (!q) {
      autocompleteList.innerHTML = "";
      autocompleteList.classList.remove("visible");
      return;
    }

    clearTimeout(suggestTimer);
    suggestTimer = setTimeout(() => fetchSuggestions(q), 120);
  });

  async function fetchSuggestions(q) {
    const url = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}`;
    const res = await fetch(url);
    const data = await res.json();

    const items = data[1] || [];
    if (!items.length) {
      autocompleteList.classList.remove("visible");
      return;
    }

    autocompleteList.innerHTML = items.slice(0, 6).map(s => `
      <div class="ac-item" data-val="${esc(s)}">${esc(s)}</div>
    `).join("");

    autocompleteList.classList.add("visible");

    autocompleteList.querySelectorAll(".ac-item").forEach(el => {
      el.addEventListener("mousedown", () => {
        input.value = el.dataset.val;
        autocompleteList.classList.remove("visible");
        submitSearch();
      });
    });
  }

  /* ============================================================
     RECOMMENDED SEARCHES
  ============================================================ */
  const recommended = ["weather tomorrow", "nba scores", "news today", "minecraft seeds", "iphone 16", "spotify web"];

  recommendedList.innerHTML = recommended.map(r => `
    <div class="rec-item" data-val="${esc(r)}">${esc(r)}</div>
  `).join("");

  recommendedList.querySelectorAll(".rec-item").forEach(el => {
    el.addEventListener("click", () => {
      input.value = el.dataset.val;
      recommendedBox.classList.add("hidden");
      submitSearch();
    });
  });

  input.addEventListener("focus", () => {
    if (!input.value.trim()) recommendedBox.classList.remove("hidden");
  });

  input.addEventListener("blur", () => {
    setTimeout(() => recommendedBox.classList.add("hidden"), 150);
  });

  /* ============================================================
     FORM SUBMIT
  ============================================================ */
  form.addEventListener("submit", e => {
    e.preventDefault();
    submitSearch();
  });

  function submitSearch() {
    const q = input.value.trim();
    if (!q) return;

    state.q = q;
    state.page = 1;
    runSearch(q, state.tab, 1);
  }

  /* ============================================================
     TABS
  ============================================================ */
  tabAll.addEventListener("click", () => {
    state.tab = "all";
    tabAll.classList.add("active");
    tabImages.classList.remove("active");
    if (state.q) runSearch(state.q, "all", 1);
  });

  tabImages.addEventListener("click", () => {
    state.tab = "images";
    tabImages.classList.add("active");
    tabAll.classList.remove("active");
    if (state.q) runSearch(state.q, "images", 1);
  });

  /* ============================================================
     VIEW TOGGLE
  ============================================================ */
  listViewBtn.addEventListener("click", () => {
    state.view = "list";
    listViewBtn.classList.add("active");
    gridViewBtn.classList.remove("active");
    if (state.q && state.tab === "all") renderWeb(JSON.parse(JSON.stringify(state.lastWeb || [])));
  });

  gridViewBtn.addEventListener("click", () => {
    state.view = "grid";
    gridViewBtn.classList.add("active");
    listViewBtn.classList.remove("active");
    if (state.q && state.tab === "all") renderWeb(JSON.parse(JSON.stringify(state.lastWeb || [])));
  });

  /* ============================================================
     SAFESEARCH
  ============================================================ */
  safeSelect.addEventListener("change", () => {
    state.safe = safeSelect.value;
    if (state.q) runSearch(state.q, state.tab, 1);
  });

})();
</script>
</body>
</html>
