<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 Search</title>

  <link rel="stylesheet" href="/assets/css/search.css" />
  <link rel="manifest" href="/manifest.json" />
</head>

<body>

  <header class="topbar">
    <div class="logo">360</div>

    <div class="safesearch-wrapper">
      <label for="safeSelect">SafeSearch:</label>
      <select id="safeSelect" class="safe-select">
        <option value="moderate">Moderate</option>
        <option value="strict">Strict</option>
        <option value="off">Off (Login Required)</option>
      </select>
    </div>
  </header>

  <section class="search-section">
    <form id="strip-search-form" autocomplete="off">
      <div class="search-bar-wrapper">
        <input
          id="strip-search-input"
          type="text"
          placeholder="Search the web..."
          spellcheck="false"
        />

        <div id="autocompleteList" class="autocomplete"></div>
      </div>

      <button type="submit" class="search-btn">Search</button>
    </form>
  </section>

  <div class="view-toggle">
    <button id="listViewBtn" class="toggle-btn active">List</button>
    <button id="gridViewBtn" class="toggle-btn">Grid</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="all">All</button>
    <button class="tab-btn" data-tab="images">Images</button>
  </div>

  <main class="layout">
    <div class="main-column">
      <div id="resultsContainer" class="results list-view"></div>

      <!-- PEOPLE ALSO ASK -->
      <section id="paaSection" class="paa-section hidden">
        <h3 class="paa-title">People also ask</h3>
        <div id="paaList"></div>
      </section>

      <div id="imageResults" class="image-grid hidden"></div>
    </div>

    <aside id="knowledgePanel" class="hidden"></aside>
  </main>

  <div id="frame-loader" class="loader hidden">Loading…</div>
  <div id="no-query" class="no-results hidden">No results found.</div>

  <script src="/assets/js/search.js"></script>
</body>
</html>
