<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360</title>
  <link rel="icon" href="/assets/img/favicon.png" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
      background: #f5f5f5;
    }

    .topbar {
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.6);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .topbar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.15);
      font-size: 16px;
      backdrop-filter: blur(8px);
    }

    .results {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      padding: 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-title a {
      color: #0077ff;
      text-decoration: none;
    }

    .card-snippet {
      font-size: 15px;
      color: #333;
      margin-bottom: 8px;
    }

    .card-url {
      font-size: 13px;
      color: #666;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 40px 0;
    }

    .page-btn {
      padding: 10px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,0,0,0.1);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .page-btn:hover {
      background: rgba(255,255,255,0.8);
    }
  </style>
</head>

<body>
  <div class="topbar">
    <input id="searchBox" type="text" placeholder="Search 360…" />
  </div>

  <div class="results" id="results"></div>

  <div class="pagination" id="pagination"></div>

  <script src="/search.js"></script>
</body>
</html>
