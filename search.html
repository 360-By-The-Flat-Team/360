<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>360 Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/css/search.css">
</head>
<body class="search-body">
  <div class="search-results-page">
    <!-- Top strip -->
    <header class="search-bar-strip">
      <a href="/" class="strip-logo">360</a>
      <form id="strip-search-form">
        <input
          id="strip-search-input"
          type="text"
          placeholder="Search 360..."
          autocomplete="off"
        />
        <button id="strip-search-btn" type="submit">Search</button>
        <select id="safeSelect" aria-label="SafeSearch">
          <option value="strict">Strict</option>
          <option value="moderate" selected>Moderate</option>
          <option value="off">Off</option>
        </select>
      </form>
    </header>

    <!-- Main layout -->
    <main class="search-main-layout">
      <!-- LEFT COLUMN -->
      <section class="search-left">
        <!-- Tabs + view toggle -->
        <div class="search-top-row">
          <div class="search-tabs">
            <button id="tabAll" class="tab-btn active" type="button">All</button>
            <button id="tabImages" class="tab-btn" type="button">Images</button>
          </div>
          <div class="view-toggle">
            <button id="listViewBtn" class="toggle-btn active" type="button">List</button>
            <button id="gridViewBtn" class="toggle-btn" type="button">Grid</button>
          </div>
        </div>

        <!-- Speed test module -->
        <article id="speedTestModule" class="result-card hidden speed-module">
          <h2 class="speed-title">Speed Test</h2>
          <div class="speed-layout">
            <canvas id="speedometer" width="260" height="140"></canvas>
            <div class="speed-stats">
              <div class="speed-row">
                <span>Ping</span>
                <span><span id="pingResult">0</span> ms</span>
              </div>
              <div class="speed-row">
                <span>Download</span>
                <span><span id="downloadResult">0.0</span> <span id="unitLabel">Mbps</span></span>
              </div>
              <div class="speed-row">
                <span>Upload</span>
                <span><span id="uploadResult">0.0</span> <span id="unitLabel2">Mbps</span></span>
              </div>
              <div class="speed-row">
                <span>Units</span>
                <select id="unitSelect">
                  <option value="mbps" selected>Mbps</option>
                  <option value="mbps2">MB/s</option>
                  <option value="kbps">Kbps</option>
                </select>
              </div>
              <button id="startSpeedTest" type="button" class="speed-btn">Start test</button>
              <div id="speedResults" class="speed-results">
                <p id="speedFeedback">Run a test to see your connection quality.</p>
              </div>
            </div>
          </div>
        </article>

        <!-- Loader -->
        <div id="frame-loader" class="loading">
          <div class="loader-spinner"></div>
          <div>Searching 360…</div>
        </div>

        <!-- No query / no results -->
        <div id="no-query" class="no-results">
          <div class="big-emoji">🔍</div>
          <div>No results yet. Try searching for something.</div>
        </div>

        <!-- Results -->
        <section id="resultsContainer" class="results list-view"></section>
        <section id="imageResults" class="results images-view hidden"></section>

        <!-- PAA -->
        <section id="paaSection" class="paa-section hidden">
          <h2 class="paa-title">People also ask</h2>
          <div id="paaList"></div>
        </section>
      </section>

      <!-- RIGHT COLUMN -->
      <aside id="knowledgePanel" class="knowledge-panel hidden"></aside>
    </main>
  </div>

  <!-- Root loader -->
  <script type="module" src="/search.js"></script>
</body>
</html>
