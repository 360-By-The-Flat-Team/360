<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 Search</title>

  <link rel="stylesheet" href="/assets/css/search.css" />
<link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/cursor.css" />


</head>

<body>

  <!-- ============================
       TOP SEARCH BAR
  ============================= -->
  <header id="strip">
    <form id="strip-search-form">

      <input 
        id="strip-search-input" 
        type="text" 
        placeholder="Search 360…" 
        autocomplete="off"
      />

      <!-- 🔥 Autocomplete -->
      <div id="autocompleteList" class="autocomplete"></div>

      <!-- 🔥 Recommended Searches Popup -->
      <div id="recommendedBox" class="recommended-box hidden">
        <div class="recommended-title">Popular searches</div>
        <div id="recommendedList" class="recommended-list"></div>
      </div>

      <button id="strip-search-btn" type="submit">Search</button>
    </form>

    <!-- SafeSearch -->
    <select id="safeSelect">
      <option value="moderate">Moderate</option>
      <option value="strict">Strict</option>
      <option value="off">Off</option>
    </select>
  </header>

  <!-- ============================
       TABS
  ============================= -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="all">All</button>
    <button class="tab-btn" data-tab="images">Images</button>
  </div>

  <!-- ============================
       VIEW TOGGLE
  ============================= -->
  <div class="view-toggle">
    <button id="listViewBtn" class="view-btn active">List</button>
    <button id="gridViewBtn" class="view-btn">Grid</button>
  </div>

  <!-- ============================
       KNOWLEDGE PANEL
  ============================= -->
  <aside id="knowledgePanel" class="kp hidden"></aside>

  <!-- ============================
       PAA (People Also Ask)
  ============================= -->
  <section id="paaSection" class="paa-section hidden">
    <div id="paaList"></div>
  </section>

  <!-- ============================
       RESULTS
  ============================= -->
  <main>
    <div id="resultsContainer" class="results list-view"></div>
    <div id="imageResults" class="image-results hidden"></div>
  </main>

  <!-- ============================
       LOADER + NO RESULTS
  ============================= -->
  <div id="frame-loader" class="loader hidden"></div>

  <div id="no-query" class="no-results hidden">
    No results found
  </div>

  <!-- ============================
       SCRIPTS
  ============================= -->
  <script type="module" src="/search.js"></script>
<script type="module" src="assets/js/cursor.js"></script>


</body>
</html>
