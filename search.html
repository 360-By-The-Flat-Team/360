  <style>
    /* ── Search results page layout ── */
    .search-results-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: 48px; /* clear the sidebar toggle */
    }

    /* ── Top search bar strip ── */
    .search-bar-strip {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: -1;
    
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 8px;
    
      padding: 10px 16px;
    
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--br);
    }
    
    body.dark .search-bar-strip {
      background: rgba(5,8,22,0.92);
    }

    /* 360 logo mark in strip */
    .strip-logo {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .06em;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    /* Search form inside strip */
    #strip-search-form {
      display: flex;
      align-items: center;
      flex: 1;
      max-width: 620px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid var(--br);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #strip-search-form:focus-within {
      border-color: var(--a);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    body.dark #strip-search-form {
      background: rgba(15,23,42,0.6);
      border-color: rgba(255,255,255,0.15);
    }

    #strip-search-input {
      flex: 1;
      padding: 10px 18px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--txt);
      font-family: inherit;
      caret-color: var(--a);
    }
    body.dark #strip-search-input { color: var(--txtd); }
    #strip-search-input::placeholder { color: var(--mut); }
    body.dark #strip-search-input::placeholder { color: var(--mutd); }

    #strip-search-btn {
      flex-shrink: 0;
      margin: 5px 6px 5px 0;
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(120deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
      transform: none !important;
      box-shadow: none !important;
    }
    #strip-search-btn:hover { opacity: 0.85; }

    /* ── Results iframe ── */
    #results-frame-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #results-iframe {
      flex: 1;
      width: 100%;
      border: none;
      /* Height fills the rest of the viewport below the strip */
      height: calc(100vh - 96px);
    }

    /* ── Loading overlay ── */
    #frame-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 60px 20px;
      color: var(--mut);
      font-size: 14px;
    }
    body.dark #frame-loader { color: var(--mutd); }
    .loader-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--br);
      border-top-color: var(--a);
      border-radius: 50%;
      animation: spin360 0.8s linear infinite;
    }
    @keyframes spin360 { to { transform: rotate(360deg); } }

    /* ── No-query state ── */
    #no-query {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 60px 20px;
      text-align: center;
      color: var(--mut);
      font-size: 15px;
    }
    body.dark #no-query { color: var(--mutd); }
    #no-query .big-emoji { font-size: 48px; }

    /* ── Mobile responsive ── */
    @media (max-width: 600px) {
      .search-bar-strip {
        padding: 8px 12px 8px 12px;
        gap: 8px;
      }
      .strip-logo { display: none; }
      #results-iframe { height: calc(100vh - 82px); }
    }

      margin-top: 40px;
      justify-content: center;
      align-items: center;
      position: fixed;
    }
    
    .search-results-page {
      padding-top: 80px; /* adjust to match header height */
    }

    .gsc-tabsArea {
      display: flex !important;
      justify-content: center !important;
    }
