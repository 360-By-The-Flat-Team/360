<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <title>360 — Search</title>

  <link rel="icon" type="image/png" href="favicon-32x32.png" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
  <link rel="stylesheet" href="/assets/css/cursor.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ───────────────────────────────────────────────
       360 SEARCH RESULTS PAGE — HYBRID MODERN UI
       ─────────────────────────────────────────────── */

    .search-results-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: 80px;
    }

    /* Top strip */
    .search-bar-strip {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 49;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--br);
    }
    body.dark .search-bar-strip {
      background: rgba(5,8,22,0.92);
    }

    .strip-logo {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .06em;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    /* Search form */
    #strip-search-form {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 620px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid var(--br);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #strip-search-form:focus-within {
      border-color: var(--a);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    body.dark #strip-search-form {
      background: rgba(15,23,42,0.6);
      border-color: rgba(255,255,255,0.15);
    }

    #strip-search-input {
      flex: 1;
      padding: 10px 18px;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--txt);
    }
    body.dark #strip-search-input { color: var(--txtd); }

    #strip-search-btn {
      margin: 5px 6px 5px 0;
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(120deg, var(--a), var(--a2));
      color: #050816;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    /* Results shell */
    #results-shell {
      max-width: 820px;
      margin: 0 auto;
      padding: 96px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Loading */
    #results-loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 40px 16px;
      color: var(--mut);
    }
    body.dark #results-loading { color: var(--mutd); }

    .loader-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--br);
      border-top-color: var(--a);
      border-radius: 50%;
      animation: spin360 0.8s linear infinite;
    }
    @keyframes spin360 { to { transform: rotate(360deg); } }

    /* No query */
    #no-query {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 60px 20px;
      color: var(--mut);
      text-align: center;
    }
    body.dark #no-query { color: var(--mutd); }

    /* Results */
    #results-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 14px 16px;
      border: 1px solid var(--br);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    body.dark .result-card {
      background: rgba(15,23,42,0.7);
      border-color: rgba(255,255,255,0.15);
    }
    .result-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.12);
      border-color: var(--a);
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--mut);
      margin-bottom: 4px;
    }
    body.dark .result-meta { color: var(--mutd); }

    .result-favicon {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }

    .result-title a {
      font-size: 16px;
      font-weight: 600;
      color: var(--txt);
      text-decoration: none;
    }
    body.dark .result-title a { color: var(--txtd); }
    .result-title a:hover { text-decoration: underline; }

    .result-snippet {
      font-size: 14px;
      color: var(--mut);
    }
    body.dark .result-snippet { color: var(--mutd); }

    /* Pagination */
    #results-pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .page-btn {
      border-radius: 999px;
      padding: 6px 12px;
      border: 1px solid var(--br);
      background: rgba(255,255,255,0.4);
      cursor: pointer;
    }
    body.dark .page-btn {
      background: rgba(15,23,42,0.6);
      border-color: rgba(255,255,255,0.15);
      color: var(--txtd);
    }
    .page-btn.active {
      background: linear-gradient(120deg, var(--a), var(--a2));
      color: #fff;
      border-color: transparent;
    }
  </style>
</head>

<body>

  <!-- Cursor system -->
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>
  <div class="cursor-crosshair"></div>
  <div class="cursor-blob"></div>

  <!-- Sidebar -->
  <button class="sidebar-toggle" id="sidebarToggle">☰ Menu</button>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-mark"></div><button id="settingsBtn">⚙</button></div>
    <nav class="nav-list">
      <div class="nav-item" data-href="/">Home</div>
      <div class="nav-item" data-href="../ai">AI</div>
      <div class="nav-item" data-href="../weather">Weather</div>
      <div class="nav-item" data-href="../translator">Translator</div>
      <div class="nav-item" data-href="../stocks">Stocks</div>
      <div class="nav-item" data-href="../url-shortener">URL Shortener</div>
      <div class="nav-item" data-href="../chat">Chat</div>
      <div class="nav-item" data-href="../news">News</div>
      <div class="nav-item" data-href="../games">Games</div>
    </nav>
    <div class="sidebar-footer">© 2026 360 INC. · V2.1.1</div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <!-- SEARCH RESULTS PAGE -->
  <div class="search-results-page">

    <div class="search-bar-strip">
      <a class="strip-logo" href="./">360</a>

      <form id="strip-search-form" role="search">
        <input id="strip-search-input" name="q" type="text" placeholder="Search with 360..." />
        <button id="strip-search-btn" type="submit">Search</button>
      </form>
    </div>

    <main id="results-shell">
      <div id="no-query">
        <div class="big-emoji">🔍</div>
        <div>Type something in the search bar to start searching with 360.</div>
      </div>

      <div id="results-loading">
        <div class="loader-spinner"></div>
        <div>Searching the web with 360…</div>
      </div>

      <div id="results-container"></div>
      <div id="results-pagination"></div>
    </main>

  </div>

  <audio id="clickSound" src="click-sound.mp3" preload="auto"></audio>

  <!-- Global scripts -->
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/cookie.js"></script>
  <script src="/assets/js/cursor.js"></script>

  <!-- NEW root search engine -->
  <script src="/search.js"></script>

</body>
</html>
