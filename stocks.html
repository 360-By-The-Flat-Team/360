<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 — Stocks</title>
  <link rel="icon" type="image/png" href="../favicon-32x32.png" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .stocks-page { max-width: 680px; margin: 0 auto; padding: 80px 20px 40px; }
    .stocks-page h2 { font-size: 22px; font-weight: 700; margin-bottom: 20px;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stock-form { display: flex; gap: 10px; margin-bottom: 20px; }
    .stock-form input { flex: 1; padding: 12px 16px; border-radius: 999px;
      border: 1px solid var(--br); background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px); color: var(--txt); font-size: 14px; outline: none; }
    body.dark .stock-form input { color: var(--txtd); }
    .stock-form button { padding: 12px 22px; border-radius: 999px; border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816; font-weight: 700; cursor: pointer; }
    #quoteCard { background: rgba(255,255,255,.6); backdrop-filter: blur(10px);
      border: 1px solid var(--br); border-radius: 14px; padding: 20px;
      font-size: 15px; line-height: 1.8; display: none; }
    body.dark #quoteCard { background: rgba(15,23,42,.7); }
    .quote-ticker { font-size: 28px; font-weight: 900;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .quote-price { font-size: 22px; font-weight: 700; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .back-btn { position:fixed;top:12px;left:90px;padding:6px 14px;border-radius:999px;
      background:rgba(255,255,255,.85);border:1px solid var(--br);cursor:pointer;font-size:13px;z-index:50; }
    body.dark .back-btn { background:rgba(15,23,42,.85);color:var(--txtd); }
  </style>
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>
  <button class="back-btn" onclick="window.location.href='../'">← Back</button>
  <button class="sidebar-toggle" id="sidebarToggle">☰ Menu</button>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-mark"></div><button id="settingsBtn">⚙</button></div>
    <nav class="nav-list">
      <div class="nav-item" data-href="../">Home</div>
      <div class="nav-item" data-href="../ai/">AI</div>
      <div class="nav-item" data-href="../weather/">Weather</div>
      <div class="nav-item" data-href="../translator/">Translator</div>
      <div class="nav-item active" data-href="../stocks/">Stocks</div>
      <div class="nav-item" data-href="../url-shortener/">URL Shortener</div>
      <div class="nav-item" data-href="../chat/">Chat</div>
      <div class="nav-item" data-href="../games/">Games</div>
    </nav>
    <div class="sidebar-footer">© 2026 360 INC. · V2.0</div>
  </aside>
  <div class="overlay" id="overlay"></div>
  <div class="settings-panel" id="settingsPanel">
    <h3>Appearance</h3>
    <div class="settings-label">Theme</div>
    <div class="theme-swatches">
      <div class="theme-option"><div class="swatch" data-theme="ocean"></div><span>Ocean</span></div>
      <div class="theme-option"><div class="swatch" data-theme="midnight"></div><span>Midnight</span></div>
      <div class="theme-option"><div class="swatch" data-theme="sunset"></div><span>Sunset</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mint"></div><span>Mint</span></div>
      <div class="theme-option"><div class="swatch" data-theme="neon"></div><span>Neon</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mono"></div><span>Mono</span></div>
    </div>
    <div class="settings-label" style="margin-top:20px;">Mode</div>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <span style="font-size:14px;">Dark mode</span>
      <input type="checkbox" id="darkToggle" />
    </label>
  </div>

  <div class="stocks-page">
    <h2>📈 Stocks</h2>
    <form class="stock-form" id="stockForm">
      <input id="ticker" placeholder="Enter ticker (e.g. AAPL)" required />
      <button type="submit">Search</button>
    </form>
    <div id="quoteCard"></div>
  </div>

  <audio id="clickSound" src="../click-sound.mp3" preload="auto"></audio>
  <script src="../main.js"></script>
  <script>
    document.getElementById("stockForm").onsubmit = async e => {
      e.preventDefault();
      const t    = document.getElementById("ticker").value.trim().toUpperCase();
      const card = document.getElementById("quoteCard");
      if (!t) return;
      card.style.display = "block";
      card.innerHTML = "Loading...";
      try {
        const res  = await fetch(
          `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${t}&apikey=I3B9DMLF3EUUP0MY`
        );
        const data = await res.json();
        const g    = data["Global Quote"];
        if (!g || !g["05. price"]) throw new Error("No data found for " + t);
        const price  = parseFloat(g["05. price"]).toFixed(2);
        const change = parseFloat(g["09. change"]).toFixed(2);
        const pct    = g["10. change percent"];
        const isPos  = parseFloat(change) >= 0;
        card.innerHTML = `
          <div class="quote-ticker">${t}</div>
          <div class="quote-price">$${price}</div>
          <div class="${isPos ? "positive" : "negative"}">
            ${isPos ? "▲" : "▼"} ${Math.abs(change)} (${pct})
          </div>
          <div style="margin-top:8px;font-size:13px;color:var(--mut);">
            Volume: ${parseInt(g["06. volume"]).toLocaleString()}<br>
            Previous close: $${parseFloat(g["08. previous close"]).toFixed(2)}
          </div>`;
      } catch (err) {
        card.innerHTML = `<span style="color:#ef4444;">Error: ${err.message}</span>`;
      }
    };
  </script>
</body>
</html>
