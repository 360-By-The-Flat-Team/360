  <div class="stocks-page">
    <h2>📈 Stocks</h2>
    <form class="stock-form" id="stockForm">
      <input id="ticker" placeholder="Enter ticker (e.g. AAPL)" required />
      <button type="submit">Search</button>
    </form>
    <div id="quoteCard" style="display:none;"></div>

  <audio id="clickSound" src="../click-sound.mp3" preload="auto"></audio>
  <script src="../main.js"></script>
  <script src="../cookie.js"></script>
  <script src="../cursor.js"></script>
  <script>
    // ── All stock calls go through the secure proxy ──
    const STOCKS_PROXY = "https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/stocks-proxy";

    document.getElementById("stockForm").onsubmit = async e => {
      e.preventDefault();
      const t    = document.getElementById("ticker").value.trim().toUpperCase();
      const card = document.getElementById("quoteCard");
      if (!t) return;
      card.style.display = "block";
      card.innerHTML = "Loading...";
      try {
        const res  = await fetch(`${STOCKS_PROXY}?ticker=${encodeURIComponent(t)}`);
        const data = await res.json();
        const g    = data["Global Quote"];
        if (!g || !g["05. price"]) throw new Error("No data for " + t);
        const price = parseFloat(g["05. price"]).toFixed(2);
        const change = parseFloat(g["09. change"]).toFixed(2);
        const isPos = parseFloat(change) >= 0;
        card.innerHTML = `<div style="font-size:24px;font-weight:900;background:linear-gradient(120deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${t}</div><div style="font-size:20px;font-weight:700;">$${price}</div><div style="color:${isPos?"#22c55e":"#ef4444"};">${isPos?"▲":"▼"} ${Math.abs(change)} (${g["10. change percent"]})</div>`;
      } catch (err) { card.innerHTML = `<span style="color:#ef4444;">Error: ${err.message}</span>`; }
    };
  </script>
