  <style>
    /* ── Custom Dropdown ── */
    .custom-select-wrapper {
      position: relative;
      display: inline-block;
      min-width: 180px;
    }

    .custom-select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid rgba(128,128,128,0.25);
      background: rgba(128,128,128,0.07);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .custom-select-trigger:hover {
      border-color: rgba(128,128,128,0.45);
      background: rgba(128,128,128,0.12);
    }
    .custom-select-trigger .arrow {
      font-size: 10px;
      opacity: 0.5;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .custom-select-wrapper.open .arrow {
      transform: rotate(180deg);
    }

    .custom-select-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 100%;
      width: 240px;
      background: var(--bg, #fff);
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      z-index: 9999;
      overflow: hidden;
      animation: dropIn 0.15s ease;
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .custom-select-wrapper.open .custom-select-dropdown {
      display: block;
    }

    .dropdown-search {
      padding: 10px 12px 8px;
      border-bottom: 1px solid rgba(128,128,128,0.12);
    }
    .dropdown-search input {
      width: 100%;
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid rgba(128,128,128,0.2);
      background: rgba(128,128,128,0.07);
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }
    .dropdown-search input:focus {
      border-color: rgba(59,130,246,0.5);
    }

    .dropdown-list {
      max-height: 240px;
      overflow-y: auto;
      padding: 4px 0;
      scrollbar-width: thin;
    }
    .dropdown-list::-webkit-scrollbar { width: 4px; }
    .dropdown-list::-webkit-scrollbar-track { background: transparent; }
    .dropdown-list::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 4px; }

    .dropdown-group-label {
      padding: 8px 14px 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    .dropdown-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.1s;
      border-radius: 0;
    }
    .dropdown-option:hover {
      background: rgba(59,130,246,0.1);
    }
    .dropdown-option.selected {
      background: rgba(59,130,246,0.12);
      font-weight: 600;
    }
    .dropdown-option .flag {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }
    .dropdown-option .lang-name {
      flex: 1;
    }
    .dropdown-option .lang-native {
      font-size: 12px;
      opacity: 0.45;
    }
    .no-results {
      padding: 16px 14px;
      font-size: 13px;
      opacity: 0.45;
      text-align: center;
    }

    /* ── Lang row layout ── */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 12px 0;
    }
    .lang-row label {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.6;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .swap-btn {
      background: rgba(128,128,128,0.1);
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.15s, transform 0.2s;
      line-height: 1;
    }
    .swap-btn:hover {
      background: rgba(128,128,128,0.18);
      transform: rotate(180deg);
    }

            return;
          }
          if (f && !item.label.toLowerCase().includes(f) && !item.native.toLowerCase().includes(f)) return;
          hasResults = true;

          if (currentGroup && !f) {
            const g = document.createElement("div");
            g.className = "dropdown-group-label";
            g.textContent = currentGroup;
            listEl.appendChild(g);
            currentGroup = null;
          }

          const opt = document.createElement("div");
          opt.className = "dropdown-option" + (item.value === currentValueGetter() ? " selected" : "");
          opt.innerHTML = `<span class="flag">${item.flag}</span><span class="lang-name">${item.label}</span><span class="lang-native">${item.native}</span>`;
          opt.addEventListener("click", () => {
            onSelect(item);
            wrapperEl.classList.remove("open");
          });
          listEl.appendChild(opt);
        });

        if (!hasResults) {
          listEl.innerHTML = `<div class="no-results">No languages found</div>`;
        }
      }

      searchEl.addEventListener("input", () => render(searchEl.value));
      wrapperEl.addEventListener("open", () => { render(""); searchEl.value = ""; searchEl.focus(); });
    }

    function setSource(item) {
      sourceValue = item.value;
      document.getElementById("sourceLabel").textContent = item.flag + " " + item.label;
    }

    function setTarget(item) {
      targetValue = item.value;
      document.getElementById("targetLabel").textContent = item.flag + " " + item.label;
    }

    buildList(
      document.getElementById("sourceList"),
      document.getElementById("sourceSearch"),
      document.getElementById("sourceWrapper"),
      document.getElementById("sourceLabel"),
      () => sourceValue,
      setSource
    );

    buildList(
      document.getElementById("targetList"),
      document.getElementById("targetSearch"),
      document.getElementById("targetWrapper"),
      document.getElementById("targetLabel"),
      () => targetValue,
      setTarget
    );

    // ── Toggle open/close ──
    function toggleDropdown(wrapperEl) {
      const isOpen = wrapperEl.classList.contains("open");
      document.querySelectorAll(".custom-select-wrapper.open").forEach(w => w.classList.remove("open"));
      if (!isOpen) {
        wrapperEl.classList.add("open");
        wrapperEl.dispatchEvent(new Event("open"));
      }
    }

    document.getElementById("sourceTrigger").addEventListener("click", (e) => {
      e.stopPropagation();
      toggleDropdown(document.getElementById("sourceWrapper"));
    });
    document.getElementById("targetTrigger").addEventListener("click", (e) => {
      e.stopPropagation();
      toggleDropdown(document.getElementById("targetWrapper"));
    });

    document.addEventListener("click", () => {
      document.querySelectorAll(".custom-select-wrapper.open").forEach(w => w.classList.remove("open"));
    });
    document.querySelectorAll(".custom-select-dropdown").forEach(d => d.addEventListener("click", e => e.stopPropagation()));

    // ── Swap ──
    document.getElementById("swapBtn").onclick = () => {
      const oldSource = LANGUAGES.find(l => l.value === sourceValue);
      const oldTarget = LANGUAGES.find(l => l.value === targetValue);
      if (oldSource && oldTarget) {
        setSource(oldTarget);
        setTarget(oldSource);
      }
      const result = document.getElementById("translateResult");
      const input  = document.getElementById("translateInput");
      if (result.textContent && result.textContent !== "Translation will appear here.") {
        const tmp = input.value;
        input.value = result.textContent;
        result.textContent = tmp;
      }
    };

    // ── Translate ──
    async function translateText() {
      const text = document.getElementById("translateInput").value.trim();
      const out  = document.getElementById("translateResult");

      if (!text) { out.textContent = "Please enter some text to translate."; return; }
      if (sourceValue === targetValue) { out.textContent = "Source and target languages are the same."; return; }

      out.textContent = "Translating...";

      try {
        const { data, error } = await supabase.functions.invoke("dynamic-endpoint", {
          body: { text, from: sourceValue, to: targetValue }
        });

        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        if (!data?.translated) { out.textContent = "No translation returned. Please try again."; return; }

        out.textContent = data.translated;

      } catch (err) {
        console.error("Translation error:", err);
        out.textContent = "Translation failed: " + err.message;
      }
    }

    document.getElementById("translateBtn").onclick = translateText;
    document.getElementById("translateInput").addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") translateText();
    });
  </script>
</body>
</html>
