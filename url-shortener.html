<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 — URL Shortener</title>
  <link rel="icon" type="image/png" href="../favicon-32x32.png" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .shortener-page { max-width: 620px; margin: 0 auto; padding: 80px 20px 40px; }
    .shortener-page h2 { font-size: 22px; font-weight: 700; margin-bottom: 20px;
      background: linear-gradient(120deg, var(--a), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .shortener-box { display: flex; gap: 10px; margin-bottom: 16px; }
    .shortener-box input { flex: 1; padding: 12px 16px; border-radius: 999px;
      border: 1px solid var(--br); background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px); color: var(--txt); font-size: 14px; outline: none; }
    body.dark .shortener-box input { color: var(--txtd); }
    .shortener-box button { padding: 12px 22px; border-radius: 999px; border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816; font-weight: 700; cursor: pointer; white-space: nowrap; }
    #shortResult { padding: 16px; border-radius: 14px; font-size: 14px; line-height: 1.7;
      background: rgba(255,255,255,.6); backdrop-filter: blur(10px);
      border: 1px solid var(--br); min-height: 54px; display: none; }
    body.dark #shortResult { background: rgba(15,23,42,.7); }
    #shortResult a { color: var(--a); word-break: break-all; }
    .copy-btn { margin-top: 10px; padding: 8px 16px; border-radius: 8px; border: none;
      background: linear-gradient(110deg, var(--a), var(--a2));
      color: #050816; font-weight: 600; cursor: pointer; font-size: 13px; }
    .back-btn { position:fixed;top:12px;left:90px;padding:6px 14px;border-radius:999px;
      background:rgba(255,255,255,.85);border:1px solid var(--br);cursor:pointer;font-size:13px;z-index:50; }
    body.dark .back-btn { background:rgba(15,23,42,.85);color:var(--txtd); }
  </style>
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-trail"></div>
  <button class="back-btn" onclick="window.location.href='../'">← Back</button>
  <button class="sidebar-toggle" id="sidebarToggle">☰ Menu</button>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-mark"></div><button id="settingsBtn">⚙</button></div>
    <nav class="nav-list">
      <div class="nav-item" data-href="../">Home</div>
      <div class="nav-item" data-href="../ai/">AI</div>
      <div class="nav-item" data-href="../weather/">Weather</div>
      <div class="nav-item" data-href="../translator/">Translator</div>
      <div class="nav-item" data-href="../stocks/">Stocks</div>
      <div class="nav-item active" data-href="../url-shortener/">URL Shortener</div>
      <div class="nav-item" data-href="../chat/">Chat</div>
      <div class="nav-item" data-href="../games/">Games</div>
    </nav>
    <div class="sidebar-footer">© 2026 360 INC. · V2.0</div>
  </aside>
  <div class="overlay" id="overlay"></div>
  <div class="settings-panel" id="settingsPanel">
    <h3>Appearance</h3>
    <div class="settings-label">Theme</div>
    <div class="theme-swatches">
      <div class="theme-option"><div class="swatch" data-theme="ocean"></div><span>Ocean</span></div>
      <div class="theme-option"><div class="swatch" data-theme="midnight"></div><span>Midnight</span></div>
      <div class="theme-option"><div class="swatch" data-theme="sunset"></div><span>Sunset</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mint"></div><span>Mint</span></div>
      <div class="theme-option"><div class="swatch" data-theme="neon"></div><span>Neon</span></div>
      <div class="theme-option"><div class="swatch" data-theme="mono"></div><span>Mono</span></div>
    </div>
    <div class="settings-label" style="margin-top:20px;">Mode</div>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
      <span style="font-size:14px;">Dark mode</span>
      <input type="checkbox" id="darkToggle" />
    </label>
  </div>

  <div class="shortener-page">
    <h2>🔗 URL Shortener</h2>
    <div class="shortener-box">
      <input id="shortInput" placeholder="Paste a long URL..." type="url" />
      <button id="shortBtn">Shorten</button>
    </div>
    <div id="shortResult"></div>
  </div>

  <audio id="clickSound" src="../click-sound.mp3" preload="auto"></audio>
  <script src="../main.js"></script>
  <script>
    document.getElementById("shortBtn").onclick = async () => {
      const url    = document.getElementById("shortInput").value.trim();
      const result = document.getElementById("shortResult");
      if (!url) { result.style.display = "block"; result.textContent = "Please enter a URL."; return; }
      result.style.display = "block";
      result.textContent = "Shortening...";
      try {
        const res  = await fetch(
          `https://tinyurl.com/api-create.php?url=${encodeURIComponent(url)}`
        );
        const short = await res.text();
        result.innerHTML = `
          Short URL: <a href="${short}" target="_blank">${short}</a>
          <br><button class="copy-btn" onclick="navigator.clipboard.writeText('${short}');this.textContent='Copied!'">Copy</button>`;
      } catch {
        result.textContent = "Failed to shorten URL. Please try again.";
      }
    };

    document.getElementById("shortInput").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("shortBtn").click();
    });
  </script>
</body>
</html>
