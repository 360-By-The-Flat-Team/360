<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>360 | Zone</title>

  <style>
    :root {
      --accent: #4a6cff;
      --accent-light: #6f86ff;
      --accent-hover: #3a58d6;
      --bg: #f7f8ff;
      --bg-dark: #111827;
      --card: #ffffff;
      --card-dark: #1f2933;
      --text: #111827;
      --text-dark: #f9fafb;
      --radius: 10px;
      --transition: 0.25s ease;
    }

    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: var(--bg);
      color: var(--text);
      transition: background var(--transition), color var(--transition);
    }

    body.dark {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    h1 {
      margin-bottom: 0.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggleRow {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 0.9rem;
    }

    .toggleBtn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #ccc;
      background: #f3f4ff;
      cursor: pointer;
      font-size: 0.8rem;
    }

    body.dark .toggleBtn {
      background: #111827;
      border-color: #4b5563;
      color: #e5e7eb;
    }

    .action {
      position: relative;
      overflow: hidden;
    }
    .action::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.5s, opacity 0.8s;
      left: var(--ripple-x, 50%);
      top: var(--ripple-y, 50%);
    }
    .action:active::after {
      transform: scale(20);
      opacity: 1;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tabBtn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      background: #e0e0e0;
      transition: var(--transition);
    }

    .tabBtn:hover {
      background: var(--accent-light);
      color: white;
      transform: translateY(-3px);
    }

    .tabBtn.active {
      background: var(--accent);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    body.dark .tabBtn {
      background: #374151;
      color: #e5e7eb;
    }
    body.dark .tabBtn.active {
      background: var(--accent);
      color: white;
    }

    .tabContent {
      display: none;
      padding: 1rem;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
    }

    body.dark .tabContent {
      background: var(--card-dark);
      border-color: #4b5563;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    label { display: block; margin-top: 1rem; font-weight: 600; }
    textarea, select, input {
      width: 100%;
      margin-top: 0.25rem;
      padding: 0.5rem;
      font-size: 0.95rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: white;
      color: #111827;
    }

    body.dark textarea,
    body.dark select,
    body.dark input {
      background: #111827;
      color: #e5e7eb;
      border-color: #4b5563;
    }

    button.action {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
      transition: var(--transition);
    }

    button.action:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .output {
      margin-top: 1rem;
      padding: 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      white-space: pre-wrap;
      min-height: 60px;
      font-size: 0.95rem;
    }

    body.dark .output {
      background: #111827;
      border-color: #4b5563;
      color: #e5e7eb;
    }

    mark {
      background: #ffe066;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .error {
      color: #b91c1c;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    body.dark .error {
      color: #fecaca;
    }
  </style>
</head>

<body>
  <h1>
    <span>Zone Essay Helper</span>
    <div class="toggleRow">
      <button class="toggleBtn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>
  </h1>

  <div class="tabs">
    <button class="tabBtn active" onclick="showTab('builder', this)">Paragraph Builder</button>
    <button class="tabBtn" onclick="showTab('grammar', this)">Grammar Fixer</button>
    <button class="tabBtn" onclick="showTab('mla', this)">MLA Generator</button>
    <button class="tabBtn" onclick="showTab('evidence', this)">Evidence Helper</button>
    <button class="tabBtn" onclick="showTab('pronouns', this)">Pronoun Checker</button>
  </div>

  <!-- PARAGRAPH BUILDER -->
  <div id="builder" class="tabContent" style="display:block;">
    <label>Paragraph type</label>
    <select id="paragraphType">
      <option value="intro">Intro</option>
      <option value="body1">Body 1</option>
      <option value="body2">Body 2</option>
      <option value="body3">Body 3</option>
      <option value="conclusion">Conclusion</option>
    </select>
    <label>Claim</label>
    <textarea id="claim" rows="2"></textarea>
    <label>Evidence / notes</label>
    <textarea id="evidence" rows="6"></textarea>
    <button class="action" onclick="buildParagraph()">Build Paragraph (AI)</button>
    <div class="output" id="builderOut"></div>
    <div class="error" id="builderErr"></div>
  </div>

  <!-- GRAMMAR FIXER -->
  <div id="grammar" class="tabContent">
    <label>Paste text to clean up</label>
    <textarea id="grammarInput" rows="6"></textarea>
    <button class="action" onclick="fixGrammar()">Fix Grammar (AI)</button>
    <div class="output" id="grammarOut"></div>
    <div class="error" id="grammarErr"></div>
  </div>

  <!-- MLA GENERATOR -->
  <div id="mla" class="tabContent">
    <label>Author</label>
    <input id="mlaAuthor" />
    <label>Title</label>
    <input id="mlaTitle" />
    <label>Website / Container</label>
    <input id="mlaSite" />
    <label>URL</label>
    <input id="mlaURL" />
    <label>Date Published (optional)</label>
    <input id="mlaDate" placeholder="2024-05-12" />
    <label>Date Accessed</label>
    <input id="mlaAccess" placeholder="2026-03-10" />
    <button class="action" onclick="generateMLA()">Generate MLA (AI)</button>
    <div class="output" id="mlaOut"></div>
    <div class="error" id="mlaErr"></div>
  </div>

  <!-- EVIDENCE HELPER -->
  <div id="evidence" class="tabContent">
    <label>Claim</label>
    <textarea id="evClaim" rows="2"></textarea>
    <label>Evidence chunks (one per line)</label>
    <textarea id="evChunks" rows="6"></textarea>
    <button class="action" onclick="alignEvidence()">Align Evidence (AI)</button>
    <div class="output" id="evidenceOut"></div>
    <div class="error" id="evidenceErr"></div>
  </div>

  <!-- PRONOUN CHECKER -->
  <div id="pronouns" class="tabContent">
    <label>Paste text</label>
    <textarea id="pronounInput" rows="6"></textarea>
    <label>Select pronoun category</label>
    <select id="pronounCategory">
      <option value="subjective">Subjective (he, she, they)</option>
      <option value="objective">Objective (him, her, them)</option>
      <option value="possessive">Possessive (his, hers, theirs)</option>
      <option value="reflexive">Reflexive (himself, herself, themselves)</option>
    </select>
    <button class="action" onclick="checkPronouns()">Check Pronouns</button>
    <div class="output" id="pronounOut"></div>
    <div class="output" id="pronounSuggestions"></div>
  </div>

  <script>
  /* ── CONFIG — replace with your real Groq key ── */
  const GROQ_KEY = "YOUR_GROQ_KEY_HERE";
  const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
  const MODEL    = "llama3-8b-8192";

  /* ── Dark mode ── */
  function toggleDarkMode() {
    document.body.classList.toggle("dark");
  }

  /* ── Tabs ── */
  function showTab(id, btn) {
    document.querySelectorAll('.tabContent').forEach(d => d.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  /* ── Ripple ── */
  document.addEventListener("click", e => {
    if (e.target.classList.contains("action")) {
      const rect = e.target.getBoundingClientRect();
      e.target.style.setProperty("--ripple-x", `${e.clientX - rect.left}px`);
      e.target.style.setProperty("--ripple-y", `${e.clientY - rect.top}px`);
    }
  });

  /* ── Pronoun checker ── */
  const pronounSets = {
    subjective: ["he","she","they","i","we","you"],
    objective:  ["him","her","them","me","us","you"],
    possessive: ["his","hers","theirs","mine","ours","yours"],
    reflexive:  ["himself","herself","themselves","myself","ourselves","yourself"]
  };

  function checkPronouns() {
    const text     = document.getElementById("pronounInput").value;
    const category = document.getElementById("pronounCategory").value;
    const list     = pronounSets[category];
    let highlighted = text;
    list.forEach(p => {
      highlighted = highlighted.replace(new RegExp(`\\b${p}\\b`, "gi"), m => `<mark>${m}</mark>`);
    });
    document.getElementById("pronounOut").innerHTML = highlighted;
    document.getElementById("pronounSuggestions").textContent =
      list.map(p => `• Replace "${p}" with a specific noun for clarity`).join("\n");
  }

  /* ── Universal AI call — direct Groq ── */
  async function ai(prompt) {
    const res = await fetch(GROQ_URL, {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": `Bearer ${GROQ_KEY}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: "system", content: "You are a helpful ELA writing assistant. Be clear, academic, and concise. Return only what is asked." },
          { role: "user",   content: prompt }
        ],
        max_tokens: 1024
      })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`Groq error ${res.status}: ${err}`);
    }

    const data = await res.json();
    return data.choices?.[0]?.message?.content || "(No response)";
  }

  /* ── Paragraph Builder ── */
  async function buildParagraph() {
    const out = document.getElementById("builderOut");
    const err = document.getElementById("builderErr");
    err.textContent = "";
    const type     = document.getElementById("paragraphType").value;
    const claim    = document.getElementById("claim").value.trim();
    const evidence = document.getElementById("evidence").value.trim();
    out.textContent = "Thinking...";
    try {
      out.textContent = await ai(
        `Write a ${type} paragraph using this claim and evidence.\n\nClaim:\n${claim}\n\nEvidence:\n${evidence}\n\nUse clear academic language and proper structure. Return only the paragraph.`
      );
    } catch (e) {
      out.textContent = "";
      err.textContent = "Error: " + e.message;
    }
  }

  /* ── Grammar Fixer ── */
  async function fixGrammar() {
    const out = document.getElementById("grammarOut");
    const err = document.getElementById("grammarErr");
    err.textContent = "";
    const text = document.getElementById("grammarInput").value;
    out.textContent = "Thinking...";
    try {
      out.textContent = await ai(
        `Fix grammar, punctuation, clarity, and flow. Do not change the meaning. Return only the corrected text.\n\nText:\n${text}`
      );
    } catch (e) {
      out.textContent = "";
      err.textContent = "Error: " + e.message;
    }
  }

  /* ── MLA Generator ── */
  async function generateMLA() {
    const out = document.getElementById("mlaOut");
    const err = document.getElementById("mlaErr");
    err.textContent = "";
    const author = document.getElementById("mlaAuthor").value.trim();
    const title  = document.getElementById("mlaTitle").value.trim();
    const site   = document.getElementById("mlaSite").value.trim();
    const url    = document.getElementById("mlaURL").value.trim();
    const date   = document.getElementById("mlaDate").value.trim();
    const access = document.getElementById("mlaAccess").value.trim();
    out.textContent = "Thinking...";
    try {
      out.textContent = await ai(
        `Create a correct MLA 9 citation.\n\nAuthor: ${author}\nTitle: ${title}\nWebsite: ${site}\nURL: ${url}\nDate Published: ${date}\nDate Accessed: ${access}\n\nReturn only the MLA citation.`
      );
    } catch (e) {
      out.textContent = "";
      err.textContent = "Error: " + e.message;
    }
  }

  /* ── Evidence Helper ── */
  async function alignEvidence() {
    const out = document.getElementById("evidenceOut");
    const err = document.getElementById("evidenceErr");
    err.textContent = "";
    const claim  = document.getElementById("evClaim").value.trim();
    const chunks = document.getElementById("evChunks").value.trim();
    out.textContent = "Thinking...";
    try {
      out.textContent = await ai(
        `Claim:\n${claim}\n\nEvidence:\n${chunks}\n\nExplain how each evidence chunk supports the claim in clear, student-friendly reasoning.`
      );
    } catch (e) {
      out.textContent = "";
      err.textContent = "Error: " + e.message;
    }
  }
  </script>
</body>
</html>
